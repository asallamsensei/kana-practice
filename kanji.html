<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
  
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

<title>Kanji de Grado 1 - Asallam Sensei</title>
<style>
  :root{
    --bg: #0b1020;
    --card: rgba(255,255,255,.08);
    --card2: rgba(255,255,255,.10);
    --border: rgba(255,255,255,.14);
  
    --text:#ffffff;
    --muted:#ffffff;
  
    --abc: rgba(239,68,68,.85);      /* rojo */
    --abcHover: rgba(239,68,68,.70);
  
    --nav: rgba(125,92,255,.85);     /* morado */
    --navHover: rgba(125,92,255,.70);
  
    --ok:#22c55e;
    --bad:#ef4444;
  
    --jp: "Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo","MS PGothic",system-ui,sans-serif;
    --shadow: 0 18px 45px rgba(0,0,0,.35);

    --abcBg: rgba(168, 85, 247, .38);
    --abcBorder: rgba(196, 120, 255, .55);
    --abcHoverBg: rgba(168, 85, 247, .60);
  }


  body{
    margin:0;
    font-family: Arial, system-ui, sans-serif;
    background:
      radial-gradient(1200px 700px at 20% 10%, rgba(125,92,255,.35), transparent 60%),
      radial-gradient(900px 600px at 90% 20%, rgba(34,197,94,.22), transparent 60%),
      radial-gradient(900px 600px at 30% 90%, rgba(239,68,68,.18), transparent 55%),
      var(--bg);
    color: var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:stretch;
    padding: 26px 14px 70px;
  }

  h1{
    font-size:clamp(20px, 5vw, 30px);
    margin: 6px 0 6px;
    text-align:center;
    font-weight: 600;    /* baja la negrita */
  }

  /* Controles (modo + reset) */
  #controles{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
    margin-top:10px;
    margin-bottom:6px;
  }


  /* Pregunta */
  #kanji{
    font-family: var(--jp);
    font-size:70px;
    margin: 5px 0 0 0;
    font-weight:500;         /* antes 800 */
    text-align:center;
    line-height:1.1;
    word-break:break-word;
    letter-spacing: .02em;
  }

  /* ✅ Cuando la pregunta sea español (modo significado→kanji), achicar */
  #kanji.esPregunta{
    font-family: Arial, sans-serif; /* español normal */
    font-size:38px;                 /* antes 46 */
    font-weight:700;                /* antes 800 */
    line-height:1.25;
    letter-spacing: 0;
  }


  /* Botones ABC */
#opbtns{
  display:flex;
  gap:12px;
  justify-content:center;
  margin-top:0;
  flex-wrap:wrap;
}
  
.btnABC{
  padding:10px 16px;
  font-size:18px;
  border-radius:12px;
  border:1px solid var(--abcBorder);
  background: var(--abcBg);
  color:#fff;
  cursor:pointer;
  min-width:64px;
  font-weight:900;
  transition:.14s;
  box-shadow: 0 0 10px rgba(168, 85, 247, .35);
}
.btnABC:hover{
  background: var(--abcHoverBg);
  transform: translateY(-1px);
}

.btnABC.correcta{
  background:rgba(34,197,94,.30);
  border-color:rgba(34,197,94,.75);
  color:#dcfce7;
  box-shadow:
    0 0 14px rgba(34,197,94,.45),
    inset 0 0 10px rgba(34,197,94,.12);
}

.btnABC.incorrecta{
  background:rgba(239,68,68,.25);
  border-color:rgba(239,68,68,.75);
  color:#fee2e2;
  box-shadow:
    0 0 14px rgba(239,68,68,.35),
    inset 0 0 10px rgba(239,68,68,.10);
}

.btnABC:disabled{
  cursor:not-allowed;
  opacity:.95;
}
  
  /* Nav debajo del input */
  #navBtns{
    margin-top:4px;
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
  }

  .btnNav{
    padding:12px 20px;
    font-size:16px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(125,92,255,.18);
    color:white;
    cursor:pointer;
    font-weight:500;
    transition:.14s;
  }
  .btnNav:hover{
    background: rgba(125,92,255,.28);
    transform: translateY(-1px);
  }


  /* Reset */
  .btnReset{
    padding:10px 16px;
    font-size:16px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.16);
    background: rgba(0,0,0,.25);
    color:#fff;
    cursor:pointer;
    font-weight:900;
    transition:.14s;
  }
  .btnReset:hover{
    background: rgba(0,0,0,.35);
    transform: translateY(-1px);
  }


  /* Resultado + stats */
  #resultado{
    margin-top:14px;
    font-size:22px;
    text-align:center;
    min-height: 28px;
  }
  .correcto{ color:var(--ok); font-weight:900; }
  .incorrecto{ color:var(--bad); font-weight:900; }

#lecturas{
  margin-top:8px;
  text-align:center;
  font-size:18px;
  line-height:1.6;
  color:rgba(255,255,255,.92);
  min-height:54px;
}

#lecturas .jp{
  font-family: var(--jp);
  font-weight:700;
}
  
  #estadisticas{
    margin-top:8px;
    font-size:20px;
    text-align:center;
  }

  /* Botón general (por si luego lo usas) */
  button{ -webkit-tap-highlight-color: transparent; }

  /* --- Modos (3 botoncitos) --- */
  .modes{
    display:flex;
    gap:8px;
    justify-content:center;
    flex-wrap:wrap;
  }
  
  .btnMode{
    padding:10px 14px;
    font-size:16px;
    border-radius:999px;
    border:1px solid var(--border);
    background: rgba(255,255,255,.06);
    color: var(--text);
    cursor:pointer;
    font-weight:500;
    transition:.14s;
  }
  .btnMode:hover{
    background: rgba(255,255,255,.09);
    transform: translateY(-1px);
  }
  
  .btnMode.active{
    background:rgba(34,197,94,.22);
    border-color:rgba(34,197,94,.55);
    color:#dcfce7;
    box-shadow:
      0 0 12px rgba(34,197,94,.25),
      inset 0 0 8px rgba(34,197,94,.10);
  }

  .btnMode.mixActive{
    background:linear-gradient(135deg, #22c55e, #7d5cff);
    border-color:transparent;
    color:white;
    box-shadow:0 12px 28px rgba(34,197,94,.16);
  }

  /* --- Grid pregunta + opciones --- */
  .qaGrid{
    display:inline-grid;            /* ✅ clave */
    grid-template-columns: 1fr;
    justify-items:center;
    gap:10px;
    margin-top:12px;
  
    width: fit-content;             /* ✅ autofit */
    margin-left:auto;               /* ✅ centrado */
    margin-right:auto;
  
    background: linear-gradient(180deg, var(--card2), var(--card));
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 10px 14px 14px;
  }


.answerGrid{
  display:grid;
  justify-items:center;
  gap:12px;
  margin-top:14px;

  width: fit-content;
  max-width: min(920px, 96vw);
  margin-left:auto;
  margin-right:auto;

  padding: 12px 14px 14px;
  border: 1px solid var(--border);
  border-radius: 18px;
  background: linear-gradient(180deg, var(--card2), var(--card));
  box-shadow: var(--shadow);
}

  
  /* Opciones como bloque centrado */
  #opciones{
    font-size:24px;                 /* antes 22 */
    font-family: Arial, sans-serif;
    width:auto;
    max-width:min(560px, 92vw);     /* un poquito más */
    text-align:left;
    margin-top:0;
    justify-self:center;
    line-height:1.75;
  }
  
  #opciones.jp{
    font-family: var(--jp);
    font-weight: 600;
  }

  .wrap{
    width: min(980px, 100%);
    margin: 0 auto;
    display:flex;
    flex-direction:column;
    align-items:center; /* ✅ esto centra hijos como qaGrid */
  }

  /* 📱 CELULAR: reducir tamaño del texto de los botones de modo */
  @media (max-width: 520px){
    .btnMode{
      font-size: 12px;
    }
  }

.layout{
  width:min(1180px, 100%);
  margin:0 auto;
  display:grid;
  grid-template-columns: 1fr 220px;
  gap:18px;
  align-items:start;
}

.mainQuiz{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.sidePanel{
  position:sticky;
  top:20px;
  background:linear-gradient(180deg, var(--card2), var(--card));
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:16px;
}

.sidePanel h2{
  margin:0 0 12px;
  font-size:18px;
  text-align:center;
}

.modes.vertical{
  flex-direction:column;
}

.modes.vertical .btnMode{
  width:100%;
}

@media (max-width: 820px){
  .layout{
    grid-template-columns:1fr;
  }

  .sidePanel{
    position:static;
    order:-1;
  }

  .modes.vertical{
    flex-direction:row;
  }
}
  
</style>
</head>

<body>
  <div class="wrap">
  <h1>Kanji de Grado 1 ★ Asallam Sensei</h1>

  <div class="layout">
    <main class="mainQuiz">

  <div class="qaGrid">
    <div id="kanji">日</div>
    <div id="opciones"></div>
  </div>

  <div class="answerGrid">
    <div id="opbtns">
      <button id="btnA" class="btnABC" type="button" onclick="responder('a')">a</button>
      <button id="btnB" class="btnABC" type="button" onclick="responder('b')">b</button>
      <button id="btnC" class="btnABC" type="button" onclick="responder('c')">c</button>
    </div>
  
    <div id="navBtns">
      <button class="btnNav" type="button" onclick="accionSiguiente()">Siguiente</button>
    </div>
  </div>


  <div id="resultado"></div>
  <div id="lecturas"></div>
    
  <div id="estadisticas">
    Aciertos: <span id="aciertos">0</span> —
    Errores: <span id="errores">0</span>
  
    <div style="margin-top:6px;">
      Racha: <span id="racha">0</span> —
      Mejor racha: <span id="mejorRacha">0</span> —
      Precisión: <span id="precision">0%</span>
    </div>
  
    <div style="margin-top:8px;">
      <button class="btnReset" type="button" onclick="resetStats()">Reset stats</button>
    </div>
  </div>

  </main>

  <aside class="sidePanel">
    <h2>Modo</h2>

    <div class="modes vertical">
      <button id="btnKS" class="btnMode" type="button" onclick="setModo('kanji-sig')">
        Kanji → Significado
      </button>
      <button id="btnSK" class="btnMode" type="button" onclick="setModo('sig-kanji')">
        Significado → Kanji
      </button>
      <button id="btnMix" class="btnMode" type="button" onclick="setModo('mix')">
        Mezcla
      </button>
    </div>
  </aside>
</div>
      
<script>
let lista = [];
let actual = 0;

let aciertos = 0;
let errores = 0;
let racha = 0;
let mejorRacha = 0;

let correcta = "";             // 'a'/'b'/'c'
let respuestaCorrecta = "";    // texto correcto (depende del modo)
let yaValidado = false;        // ya se verificó la respuesta actual

let itemActual = null;
  
let modosActivos = new Set(["kanji-sig", "sig-kanji"]);
let modoActual = "mix";
let dirActual = "kanji-sig";

const letras = ["a","b","c"];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBeep(freq, duration){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = freq;
  osc.type = "sine";

  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);

  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function sonidoCorrecto(){
  playBeep(700, 0.08);
  setTimeout(() => playBeep(900, 0.12), 80);
}

function sonidoIncorrecto(){
  playBeep(250, 0.2);
}
  
const STORAGE_KEY = "kanji_g1_estado";

function guardarEstado(){
  const estado = {
    aciertos,
    errores,
    racha,
    mejorRacha,
    modoActual
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(estado));
}

function cargarEstado(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;

  try {
    const estado = JSON.parse(raw);
    aciertos = estado.aciertos || 0;
    errores = estado.errores || 0;
    racha = estado.racha || 0;
    mejorRacha = estado.mejorRacha || 0;
  } catch(e) {
    console.error("Estado corrupto en localStorage", e);
  }
}
  
function actualizarStatsUI(){
  document.getElementById("aciertos").innerText = aciertos;
  document.getElementById("errores").innerText = errores;
  document.getElementById("racha").innerText = racha;
  document.getElementById("mejorRacha").innerText = mejorRacha;

  const total = aciertos + errores;
  const precision = total === 0 ? 0 : Math.round((aciertos / total) * 100);
  document.getElementById("precision").innerText = `${precision}%`;
}
  
// ✅ Cargar kanji desde JSON (obj: {kanji, significado})
fetch("data/kanji_1.json")
  .then(res => res.json())
  .then(data => {
    lista = (data || []).filter(x => x && x.kanji && x.significado_es);

  cargarEstado();
  modosActivos = new Set(["kanji-sig", "sig-kanji"]);
  modoActual = "mix";
  actualizarStatsUI();
  setModo("mix");
  })
  .catch((err) => {
    console.error(err);
    document.getElementById("resultado").innerText =
      "No se pudo iniciar correctamente la app";
    document.getElementById("resultado").className = "incorrecto";
  });
  
function getModo(){
  return modosActivos.size === 2 ? "mix" : [...modosActivos][0];
}

function setModo(m){
  if (m === "mix") {
    modosActivos = new Set(["kanji-sig", "sig-kanji"]);
  } else {
    if (modosActivos.has(m)) {
      modosActivos.delete(m);
    } else {
      modosActivos.add(m);
    }

    // Evita que no quede ningún modo activo
    if (modosActivos.size === 0) {
      modosActivos.add(m);
    }
  }

  modoActual = modosActivos.size === 2 ? "mix" : [...modosActivos][0];

  pintarBotonesModo();

  yaValidado = false;
  document.getElementById("resultado").innerText = "";
  document.getElementById("resultado").className = "";
  document.getElementById("lecturas").innerHTML = "";

  guardarEstado();
  siguiente();
}

function pintarBotonesModo(){
  const ksActivo = modosActivos.has("kanji-sig");
  const skActivo = modosActivos.has("sig-kanji");
  const mixActivo = ksActivo && skActivo;

  document.getElementById("btnKS").classList.toggle("active", ksActivo);
  document.getElementById("btnSK").classList.toggle("active", skActivo);

  document.getElementById("btnMix").classList.toggle("mixActive", mixActivo);
  document.getElementById("btnMix").classList.toggle("active", false);
}
  
function textoPregunta(item){
  return (dirActual === "kanji-sig") ? item.kanji : item.significado_es;
}

function textoRespuesta(item){
  return (dirActual === "kanji-sig") ? item.significado_es : item.kanji;
}

function shuffleArray(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
  
function aplicarEstiloPregunta(){
  const el = document.getElementById("kanji");
  if (dirActual === "sig-kanji") el.classList.add("esPregunta");
  else el.classList.remove("esPregunta");
}

function limpiarUIParaNueva(){
  const res = document.getElementById("resultado");
  res.innerText = "";
  res.className = "";

  document.getElementById("lecturas").innerHTML = "";

  ["btnA", "btnB", "btnC"].forEach(id => {
    const btn = document.getElementById(id);
    btn.disabled = false;
    btn.classList.remove("correcta", "incorrecta");
  });

  yaValidado = false;
}

function siguiente(){
  if (lista.length < 3) return;

  limpiarUIParaNueva(); // primero limpia

  actual = Math.floor(Math.random() * lista.length);
  const itemCorrecto = lista[actual];
  itemActual = itemCorrecto;
  document.getElementById("lecturas").innerHTML = "";

  // decidir dirección real para ESTA pregunta (sin mutar el objeto)
  const activos = [...modosActivos];
  dirActual = activos[Math.floor(Math.random() * activos.length)];


  respuestaCorrecta = textoRespuesta(itemCorrecto);

  let opciones = [respuestaCorrecta];
  while (opciones.length < 3) {
    const rItem = lista[Math.floor(Math.random() * lista.length)];
    const r = textoRespuesta(rItem);
    if (!opciones.includes(r)) opciones.push(r);
  }

  shuffleArray(opciones);
  correcta = letras[opciones.indexOf(respuestaCorrecta)];

  aplicarEstiloPregunta();
  aplicarEstiloOpciones();
  document.getElementById("kanji").innerText = textoPregunta(itemCorrecto);
  document.getElementById("opciones").innerHTML =
    `a) ${opciones[0]}<br>
     b) ${opciones[1]}<br>
     c) ${opciones[2]}`;
}

function pintarBotonesRespuesta(){
  const botones = {
    a: document.getElementById("btnA"),
    b: document.getElementById("btnB"),
    c: document.getElementById("btnC")
  };

  Object.entries(botones).forEach(([letra, btn]) => {
    btn.disabled = true;

    if (letra === correcta) {
      btn.classList.add("correcta");
    } else {
      btn.classList.add("incorrecta");
    }
  });
}
  
/* ✅ Verificar la letra elegida */
function verificar(letraElegida = ""){
  if (yaValidado) return;

  const r = String(letraElegida).toLowerCase().trim();
  const res = document.getElementById("resultado");
  pintarBotonesRespuesta();

  
  if (r === correcta) {
    sonidoCorrecto();
    res.innerText = "Correcto ✔";
    res.className = "correcto";
    aciertos++;
    racha++;
    if (racha > mejorRacha) mejorRacha = racha;
  } else {
    sonidoIncorrecto();
    res.innerText = `Incorrecto ✘, era ${correcta}) ${respuestaCorrecta}`;
    res.className = "incorrecto";
    errores++;
    racha = 0;
  }

  actualizarStatsUI();
  document.getElementById("lecturas").innerHTML = `
    <div style="color:#86efac; text-shadow:0 0 8px rgba(34,197,94,.35);">
      Kun: <span class="jp">${itemActual.kunyomi || "—"}</span>
    </div>
  
    <div style="color:#c4b5fd; text-shadow:0 0 8px rgba(125,92,255,.35);">
      On: <span class="jp">${itemActual.onyomi || "—"}</span>
    </div>
  `;
  guardarEstado();
  yaValidado = true;
}

/* ✅ Botones a/b/c: verifican; si ya estaba validado, avanzan */
function responder(letra){
  if (!yaValidado) {
    verificar(letra);
    return;
  }
  siguiente();
}

/* ✅ Siguiente: si no respondió, cuenta como incorrecto; si ya está validado, avanza */
function accionSiguiente(){
  if (!yaValidado) {
    verificar("");
    return;
  }

  siguiente();
}

/*
  ✅ Mostrar respuesta:
  - la primera vez: muestra "Respuesta: ... (era b)" y CUENTA ERROR
  - la segunda vez: avanza (para que también sea de 2 toques como "Siguiente")
*/

/* Reset stats: resetea todo (stats + UI) */
function resetStats(){
  aciertos = 0;
  errores = 0;
  racha = 0;
  mejorRacha = 0;
  actualizarStatsUI();
  guardarEstado();
  siguiente();
}
  
function aplicarEstiloOpciones(){
  const op = document.getElementById("opciones");
  const opcionesSonJapones = (dirActual === "sig-kanji"); // en este modo la respuesta/opciones son kanji
  op.classList.toggle("jp", opcionesSonJapones);
}

</script>
  </div>
</body>
</html>
