<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Salón de Honor — Asallam Sensei</title>

<style>

body{
    margin:0;
    font-family: Arial, "Segoe UI Emoji", "Apple Color Emoji", sans-serif;
    background: radial-gradient(circle at top,#10162a,#050814);
    color:white;
    text-align:center;
}

header{
    padding:60px 20px 30px;
}

h1{
    font-size:40px;
    margin-bottom:10px;
}

.subtitle{
    color:#aab3ff;
    font-size:18px;
}

.section{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
}

.section h2{
    margin-bottom:25px;
    font-size:28px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    position:relative;
    overflow:hidden;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:14px;
    padding:20px;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

.card:hover{
    transform:translateY(-5px);
    border-color:#7d5cff;
}
    
.card::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:60%;
    height:100%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.35),
        transparent
    );
    transform:skewX(-25deg);
}

.card:hover::before{
    animation:shine 1s ease;
}

@keyframes shine{
    100%{
        left:150%;
    }
}

.country{
  font-size:14px;
  color:#aab3ff;
  margin-top:4px;
}
    
.name{
    font-size:20px;
    font-weight:bold;
}

.alias{
  font-size:14px;
  color:#ffd166;
  margin-top:4px;
}

.jp{
    font-size:26px;
    color:#aab3ff;
    font-weight:normal;
}
    
footer{
    margin-top:40px;
    padding:30px;
    font-size:14px;
    color:#889;
}
    
</style>
</head>

<body>

<header>

<h1>
Salón de Honor
<br>
<span class="jp">名誉の殿堂</span>
</h1>
    
<div class="subtitle">
Personas que han apoyado el proyecto educativo de Asallam Sensei
</div>

</header>

<div class="section">

<h2>Estudiantes de todo el mundo 🌍</h2>

<div class="grid">

<!-- AGREGA NOMBRES AQUÍ -->

<div class="card">
  <div class="name">Freddy</div>
  <div class="country">🇻🇪 🇪🇸</div>
  <div class="alias">Tarea fija</div>
</div>

</div>
</div>
    
<footer>

Proyecto educativo — Asallam Sensei  
<br>
Cada nombre aquí representa esfuerzo, dedicación y amor por el aprendizaje.

</footer>

</body>
</html>
