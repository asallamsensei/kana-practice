<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>English Vocab — Asallam Sensei</title>

<style>
  :root{
    --bg: #0b1020;
    --card: rgba(255,255,255,.08);
    --card2: rgba(255,255,255,.10);
    --text: #eef2ff;
    --muted: rgba(238,242,255,.75);
    --accent: #7d5cff;
    --accent2:#22c55e;
    --danger:#ef4444;
    --border: rgba(255,255,255,.14);

    --dictadoRed: #ff3b30;
    --dictadoRedSoft:#d94a45;
  }

  body{
    margin:0;
    font-family: Arial, sans-serif;
    background: radial-gradient(1200px 700px at 20% 10%, rgba(125,92,255,.35), transparent 60%),
                radial-gradient(900px 600px at 90% 20%, rgba(34,197,94,.22), transparent 60%),
                radial-gradient(900px 600px at 30% 90%, rgba(239,68,68,.18), transparent 55%),
                var(--bg);
    color: var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:30px 16px 76px;
  }

  .wrap{ width:min(1120px, 100%); }

  header{
    display:flex;
    flex-direction:column;
    gap:16px;
    margin-bottom:16px;
    align-items:center;
    text-align:center;
  }

h1{
  margin:0;
  font-size: 30px;
  letter-spacing:.2px;
  text-shadow:
    0 0 10px rgba(125,92,255,.22),
    0 0 24px rgba(125,92,255,.10);
}

  .studentLine{
    margin-top:-6px;
    color: var(--muted);
    font-weight:900;
    font-size:14px;
  }
  
.studentBadge{
  display:inline-flex;
  gap:8px;
  align-items:center;
  padding:8px 12px;
  border-radius:999px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,.06);
  box-shadow:
    0 0 10px rgba(125,92,255,.12),
    inset 0 0 8px rgba(125,92,255,.06);
}

.grid{
  display:grid;
  grid-template-columns: minmax(0, 1fr) 320px;
  gap:16px;
}

.card{
  background: linear-gradient(180deg, var(--card2), var(--card));
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow:
    0 18px 45px rgba(0,0,0,.35),
    0 0 18px rgba(125,92,255,.08);
  padding: 20px;
}

  .pill{
    padding: 10px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.06);
    color: var(--muted);
    font-size: 14px;
    font-weight: 900;
  }

  .row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
  }

  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-top:10px;
  }

  .chip{
    padding: 10px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.06);
    color: var(--muted);
    cursor:pointer;
    user-select:none;
    font-size: 14px;
    font-weight: 900;
    transition:.12s;
  }
  .chip:hover{ transform: translateY(-1px); }
  
.chip.activo{
  background: var(--accent);
  color: white;
  border-color: transparent;
  box-shadow:
    0 0 10px rgba(125,92,255,.34),
    0 0 20px rgba(125,92,255,.14);
}

#opcionesTexto{
  margin-top: 10px;
  font-size: 25px;
  line-height: 1.7;
  text-align: left;
  width: fit-content;
  max-width: min(720px, 100%);
  margin-left: auto;
  margin-right: auto;
  padding: 10px 14px;
  border-radius: 14px;
  border: 1px dashed rgba(255,255,255,.22);
  background: rgba(0,0,0,.18);
  word-break: break-word;
}

.opcion-btn{
  min-width: 110px;
  min-height: 62px;
  padding: 12px 14px;
  border-radius: 16px;

  background: rgba(110,95,255,.16);
  border: 1px solid rgba(145,120,255,.42);
  color: #efe9ff;

  font-size: 20px;
  font-weight: 700;
  text-align: center;

  box-shadow:
    0 0 6px rgba(125,92,255,.6),
    0 0 14px rgba(125,92,255,.35),
    inset 0 0 8px rgba(125,92,255,.15);
}

.opcion-btn:not(:disabled):hover{
  background: rgba(120,100,255,.24);

  box-shadow:
    0 0 10px rgba(125,92,255,.9),
    0 0 24px rgba(125,92,255,.6);
}

.opcion-btn.correcta{
  background: rgba(34,197,94,.18);
  border: 1px solid rgba(34,197,94,.45);
  color: #dcfce7;

  box-shadow:
    0 0 10px rgba(34,197,94,.35),
    0 0 22px rgba(34,197,94,.18),
    inset 0 0 8px rgba(34,197,94,.10);
}

.opcion-btn.incorrecta{
  background: rgba(239,68,68,.18);
  border: 1px solid rgba(239,68,68,.45);
  color: #fecaca;

  box-shadow:
    0 0 10px rgba(239,68,68,.35),
    0 0 22px rgba(239,68,68,.18),
    inset 0 0 8px rgba(239,68,68,.10);
}

.opcion-btn:disabled{
  cursor: default;
}

.opcion-btn:disabled{
  cursor: default;
}

.opcion-btn:disabled:hover{
  transform: none;
  filter: none;
}
  
.btn{
  border: none;
  border-radius: 12px;
  padding: 12px 16px;
  cursor: pointer;

  color: #fff;

  background: rgba(180, 55, 110, .38);

  border: 1px solid rgba(255, 120, 180, .22);

  font-weight: 900;
  font-size: 15px;
  transition: .15s;

  backdrop-filter: blur(8px);

  box-shadow:
    0 0 10px rgba(180,55,110,.18),
    0 0 20px rgba(125,92,255,.10),
    inset 0 0 8px rgba(255,255,255,.04);
}

.btn:not(:disabled):hover{
  transform: translateY(-1px);

  background: rgba(190, 65, 120, .48);

  box-shadow:
    0 0 14px rgba(190,65,120,.24),
    0 0 28px rgba(125,92,255,.14);
}
  
  .btn:disabled{ cursor:not-allowed; transform:none; filter:none; }
  
  .btn-ghost{
    background: rgba(255,255,255,.08);
    border: 1px solid var(--border);
    color: var(--text);
    font-weight: 900;
  }

.btn-mode{
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,.06);
  color: var(--muted);
  cursor:pointer;
  user-select:none;
  font-size: 14px;
  font-weight: 900;
  transition:.12s;
}

.btn-mode:hover{
  transform: translateY(-1px);
}

.btn-mode.activo{
  background: var(--accent);
  color: white;
  border-color: transparent;
  box-shadow:
    0 0 10px rgba(125,92,255,.34),
    0 0 20px rgba(125,92,255,.14);
}

  .big{
    text-align:center;
    padding: 24px 12px 14px;
  }

  #studentLabel{
    color: #ffffff;
    font-size:18px;
    text-shadow:
      0 0 4px #7d5cff,
      0 0 8px #7d5cff,
      0 0 14px #7d5cff,
      0 0 24px rgba(125,92,255,.7);
  }
  
  #promptMain{
    font-size: 40px;
    font-weight: 900;
    letter-spacing: .5px;
    margin: 6px 0 10px;
    word-break: break-word;
  }
  #promptMain.esPregunta{
    font-size: 40px;
    font-weight: 900;
    letter-spacing: .2px;
    line-height: 1.25;
  }

  #promptSub{
    color: var(--muted);
    font-size: 17px;
    margin: 0 0 10px;
    min-height: 20px;
  }

  #resultado{
    margin-top: 10px;
    font-size: 22px;
    min-height: 30px;
    text-align:center;
    font-weight: 900;
    white-space: pre-line;
  }
  .correcto{ color: var(--accent2); }
  .incorrecto{ color: var(--danger); }

  .stats{
    margin-top: 10px;
    text-align:center;
    color: var(--muted);
    font-size: 16px;
  }

.switch{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:12px;
}

.switch .btn-mode{
  padding: 11px 18px;
  border-radius: 999px;
  font-size: 14px;
  width:auto;
}

.btnAudioBig{
  border:none;
  cursor:pointer;
  background: rgba(255,255,255,.08);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 16px;
  padding: 14px 16px;
  font-size: 22px;
  line-height: 1;
  user-select:none;
  margin-top: 6px;
  box-shadow:
    0 0 10px rgba(125,92,255,.16),
    inset 0 0 10px rgba(125,92,255,.08);
}
.btnAudioBig:hover{
  filter: brightness(1.1);
  transform: translateY(-1px);
  box-shadow:
    0 0 12px rgba(125,92,255,.24),
    0 0 24px rgba(125,92,255,.12),
    inset 0 0 10px rgba(125,92,255,.10);
}
  .btnAudioBig:active{ transform: translateY(0px); }
  .btnAudioBig[disabled]{ opacity:.35; cursor:not-allowed; transform:none; }

.actions{
  display:flex;
  justify-content:center;
  margin-top: 14px;
}

.btn-next{
  min-width: 220px;
}

  /* ========== MODAL CLAVE ========== */
  .modalBack{
    position:fixed;
    inset:0;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(8px);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index: 9999;
    padding: 16px;
  }
  .modal{
    width:min(560px, 100%);
    background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
    border:1px solid var(--border);
    border-radius: 18px;
    box-shadow: 0 18px 55px rgba(0,0,0,.55);
    padding: 18px;
  }
  
  .modal h2{
    margin:0 0 8px;
    font-size: 20px;
    letter-spacing: .2px;
  }
  
.modal p{
  margin:0 0 16px;
  color: var(--muted);
  line-height: 1.5;
  font-size: 14px;
}
  
  .modalRow{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:flex-start;
  }
  
.modalRow input{
  flex:1;
  min-width: 220px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.18);
  color: var(--text);
  border-radius: 14px;
  padding: 14px 16px;
  font-size: 16px;
  font-weight: 700;
  outline: none;
  box-shadow:
    inset 0 0 10px rgba(125,92,255,.06),
    0 0 0 rgba(125,92,255,0);
  transition: .18s ease;
}

.modalRow input::placeholder{
  color: rgba(238,242,255,.45);
  font-weight: 600;
}

.modalRow input:focus{
  border-color: rgba(125,92,255,.75);
  background: rgba(255,255,255,.10);
  box-shadow:
    0 0 0 3px rgba(125,92,255,.16),
    0 0 18px rgba(125,92,255,.18),
    inset 0 0 10px rgba(125,92,255,.08);
}
  
  .modalErr{
    margin-top:10px;
    min-height: 18px;
    color: #fecaca;
    font-weight: 900;
    font-size: 13px;
  }

@media (max-width: 900px){
  .grid{
    grid-template-columns: 1fr;
  }

  #opcionesTexto{
    font-size: 20px;
    line-height: 1.6;
    padding: 8px 10px;
  }

  .opcion-btn{
    min-width: 85px;
    min-height: 48px;
    font-size: 18px;
    padding: 8px 10px;
  }

  #promptMain.esPregunta{
    font-size: 22px;
  }
}
</style>
</head>

<body>

<!-- Modal de clave -->
<div id="claveBack" class="modalBack" aria-hidden="false">
  <div class="modal">
    <h2>🔒 Código de estudiante</h2>
    <p>Escribe tu clave para iniciar.</p>

    <div class="modalRow">
      <input id="claveInput" type="text" placeholder="Escribe tu clave..." autocomplete="off" />
      <button class="btn" type="button" onclick="validarClave()">Entrar</button>
    </div>

    <div id="claveErr" class="modalErr"></div>
  </div>
</div>

<div class="wrap">
  <header>
    <h1>English Vocab ★ Asallam Sensei</h1>

    <div class="studentLine">
      <span class="studentBadge">
        👤 <span id="studentLabel">Estudiante: —</span>
      </span>
    </div>
  </header>

  <div class="grid">

    <div class="card big">
      <div id="promptMain">—</div>
      <div id="promptSub"></div>

      <div id="opcionesTexto"></div>
      
      <div class="row" style="justify-content:center; margin-top: 16px;">
        <button id="btn-opcion-a" class="btn opcion-btn" type="button" onclick="responder('a')">A</button>
        <button id="btn-opcion-b" class="btn opcion-btn" type="button" onclick="responder('b')">B</button>
        <button id="btn-opcion-c" class="btn opcion-btn" type="button" onclick="responder('c')">C</button>
      </div>

      <div id="resultado"></div>
      
      <div class="actions">
        <button class="btn btn-next" type="button" onclick="accionSiguiente()">Siguiente</button>
      </div>
      
      <div class="stats">
        <div>
          Aciertos: <span id="aciertos">0</span> —
          Errores: <span id="errores">0</span>
        </div>
      
        <div style="margin-top:6px;">
          Racha: <span id="racha">0</span> —
          Mejor racha: <span id="mejorRacha">0</span> —
          Precisión: <span id="precision">0%</span>
        </div>
      </div>
      
    </div>

    <div class="card">
    
      <div class="row" style="justify-content:flex-start;">
        <span class="pill">Modos</span>
      </div>
    
      <div class="switch">
        <button class="btn btn-mode" id="m-en-es" type="button" onclick="setModoBase('en-es')">EN → ES</button>
        <button class="btn btn-mode" id="m-es-en" type="button" onclick="setModoBase('es-en')">ES → EN</button>
        <button class="btn btn-mode" id="m-dictado" type="button" onclick="toggleDictado()">Dictado</button>
        <button class="btn btn-mode" id="m-mix" type="button" onclick="setModoBase('mix')">Mix</button>
      </div>
    
      <div class="row" style="justify-content:flex-start; margin-top:18px;">
        <span class="pill">Bloques</span>
      </div>

      <div class="row" style="justify-content:flex-start; margin-top:12px;">
        <div id="chipsBloques" class="chips"></div>
      </div>

      <div class="row" style="justify-content:flex-start; margin-top:14px;">
        <button id="btnTodo" class="chip" type="button" onclick="seleccionarTodo()">Todos</button>
      </div>
      <div class="row" style="justify-content:flex-start; margin-top:18px;">
        <span class="pill">Pool de distractores</span>
      </div>

      <div class="row" style="justify-content:flex-start; margin-top:12px;">
        <button class="btn btn-mode" id="pool-sel" type="button" onclick="setPoolScope('seleccion')">Solo selección</button>
        <button class="btn btn-mode" id="pool-glob" type="button" onclick="setPoolScope('global')">Global</button>
      </div>

    </div>

  </div>
</div>

<script>
/* ===============================
   CONFIG
=============================== */
const JSON_PATH  = "data/english_vocab.json";
const AUDIO_BASE = "data/audios/english/";

/* ===============================
   CLAVES -> ESTUDIANTES
   (agrega más aquí)
=============================== */
const CLAVES = [
  { clave: "paopao", estudiante: "Paola (México)" },
  { clave: "procura", estudiante: "Katherine (Colombia)" },
  { clave: "costeña", estudiante: "Sandra (Colombia)" },  
];

let estudianteActual = null;

/* ===============================
   HELPERS
=============================== */
function $(id){ return document.getElementById(id); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function shuffle(arr){ return arr.slice().sort(()=>Math.random()-0.5); }
function norm(s){
  return String(s || "")
    .trim()
    .toLowerCase()
    .replace(/\s+/g," ");
}

/* ===============================
   MODAL CLAVE
=============================== */
function validarClave(){
  const raw = $("claveInput").value;
  const key = norm(raw);

  const found = CLAVES.find(x => norm(x.clave) === key);
  if(!found){
    $("claveErr").textContent = "Clave incorrecta. Intenta de nuevo.";
    return;
  }

  estudianteActual = found.estudiante;
  $("studentLabel").textContent = "Estudiante: " + estudianteActual;

  $("claveBack").style.display = "none";
  $("claveBack").setAttribute("aria-hidden", "true");

  audioHabilitado = true;
  
  // solo suena al entrar si NO es ES→EN (y no dictado)
  if(!(rondaDir === "es-en" && !rondaDictado)){
    playAudio(ultimoAudioKey);
  }
}
document.addEventListener("DOMContentLoaded", ()=>{
  $("claveInput").addEventListener("keydown", (e)=>{
    if(e.key === "Enter") validarClave();
  });
});

/* ===============================
   DATA (bloques)
=============================== */
let DATA = { bloques: [] };
let bloquesActivos = new Set();
let poolScope = "seleccion";

/* ===============================
   STATS
=============================== */
let aciertos = 0;
let errores  = 0;
let racha = 0;
let mejorRacha = 0;

function pintarStats(){
  $("aciertos").innerText = aciertos;
  $("errores").innerText  = errores;
  $("racha").innerText = racha;
  $("mejorRacha").innerText = mejorRacha;

  const total = aciertos + errores;
  const precision = total > 0 ? Math.round((aciertos / total) * 100) : 0;
  $("precision").innerText = precision + "%";
}

/* ===============================
   MODOS
   modoBase:
     - "en-es" | "es-en" | "mix"
   dictadoOn:
     - solo se usa cuando modoBase != "mix"
   En "mix":
     - cada ronda decide dirección y decide dictado al azar
=============================== */
let usarEnEs = true;
let usarEsEn = false;
let usarDictado = false;

// efectivos por ronda
let rondaDir = "en-es";
let rondaDictado = false;

let correctaLetra = "";
let respuestaCorrecta = "";
let yaValidado = false;

let opcionesActuales = [];
let indiceCorrecto = 0;

const letras = ["a","b","c"];

/* ===============================
   AUDIO
   - usa item.en como "key" de mp3
   - reproduce en dictado y también como apoyo
=============================== */
const audio = new Audio();
audio.preload = "auto";
let ultimoAudioKey = "";

// autoplay policy: solo tras interacción
let audioHabilitado = false;
document.addEventListener("pointerdown", () => (audioHabilitado = true), { once:true });
document.addEventListener("keydown",     () => (audioHabilitado = true), { once:true });

function buildExactAudioSrc(key){
  const k = String(key || "").trim();
  if(!k) return "";
  return AUDIO_BASE + encodeURIComponent(k) + ".mp3";
}
function detenerAudio(){
  try{ audio.pause(); audio.currentTime = 0; }catch{}
}
async function playAudio(key){
  ultimoAudioKey = String(key || "").trim();
  if(!audioHabilitado) return;

  const src = buildExactAudioSrc(ultimoAudioKey);
  if(!src) return;

  try{
    detenerAudio();
    audio.src = src;
    audio.load();
    await audio.play();
  }catch{}
}
function reproducirAudioActual(){
  if(ultimoAudioKey) playAudio(ultimoAudioKey);
}

/* ===============================
   POOLS
=============================== */
function getPool(scope){
  const idxs = (scope === "global")
    ? DATA.bloques.map((_, i) => i)
    : [...bloquesActivos];

  let pool = [];
  idxs.forEach(i=>{
    const b = DATA.bloques[i];
    if(b?.vocabulario?.length) pool = pool.concat(b.vocabulario);
  });
  return pool;
}

/* ===============================
   UI MODO
=============================== */
function aplicarUI(){
  $("m-en-es")?.classList.toggle("activo", usarEnEs);
  $("m-es-en")?.classList.toggle("activo", usarEsEn);
  $("m-dictado")?.classList.toggle("activo", usarDictado);

  const mixActivo = usarEnEs && usarEsEn && usarDictado;
  $("m-mix")?.classList.toggle("activo", mixActivo);
}

function refrescarModo(){
  aplicarUI();
  yaValidado = false;
  limpiarResultado();
  siguiente();
}

function setModoBase(modo){
  if(modo === "en-es"){
    if(usarEnEs && !usarEsEn && !usarDictado) return;

    usarEnEs = true;
    usarEsEn = false;
    usarDictado = false;
  }

  if(modo === "es-en"){
    if(usarEsEn && !usarEnEs && !usarDictado) return;

    usarEnEs = false;
    usarEsEn = true;
    usarDictado = false;
  }

  if(modo === "mix"){
    const mixActivo = usarEnEs && usarEsEn && usarDictado;

    if(mixActivo){
      usarEnEs = true;
      usarEsEn = false;
      usarDictado = false;
    }else{
      usarEnEs = true;
      usarEsEn = true;
      usarDictado = true;
    }
  }

  refrescarModo();
}

function toggleDictado(){
  usarDictado = !usarDictado;

  if(!usarEnEs && !usarEsEn && !usarDictado){
    usarEnEs = true;
  }

  refrescarModo();
}

/* ===============================
   POOL scope UI
=============================== */
function setPoolScope(scope){
  poolScope = scope;
  $("pool-sel")?.classList.toggle("activo", poolScope === "seleccion");
  $("pool-glob")?.classList.toggle("activo", poolScope === "global");
  yaValidado = false;
  limpiarResultado();
  siguiente();
}

/* ===============================
   Selección de bloques
=============================== */
function seleccionarTodo(){
  bloquesActivos = new Set(DATA.bloques.map((_, i)=>i));

  [...$("chipsBloques").children].forEach(ch=>{
    ch.classList.add("activo");
  });

  $("btnTodo")?.classList.add("activo");

  yaValidado = false;
  limpiarResultado();
  siguiente();
}

function seleccionarNinguna(){
  bloquesActivos.clear();
  [...$("chipsBloques").children].forEach(ch=>ch.classList.remove("activo"));
  const total = DATA.bloques.length;
  const activos = bloquesActivos.size;
  
  $("btnTodo")?.classList.toggle("activo", activos === total);
  limpiarResultado();
  $("promptMain").innerText = "Selecciona un bloque";
  $("promptSub").innerText = "";
  $("opcionesTexto").innerHTML = "";

  [$("btn-opcion-a"), $("btn-opcion-b"), $("btn-opcion-c")].forEach(btn=>{
    btn.disabled = true;
    btn.classList.remove("correcta","incorrecta");
  });
}

/* ===============================
   Render helpers
=============================== */
function limpiarResultado(){
  const res = $("resultado");
  res.innerText = "";
  res.className = "";
}

function bloquearOpciones(){
  document.querySelectorAll(".opcion-btn").forEach(btn => {
    btn.disabled = true;
  });
}

function habilitarOpciones(){
  document.querySelectorAll(".opcion-btn").forEach(btn => {
    btn.disabled = false;
    btn.classList.remove("correcta", "incorrecta");
  });
}

function limpiarEstadoBotones(){
  document.querySelectorAll(".opcion-btn").forEach(btn => {
    btn.classList.remove("correcta", "incorrecta");
  });
}
  
function pintarOpciones(letraElegida){
  const box = $("opcionesTexto");

  if(!opcionesActuales || opcionesActuales.length < 3) return;

  box.innerHTML = opcionesActuales.map((txt, idx) => {
    const letra = letras[idx];
    return `<div>${letra}) ${txt}</div>`;
  }).join("");

  const mapa = {
    a: $("btn-opcion-a"),
    b: $("btn-opcion-b"),
    c: $("btn-opcion-c")
  };

  Object.values(mapa).forEach(btn => {
    btn.classList.remove("correcta", "incorrecta");
  });

  Object.entries(mapa).forEach(([letra, btn]) => {
    if(letra === correctaLetra){
      btn.classList.add("correcta");
    }else{
      btn.classList.add("incorrecta");
    }
  });
}

function aplicarEstiloPregunta(){
  const el = $("promptMain");
  if(rondaDir === "es-en") el.classList.add("esPregunta");
  else el.classList.remove("esPregunta");
}

/* ========== Mapeo EN/ES ========== */
function textoPregunta(item){
  return (rondaDir === "en-es") ? item.en : item.es;
}
function textoRespuesta(item){
  return (rondaDir === "en-es") ? item.es : item.en;
}

function renderPrompt(itemCorrecto){
  const promptEl = $("promptMain");
  const subEl = $("promptSub");

  aplicarEstiloPregunta();

  // audio key: en
  ultimoAudioKey = String(itemCorrecto.en || "").trim();

  if(rondaDictado){
    const label = (rondaDir === "en-es")
      ? "🎧 Dictado: elige el significado (ES)"
      : "🎧 Dictado: elige la palabra (EN)";

    subEl.innerText = label;

    promptEl.innerHTML = `
      <button id="promptSpeaker" class="btnAudioBig" type="button" title="Escuchar" onclick="reproducirAudioActual()">🔊</button>
    `;
  }else{
    promptEl.textContent = textoPregunta(itemCorrecto);
    subEl.innerHTML = `
      <button id="promptSpeaker" class="btnAudioBig" type="button" title="Escuchar" onclick="reproducirAudioActual()">🔊</button>
    `;
  }
}

/* ===============================
   Opciones (3)
=============================== */
function renderOpciones(opciones){
  opcionesActuales = opciones.slice();
  indiceCorrecto = opciones.indexOf(respuestaCorrecta);

  $("opcionesTexto").innerHTML = `
    a) ${opciones[0]}<br>
    b) ${opciones[1]}<br>
    c) ${opciones[2]}
  `;

  limpiarEstadoBotones();
  habilitarOpciones();
}

function responder(letra){
  if(yaValidado) return;
  verificar(letra);
}
  
/* ===============================
   Flujo ronda (SUPER MIX)
=============================== */
function elegirRondaDir(){
  const dirs = [];

  if(usarEnEs) dirs.push("en-es");
  if(usarEsEn) dirs.push("es-en");

  if(dirs.length === 0){
    usarEnEs = true;
    aplicarUI();
    return "en-es";
  }

  return pick(dirs);
}

function elegirRondaDictado(){
  return usarDictado;
}

function build3Options(pool, correctValue, mapFn){
  const opciones = [correctValue];
  let tries = 0;

  while(opciones.length < 3 && tries < 200){
    tries++;
    const v = mapFn(pick(pool));
    if(v != null && v !== "" && !opciones.includes(v)) opciones.push(v);
  }
  while(opciones.length < 3) opciones.push("—");
  return shuffle(opciones);
}

function getActivosValidos(){
  return [...bloquesActivos].filter(i => DATA.bloques[i]?.vocabulario?.length >= 3);
}

function siguiente(){
  const activos = getActivosValidos();
  if(activos.length === 0){
    $("promptMain").innerText = (DATA.bloques.length ? "Selecciona un bloque con ≥ 3 palabras" : "No hay data");
    $("promptSub").innerText = "";
    $("opcionesTexto").innerHTML = "";
    bloquearOpciones();
    return;
  }

  rondaDir = elegirRondaDir();
  rondaDictado = elegirRondaDictado();

  const bloqueIdx = pick(activos);
  const b = DATA.bloques[bloqueIdx];
  const poolLocal = b.vocabulario;

  const itemCorrecto = pick(poolLocal);
  respuestaCorrecta = textoRespuesta(itemCorrecto);

  const poolOpciones = getPool(poolScope);
  const basePool = (poolOpciones.length >= 3) ? poolOpciones : poolLocal;

  const opciones = build3Options(basePool, respuestaCorrecta, x => textoRespuesta(x));
  correctaLetra = letras[opciones.indexOf(respuestaCorrecta)];

  renderPrompt(itemCorrecto);
  renderOpciones(opciones);

  limpiarResultado();
  yaValidado = false;

  if(!(rondaDir === "es-en" && !rondaDictado)){
    playAudio(ultimoAudioKey);
  }
}

/* ===============================
   Responder / Verificar
=============================== */

function verificar(letraForzada){
  const res = $("resultado");
  const letra = String(letraForzada || "").toLowerCase().trim();

  if(letra === correctaLetra){
    sonidoCorrecto();
    res.className = "correcto";
    res.innerText = "Correcto ✔";
    aciertos++;
    racha++;
    if(racha > mejorRacha) mejorRacha = racha;
  }else{
    sonidoIncorrecto();
    res.className = "incorrecto";
    res.innerText = `Incorrecto ✘\nEra: ${respuestaCorrecta}`;
    errores++;
    racha = 0;
  }

  pintarStats();
  yaValidado = true;

  pintarOpciones(letra);
  bloquearOpciones();
}
  
function accionSiguiente(){
  if(!yaValidado){
    sonidoIncorrecto();
    errores++;
    racha = 0;
    pintarStats();
    yaValidado = true;
  
    const res = $("resultado");
    res.className = "incorrecto";
    res.innerText = `Saltado ✘\nEra: ${respuestaCorrecta}`;
  
    pintarOpciones(null);
    bloquearOpciones();
  
    return;
  }

  siguiente();
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBeep(freq, duration){
  try{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value = freq;
    osc.type = "sine";
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);

    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }catch{}
}

function sonidoCorrecto(){
  playBeep(700, 0.08);
  setTimeout(() => playBeep(900, 0.12), 80);
}

function sonidoIncorrecto(){
  playBeep(250, 0.2);
}
  
/* ===============================
   CARGA JSON + chips bloques
=============================== */
function renderChips(){
  const cont = $("chipsBloques");
  cont.innerHTML = "";

  DATA.bloques.forEach((b, i)=>{
    const chip = document.createElement("div");
    chip.className = "chip" + (bloquesActivos.has(i) ? " activo" : "");
    chip.textContent = b.nombre || `Bloque ${i+1}`;

    chip.onclick = ()=>{
      bloquesActivos = new Set(DATA.bloques.map((_, idx)=>idx));
    
      [...cont.children].forEach(el=>{
        el.classList.add("activo");
      });
    
      $("btnTodo")?.classList.add("activo");
    
      yaValidado = false;
      limpiarResultado();
      siguiente();
    };

    cont.appendChild(chip);
  });
}

fetch(JSON_PATH)
  .then(r=>r.json())
  .then(json=>{
    DATA = (json && json.bloques) ? json : { bloques: [] };

    if(DATA.bloques.length === 0){
      $("promptMain").innerText = "No hay bloques en el JSON";
      $("promptSub").innerText = "";
      return;
    }

    // default: todo activo
    bloquesActivos = new Set(DATA.bloques.map((_, i)=>i));
    $("btnTodo")?.classList.add("activo");

    renderChips();

    // defaults
    setPoolScope("seleccion");
    setModoBase("mix"); // ✅ Mix default
  })
  .catch(err=>{
    console.error(err);
    $("promptMain").innerText = "No se pudo cargar " + JSON_PATH;
    $("promptSub").innerText = "Revisa ruta y usa servidor (GitHub Pages / Live Server).";
  });

document.addEventListener("keydown", (event) => {
  const tag = (document.activeElement?.tagName || "").toLowerCase();
  const enCampo = tag === "input" || tag === "textarea";

  if (enCampo) return;

  const key = event.key.toLowerCase();

  if (key === "a") {
    event.preventDefault();
    if (!yaValidado) responder("a");
    else siguiente();
    return;
  }
  
  if (key === "b") {
    event.preventDefault();
    if (!yaValidado) responder("b");
    else siguiente();
    return;
  }
  
  if (key === "c") {
    event.preventDefault();
    if (!yaValidado) responder("c");
    else siguiente();
    return;
  }

  if (key === "enter") {
    event.preventDefault();
    accionSiguiente();
  }
});
  
</script>
