<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EL VIVO de Asallam Sensei</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#07101f;
      --bg2:#0d1630;
      --text:#eef2ff;
      --muted:rgba(238,242,255,.72);
      --border:rgba(255,255,255,.10);
      --shadow:0 20px 60px rgba(0,0,0,.35);

      --violet-1:#6d28d9;
      --violet-2:#9333ea;
      --blue-1:#2563eb;
      --blue-2:#1d4ed8;
      --red-1:#dc2626;
      --red-2:#ef4444;
      --orange-1:#ea580c;
      --orange-2:#f97316;

      --card-kanji:linear-gradient(135deg, rgba(109,40,217,.24), rgba(37,99,235,.16));
      --card-word:linear-gradient(135deg, rgba(220,38,38,.18), rgba(249,115,22,.14));
      --card-sentence:linear-gradient(135deg, rgba(37,99,235,.18), rgba(147,51,234,.16));

      --panel-soft:rgba(255,255,255,.05);
      --panel-strong:rgba(255,255,255,.08);

      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:18px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}

    body{
      font-family:Inter,system-ui,sans-serif;
      color:var(--text);
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(109,40,217,.20), transparent 28%),
        radial-gradient(circle at top right, rgba(239,68,68,.16), transparent 28%),
        radial-gradient(circle at bottom center, rgba(249,115,22,.12), transparent 30%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }

    .wrap{
      width:min(1400px, calc(100% - 32px));
      margin:0 auto;
      padding:32px 0 64px;
    }

    .page-title{
      margin:0 0 22px;
      font-size:clamp(2rem, 4.5vw, 3.4rem);
      line-height:1.02;
      letter-spacing:-.03em;
      font-weight:900;
    }

    .filters-panel{
      display:grid;
      grid-template-columns: minmax(280px, 360px) 1fr;
      gap:18px;
      margin-bottom:28px;
      padding:22px;
      border-radius:32px;
      border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(135deg, rgba(109,40,217,.16), rgba(37,99,235,.10), rgba(239,68,68,.08));
      box-shadow:var(--shadow);
      backdrop-filter: blur(10px);
    }

    .filter-block{
      display:grid;
      gap:14px;
      align-content:start;
      padding:18px;
      border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.10);
    }

    .filter-title{
      font-size:.92rem;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#ddd6fe;
    }

    .toggle-group{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .toggle-chip{
      appearance:none;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
      color:var(--text);
      border-radius:999px;
      padding:12px 16px;
      font-size:.95rem;
      font-weight:800;
      line-height:1;
      cursor:pointer;
      transition:.2s transform ease, .2s background ease, .2s border-color ease, .2s box-shadow ease, .2s opacity ease;
    }

    .toggle-chip:hover{
      transform:translateY(-1px);
      border-color:rgba(255,255,255,.24);
    }

    .toggle-chip.is-active{
      background:linear-gradient(135deg, rgba(147,51,234,.32), rgba(37,99,235,.28), rgba(239,68,68,.24));
      border-color:rgba(255,255,255,.22);
      box-shadow:0 10px 24px rgba(0,0,0,.22);
    }

    .tags-wrap{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-content:start;
      max-height:none;
    }

    .empty-tags{
      color:var(--muted);
      font-weight:700;
      font-size:.96rem;
    }

    .results-info{
      margin:0 0 18px;
      color:var(--muted);
      font-weight:700;
      font-size:.96rem;
    }

    .vivo-grid{
      position: relative;
      min-height: 200px;
    }

    .entry{
      position: absolute;
      border:1px solid var(--border);
      border-radius:var(--radius-xl);
      overflow:hidden;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      width:fit-content;
      max-width:100%;
      height:auto;
    }

    .entry--kanji{background-image:var(--card-kanji)}
    .entry--word{background-image:var(--card-word)}
    .entry--sentence{background-image:var(--card-sentence)}

    .entry-top{
      display:inline-flex;
      align-items:center;
      gap:14px;
      padding:18px 22px;
      border-bottom:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.05);
      width:fit-content;
      border-radius:0 0 18px 0;
    }

    .entry-tag{
      font-size:.82rem;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#fbcfe8;
    }

    .entry-date{
      font-size:.95rem;
      color:var(--muted);
      font-weight:800;
      text-align:right;
    }

    .entry-body{
      padding:22px;
      display:grid;
      gap:18px;
      align-content:start;
    }

    .summary{
      display:grid;
      gap:10px;
      user-select:none;
    }

    .jp-line{
      font-family:"Noto Sans JP", sans-serif;
      font-size:clamp(1.8rem, 3.8vw, 3rem);
      font-weight:900;
      line-height:1.2;
      letter-spacing:.01em;
    }

    .reading-line{
      font-size:1rem;
      color:#ddd6fe;
      font-weight:700;
    }

    .es-line{
      font-size:1.12rem;
      font-weight:800;
      color:#fff;
      line-height:1.35;
    }

    .details{
      display:grid;
      gap:16px;
      padding-top:6px;
      animation:fadeIn .18s ease;
    }

    .entry.open .details{
      display:grid;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(-4px)}
      to{opacity:1; transform:translateY(0)}
    }

    .meaning-boxes{
      display:grid;
      grid-auto-flow:column;
      grid-auto-columns:max-content;
      gap:14px;
      width:fit-content;
    }

    .meaning-box{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      border-radius:22px;
      padding:16px;
    }

    .label{
      display:block;
      margin-bottom:8px;
      font-size:.78rem;
      text-transform:uppercase;
      letter-spacing:.08em;
      font-weight:900;
      color:#fecdd3;
    }

    .value{
      line-height:1.7;
      font-size:1rem;
      color:var(--text);
    }

    .panel{
      display:grid;
      gap:12px;
      padding:18px;
      border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.10);
    }

    .panel-title{
      font-size:1rem;
      font-weight:900;
      letter-spacing:.02em;
      color:#fff;
    }

    .pieces{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      width:fit-content;
    }

    .piece{
      display:grid;
      gap:10px;
      align-items:start;
      padding:16px;
      border-radius:18px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      width:fit-content;
    }

    .piece .jp{
      font-family:"Noto Sans JP", sans-serif;
      font-size:1.2rem;
      font-weight:800;
      line-height:1.35;
    }

    .piece .romaji{
      color:#ddd6fe;
      font-weight:700;
      font-size:.95rem;
      margin-top:4px;
    }

    .piece .es{
      color:var(--muted);
      line-height:1.6;
      font-size:1rem;
    }

    .piece .exp{
      color:var(--muted);
      line-height:1.65;
    }

    .kanji-grid{
      display:grid;
      grid-auto-flow:column;
      grid-auto-columns:max-content;
      gap:14px;
      width:fit-content;
    }

    .kanji-card{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      border-radius:22px;
      padding:16px;
      display:grid;
      gap:10px;
      justify-items:center;
      text-align:center;
    }

    .kanji-card--solo{
      grid-template-columns:1fr;
    }

    .kanji-main{
      display:grid;
      gap:10px;
      justify-items:center;
    }

    .kanji-char{
      width:76px;
      height:76px;
      border-radius:20px;
      display:grid;
      place-items:center;
      font-family:"Noto Sans JP", sans-serif;
      font-size:3rem;
      font-weight:900;
      line-height:1;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
    }

    .kanji-mean{
      font-size:1rem;
      line-height:1.5;
      color:var(--text);
      font-weight:700;
      text-align:center;
    }

    .footer-badge{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:14px 0;
      font-size:.9rem;
      font-weight:800;
      color:#fff;
      background:rgba(0,0,0,.20);
      border-top:1px solid rgba(255,255,255,.10);
    }

    @media (max-width: 980px){
      .filters-panel{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 900px){
      .vivo-grid{
        position: static;
        min-height: 0;
        display: grid;
        gap: 18px;
        justify-items: start;
      }

      .entry{
        position: static !important;
        left: auto !important;
        top: auto !important;
      }
    }

    @media (max-width: 640px){
      .wrap{
        width:min(100% - 20px, 1400px);
        padding:24px 0 52px;
      }

      .page-title{
        margin-bottom:18px;
      }

      .filters-panel{
        padding:16px;
        border-radius:24px;
      }

      .filter-block{
        padding:16px;
        border-radius:20px;
      }

      .toggle-chip{
        padding:11px 14px;
        font-size:.92rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="page-title">Me lo contaron en el vivo de Asallam Sensei</h1>

    <section class="filters-panel">
      <div class="filter-block">
        <div class="filter-title">Modo</div>
        <div class="toggle-group" id="modeFilters"></div>
      </div>

      <div class="filter-block">
        <div class="filter-title">Tags</div>
        <div class="tags-wrap" id="tagFilters">
          <div class="empty-tags">Cargando tags...</div>
        </div>
      </div>
    </section>

    <p class="results-info" id="resultsInfo"></p>

    <main class="vivo-grid" id="vivoGrid"></main>
  </div>

  <footer class="footer-badge">© Asallam Sensei</footer>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const MODE_CONFIG = [
      { key: 'PALABRA', label: 'Palabras', active: true },
      { key: 'ORACION', label: 'Frases', active: false },
      { key: 'KANJI', label: 'Kanji', active: false }
    ];

    const state = {
      data: [],
      activeModes: new Set(MODE_CONFIG.filter(m => m.active).map(m => m.key)),
      activeTags: new Set(),
      allTags: []
    };

    async function renderCard(element){
      return await html2canvas(element,{backgroundColor:null,scale:2,useCORS:true});
    }

    async function downloadCard(id, filename){
      const element = document.getElementById(id);
      const canvas = await renderCard(element);
      const link = document.createElement('a');
      link.download = `${filename}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    async function downloadAllCards(){
      const cards = [...document.querySelectorAll('.capture-card')];
      for(let i=0;i<cards.length;i++){
        const card = cards[i];
        const name = card.id || `tarjeta-${i+1}`;
        await downloadCard(name, name);
      }
    }

    function normalizeType(type=''){
      const t = type.trim().toUpperCase();
      if (t === 'KANJI') return 'KANJI';
      if (t === 'PALABRA' || t === 'WORD') return 'PALABRA';
      if (t === 'ORACION' || t === 'ORACIÓN' || t === 'FRASE' || t === 'SENTENCE') return 'ORACION';
      return 'ORACION';
    }

    function escapeHtml(text=''){
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function parseTags(theme=''){
      return String(theme)
        .split(/[,|/•]+/g)
        .map(tag => tag.trim())
        .filter(Boolean);
    }

    function getItemTags(item){
      const tags = parseTags(item.theme || '');
      return tags.length ? tags : ['Sin tag'];
    }

    function renderMatiz(item){
      if(!item.matiz) return '';
      return `
        <div class="meaning-box">
          <span class="label">Matiz</span>
          <div class="value">${escapeHtml(item.matiz)}</div>
        </div>
      `;
    }

    function renderKanjiPanel(kanjis){
      if(!kanjis || !kanjis.length) return '';
      return `
        <section class="panel">
          <div class="panel-title">Kanjis</div>
          <div class="kanji-grid">
            ${kanjis.map(k => `
              <div class="kanji-card">
                <div class="kanji-main">
                  <div class="kanji-char">${escapeHtml(k.char || '')}</div>
                  <div class="kanji-mean">${escapeHtml(k.mean || '')}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    function renderWordsPanel(words){
      if(!words || !words.length) return '';
      return `
        <section class="panel">
          <div class="panel-title">Palabras</div>
          <div class="pieces">
            ${words.map(w => `
              <div class="piece">
                <div class="jp">${escapeHtml(w.jp || '')}</div>
                ${w.romaji ? `<div class="romaji">${escapeHtml(w.romaji)}</div>` : ''}
                ${w.es ? `<div class="es">${escapeHtml(w.es)}</div>` : ''}
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    function renderKanjiCard(item, index){
      const meanings = (item.kanjis && item.kanjis.length)
        ? item.kanjis.map(k => `
          <div class="kanji-card kanji-card--solo">
            <div class="kanji-char">${escapeHtml(k.char || '')}</div>
            <div class="kanji-mean">${escapeHtml(k.mean || '')}</div>
          </div>
        `).join('')
        : `
          <div class="kanji-card kanji-card--solo">
            <div class="kanji-char">${escapeHtml(item.jp || '')}</div>
            <div class="kanji-mean">${escapeHtml(item.es || '')}</div>
          </div>
        `;

      return `
        <article
          class="entry entry--kanji capture-card"
          id="entry-${index+1}"
          data-type="KANJI"
          data-tags="${escapeHtml(getItemTags(item).join('||'))}"
        >
          <div class="entry-top">
            <div class="entry-tag">KANJI</div>
            <div class="entry-date">Tags: ${escapeHtml(item.theme || '')}</div>
          </div>

          <div class="entry-body">
            <div class="kanji-grid">
              ${meanings}
            </div>
          </div>
        </article>
      `;
    }

    function renderWordCard(item, index){
      return `
        <article
          class="entry entry--word capture-card"
          id="entry-${index+1}"
          data-type="PALABRA"
          data-tags="${escapeHtml(getItemTags(item).join('||'))}"
        >
          <div class="entry-top">
            <div class="entry-tag">PALABRA</div>
            <div class="entry-date">Tags: ${escapeHtml(item.theme || '')}</div>
          </div>

          <div class="entry-body">
            <div class="summary">
              <div class="jp-line">${escapeHtml(item.jp || '')}</div>
              ${item.romaji ? `<div class="reading-line">${escapeHtml(item.romaji)}</div>` : ''}
              ${item.es ? `<div class="es-line">${escapeHtml(item.es)}</div>` : ''}
            </div>

            <div class="details">
              ${item.matiz ? `
                <div class="meaning-boxes">
                  <div class="meaning-box">
                    <span class="label">Observación</span>
                    <div class="value">${escapeHtml(item.matiz)}</div>
                  </div>
                </div>
              ` : ''}

              ${renderKanjiPanel(item.kanjis)}
            </div>
          </div>
        </article>
      `;
    }

    function renderSentenceCard(item, index){
      return `
        <article
          class="entry entry--sentence capture-card"
          id="entry-${index+1}"
          data-type="ORACION"
          data-tags="${escapeHtml(getItemTags(item).join('||'))}"
        >
          <div class="entry-top">
            <div class="entry-tag">FRASE</div>
            <div class="entry-date">Tags: ${escapeHtml(item.theme || '')}</div>
          </div>

          <div class="entry-body">
            <div class="summary">
              <div class="jp-line">${escapeHtml(item.jp || '')}</div>
              ${item.romaji ? `<div class="reading-line">${escapeHtml(item.romaji)}</div>` : ''}
              ${item.es ? `<div class="es-line">${escapeHtml(item.es)}</div>` : ''}
            </div>

            <div class="details">
              ${item.matiz ? `
                <div class="meaning-boxes">
                  <div class="meaning-box">
                    <span class="label">Observación</span>
                    <div class="value">${escapeHtml(item.matiz)}</div>
                  </div>
                </div>
              ` : ''}

              ${renderWordsPanel(item.words)}
              ${renderKanjiPanel(item.kanjis)}
            </div>
          </div>
        </article>
      `;
    }

    function renderItem(item, index){
      const type = normalizeType(item.type || '');

      if(type === 'KANJI') return renderKanjiCard(item, index);
      if(type === 'PALABRA') return renderWordCard(item, index);
      return renderSentenceCard(item, index);
    }

    function buildTags(data){
      const tagSet = new Set();

      data.forEach(item => {
        getItemTags(item).forEach(tag => tagSet.add(tag));
      });

      state.allTags = Array.from(tagSet).sort((a,b) => a.localeCompare(b, 'es'));
      state.activeTags = new Set(state.allTags);
    }

    function renderModeFilters(){
      const container = document.getElementById('modeFilters');

      container.innerHTML = MODE_CONFIG.map(mode => `
        <button
          type="button"
          class="toggle-chip ${state.activeModes.has(mode.key) ? 'is-active' : ''}"
          data-mode="${escapeHtml(mode.key)}"
        >
          ${escapeHtml(mode.label)}
        </button>
      `).join('');

      container.querySelectorAll('[data-mode]').forEach(button => {
        button.addEventListener('click', () => {
          const mode = button.dataset.mode;

          if(state.activeModes.has(mode)){
            state.activeModes.delete(mode);
          }else{
            state.activeModes.add(mode);
          }

          renderModeFilters();
          applyFilters();
        });
      });
    }

    function renderTagFilters(){
      const container = document.getElementById('tagFilters');

      if(!state.allTags.length){
        container.innerHTML = `<div class="empty-tags">No hay tags disponibles.</div>`;
        return;
      }

      container.innerHTML = state.allTags.map(tag => `
        <button
          type="button"
          class="toggle-chip ${state.activeTags.has(tag) ? 'is-active' : ''}"
          data-tag="${escapeHtml(tag)}"
        >
          ${escapeHtml(tag)}
        </button>
      `).join('');

      container.querySelectorAll('[data-tag]').forEach(button => {
        button.addEventListener('click', () => {
          const tag = button.dataset.tag;

          if(state.activeTags.has(tag)){
            state.activeTags.delete(tag);
          }else{
            state.activeTags.add(tag);
          }

          renderTagFilters();
          applyFilters();
        });
      });
    }

    function applyFilters(){
      const cards = [...document.querySelectorAll('.entry')];
      let visibleCount = 0;

      cards.forEach(card => {
        const type = card.dataset.type || '';
        const cardTags = String(card.dataset.tags || '')
          .split('||')
          .map(tag => tag.trim())
          .filter(Boolean);

        const modeMatch = state.activeModes.has(type);
        const tagMatch = cardTags.some(tag => state.activeTags.has(tag));

        const visible = modeMatch && tagMatch;

        card.style.display = visible ? '' : 'none';

        if(visible) visibleCount++;
      });

      updateResultsInfo(visibleCount);
      layoutMasonry();
    }

    function updateResultsInfo(count){
      const info = document.getElementById('resultsInfo');

      const activeModeLabels = MODE_CONFIG
        .filter(mode => state.activeModes.has(mode.key))
        .map(mode => mode.label);

      const modeText = activeModeLabels.length
        ? activeModeLabels.join(', ')
        : 'ninguno';

      info.textContent = `${count} tarjeta${count === 1 ? '' : 's'} visibles · modos: ${modeText} · tags activadas: ${state.activeTags.size}/${state.allTags.length}`;
    }

    function layoutMasonry(){
      const container = document.getElementById('vivoGrid');
      const cards = [...container.querySelectorAll('.entry:not([style*="display: none"])')];

      if(window.innerWidth < 900){
        container.style.height = 'auto';
        return;
      }

      if(!cards.length){
        container.style.height = '0px';
        return;
      }

      const gap = 18;
      const containerWidth = container.clientWidth;
      const placed = [];

      function intersects(a, b){
        return !(
          a.right <= b.left ||
          a.left >= b.right ||
          a.bottom <= b.top ||
          a.top >= b.bottom
        );
      }

      function getLowestYThatFits(width, height, startX){
        let y = 0;

        while(true){
          const testRect = {
            left: startX,
            top: y,
            right: startX + width,
            bottom: y + height
          };

          const hit = placed.find(p => intersects(testRect, p));

          if(!hit) return y;
          y = hit.bottom + gap;
        }
      }

      cards.forEach(card => {
        card.style.left = '0px';
        card.style.top = '0px';
      });

      cards.forEach(card => {
        const width = Math.ceil(card.offsetWidth);
        const height = Math.ceil(card.offsetHeight);

        let bestX = 0;
        let bestY = Infinity;
        const candidates = [0];

        placed.forEach(p => {
          candidates.push(p.right);
        });

        candidates.forEach(x => {
          if(x + width > containerWidth) return;

          const y = getLowestYThatFits(width, height, x);

          if(y < bestY){
            bestY = y;
            bestX = x;
          }
        });

        card.style.left = `${bestX}px`;
        card.style.top = `${bestY}px`;

        placed.push({
          left: bestX,
          top: bestY,
          right: bestX + width + gap,
          bottom: bestY + height
        });
      });

      const maxBottom = Math.max(...placed.map(p => p.bottom), 0);
      container.style.height = `${maxBottom}px`;
    }

    fetch('data/elvivo.json')
      .then(res => res.json())
      .then(data => {
        state.data = Array.isArray(data) ? data : [];

        buildTags(state.data);

        const grid = document.getElementById('vivoGrid');
        grid.innerHTML = state.data.map((item, index) => renderItem(item, index)).join('');

        renderModeFilters();
        renderTagFilters();
        applyFilters();

        window.addEventListener('resize', layoutMasonry);
      })
      .catch(err => {
        const grid = document.getElementById('vivoGrid');
        grid.innerHTML = `
          <article class="entry" style="position:static;">
            <div class="entry-body">
              <div class="es-line">No se pudo cargar el JSON.</div>
              <div class="reading-line">${escapeHtml(err.message || 'Error desconocido')}</div>
            </div>
          </article>
        `;
        document.getElementById('tagFilters').innerHTML = `<div class="empty-tags">No se pudieron cargar las tags.</div>`;
        document.getElementById('resultsInfo').textContent = '0 tarjetas visibles';
        console.error(err);
      });

    window.addEventListener('load', layoutMasonry);
    document.fonts?.ready.then(layoutMasonry);
  </script>
</body>
</html>
