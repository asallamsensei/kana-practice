<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EL VIVO de Asallam Sensei</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>

:root{
  --bg:#07101f;
  --text:#ffffff;
  --muted:#ffffff;
  --border:rgba(255,255,255,.12);
  --panel:rgba(255,255,255,.05);
  --panel-strong:rgba(255,255,255,.10);
  --shadow:0 20px 60px rgba(0,0,0,.35);

  --card-kanji:rgba(245,158,11,.10);
  --card-word:rgba(239,68,68,.10);
  --card-sentence:rgba(168,85,247,.10);

  --radius-xl:28px;
  --radius-lg:22px;
  --radius-md:18px;

  --pad:12px;
  --gap:10px;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}

body{
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
  min-height:100vh;
  background:var(--bg);
}

.wrap{
  width:min(1400px, calc(100% - 32px));
  margin:0 auto;
  padding:32px 0 64px;
  text-align:center;
}

.page-title{
  margin:0 0 22px;
  font-size:clamp(1.5rem, 3.5vw, 2.8rem);
  line-height:1.02;
  letter-spacing:-.03em;
  font-weight:500;
}

.filters-panel{
  display:inline-flex;
  gap:var(--gap);
  margin:0 auto 20px;
  padding:var(--pad);
  border-radius:32px;
  border:1px solid var(--border);
  background:var(--panel);
  box-shadow:var(--shadow);
}

.filter-block{
  display:grid;
  gap:var(--gap);
  align-content:start;
  padding:var(--pad);
  border-radius:24px;
  background:var(--panel);
  border:1px solid var(--border);
  width:fit-content;
  max-width:100%;
}

.filter-title{
  font-size:.92rem;
  font-weight:500;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.toggle-group,
.tags-wrap{
  display:flex;
  flex-wrap:wrap;
  gap:var(--gap);
  justify-content:center;
}

.toggle-chip{
  appearance:none;
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--text);
  border-radius:999px;
  padding:12px 16px;
  font-size:.95rem;
  font-weight:500;
  line-height:1;
  cursor:pointer;
}

.toggle-chip:hover{
  background:var(--panel-strong);
  box-shadow:0 0 16px rgba(255,255,255,.18);
}

.toggle-group .toggle-chip.is-active{
  background:rgba(239,68,68,.28);
  border-color:rgba(239,68,68,.65);
  box-shadow:0 0 12px rgba(239,68,68,.30);
}

.tags-wrap .toggle-chip.is-active{
  background:rgba(168,85,247,.35);
  border-color:rgba(168,85,247,.7);
  box-shadow:0 0 12px rgba(168,85,247,.35);
}

.empty-tags,
.results-info{
  color:var(--muted);
  font-weight:500;
  font-size:.96rem;
}

.results-info{
  margin:0 0 18px;
}

.entry{
  position:absolute;
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  overflow:hidden;
  box-shadow:var(--shadow);
  width:fit-content;
  max-width:100%;
  height:auto;
}

.entry--kanji{background:var(--card-kanji)}
.entry--word{background:var(--card-word)}
.entry--sentence{background:var(--card-sentence)}

.entry-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:var(--gap);
  padding:var(--pad);
  border-bottom:1px solid var(--border);
  background:var(--panel);
  width:100%;
}

.entry-tag{
  font-size:.82rem;
  font-weight:500;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.entry-date{
  font-size:.95rem;
  font-weight:500;
  text-align:right;
}
    
.entry-body{
  padding:var(--pad);
  display:grid;
  gap:var(--gap);
  justify-items:center;
  text-align:center;
}

.summary{
  display:grid;
  gap:var(--gap);
  user-select:none;
  justify-items:center;
  text-align:center;
}

.jp-line{
  font-family:"Noto Sans JP", sans-serif;
  font-size:clamp(1.8rem, 3.8vw, 3rem);
  font-weight:500;
  line-height:1.2;
}

.reading-line,
.es-line{
  font-weight:500;
}

.reading-line{font-size:1rem}

.es-line{
  font-size:1.12rem;
  line-height:1.35;
}

.details{
  display:grid;
  gap:var(--gap);
  padding-top:6px;
  animation:fadeIn .18s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(-4px)}
  to{opacity:1; transform:translateY(0)}
}

.meaning-boxes,
.kanji-grid{
  display:grid;
  grid-auto-flow:column;
  grid-auto-columns:max-content;
  gap:var(--gap);
  width:fit-content;
}

.meaning-box,
.kanji-card,
.piece{
  padding:var(--pad);
  border-radius:22px;
  background:var(--panel);
  border:1px solid var(--border);
}

.label{
  display:block;
  margin-bottom:8px;
  font-size:.78rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  font-weight:500;
}

.value{
  line-height:1.7;
  font-size:1rem;
}

.panel{
  display:grid;
  gap:var(--gap);
  padding:var(--pad);
  border-radius:24px;
  background:var(--panel);
  border:1px solid var(--border);
  width:fit-content;
  max-width:100%;
}

.panel-title{
  font-size:1rem;
  font-weight:500;
}

.pieces{
  display:flex;
  flex-wrap:wrap;
  gap:var(--gap);
  width:fit-content;
}

.piece{
  display:grid;
  gap:var(--gap);
  align-items:start;
  width:fit-content;
}

.piece .jp,
.kanji-char{
  font-family:"Noto Sans JP", sans-serif;
  font-weight:500;
  line-height:1.35;
}

.piece .jp{font-size:1.2rem}

.piece .romaji{
  font-weight:500;
  font-size:.95rem;
  margin-top:4px;
}

.piece .es,
.piece .exp{
  line-height:1.6;
  font-size:1rem;
}

.kanji-card{
  display:grid;
  gap:var(--gap);
  justify-items:center;
  text-align:center;
}

.kanji-main{
  display:grid;
  gap:var(--gap);
  justify-items:center;
}

.kanji-char{
  font-size:3rem;
}

.kanji-mean{
  font-size:1rem;
  line-height:1.5;
  font-weight:500;
  text-align:center;
}

.footer-badge{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:var(--pad) 0;
  font-size:.9rem;
  font-weight:500;
  background:rgba(0,0,0,.20);
  border-top:1px solid var(--border);
}

.layout{
  display:flex;
  gap:var(--gap);
  align-items:flex-start;
}

.side-panel{
  display:grid;
  gap:var(--gap);
  padding:var(--pad);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  background:var(--panel);
  box-shadow:var(--shadow);
  position:sticky;
  top:12px;
  justify-items:center;
  text-align:center;
  width:320px;
  flex-shrink:0;
}

.side-panel .filters-panel{
  display:grid;
  gap:var(--gap);
  margin:0 auto;
  padding:0;
  border:0;
  background:none;
  box-shadow:none;
  justify-content:center;
}

.results-info{
  margin:0;
}

.vivo-grid{
  position:relative;
  min-height:200px;
  flex:1;
}
    
@media (max-width: 900px){
  .wrap{
    width:min(100% - 20px, 1400px);
    padding:24px 0 52px;
  }

  .page-title{
    margin-bottom:18px;
  }

  .filters-panel{
    display:flex;
    flex-direction:column;
    padding:var(--pad);
    border-radius:24px;
  }

  .filter-block{
    width:100%;
    padding:var(--pad);
    border-radius:20px;
  }

  .toggle-chip{
    padding:11px 14px;
    font-size:.92rem;
  }

  .vivo-grid{
    position:static;
    min-height:0;
    display:grid;
    gap:var(--gap);
    justify-items:center;
  }

  .entry{
    position:static !important;
    left:auto !important;
    top:auto !important;
    max-width:100%;
  }

  .layout{
    display:grid;
    grid-template-columns:1fr;
  }
  
.side-panel{
  position:static;
  order:-1;
  width:100%;
}

}    
    
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="page-title">Me lo contaron en el vivo de Asallam Sensei</h1>

<div class="layout">

  <main class="vivo-grid" id="vivoGrid"></main>

  <aside class="side-panel">
    <section class="filters-panel">
      <div class="filter-block">
        <div class="filter-title">Modo</div>
        <div class="toggle-group" id="modeFilters"></div>
      </div>

      <div class="filter-block">
        <div class="filter-title">Tags</div>
        <div class="tags-wrap" id="tagFilters">
          <div class="empty-tags">Cargando tags...</div>
        </div>
      </div>
    </section>

    <p class="results-info" id="resultsInfo"></p>
  </aside>

</div>
</div>
  <footer class="footer-badge">© Asallam Sensei</footer>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const MODE_CONFIG = [
      { key: 'PALABRA', label: 'Palabras', active: true },
      { key: 'ORACION', label: 'Frases', active: false },
      { key: 'KANJI', label: 'Kanji', active: false }
    ];

    const state = {
      data: [],
      activeModes: new Set(MODE_CONFIG.filter(m => m.active).map(m => m.key)),
      activeTags: new Set(),
      allTags: []
    };

    async function renderCard(element){
      return await html2canvas(element,{backgroundColor:null,scale:2,useCORS:true});
    }

    async function downloadCard(id, filename){
      const element = document.getElementById(id);
      const canvas = await renderCard(element);
      const link = document.createElement('a');
      link.download = `${filename}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    async function downloadAllCards(){
      const cards = [...document.querySelectorAll('.capture-card')];
      for(let i=0;i<cards.length;i++){
        const card = cards[i];
        const name = card.id || `tarjeta-${i+1}`;
        await downloadCard(name, name);
      }
    }

    function normalizeType(type=''){
      const t = type.trim().toUpperCase();
      if (t === 'KANJI') return 'KANJI';
      if (t === 'PALABRA' || t === 'WORD') return 'PALABRA';
      if (t === 'ORACION' || t === 'ORACIÓN' || t === 'FRASE' || t === 'SENTENCE') return 'ORACION';
      return 'ORACION';
    }

    function escapeHtml(text=''){
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function parseTags(theme=''){
      return String(theme)
        .split(/[,|/•]+/g)
        .map(tag => tag.trim())
        .filter(Boolean);
    }

    function getItemTags(item){
      if(Array.isArray(item.tags) && item.tags.length){
        return item.tags.map(tag => String(tag).trim()).filter(Boolean);
      }
    
      return ['Sin tag'];
    }

    function renderKanjiPanel(kanjis){
      if(!kanjis || !kanjis.length) return '';
    
      return `
        <section class="panel">
          <div class="panel-title">Kanjis</div>
          <div class="kanji-grid">
            ${kanjis.map(ref => {
              const k = state.kanjiByJp?.get(ref);
    
              return `
                <div class="kanji-card">
                  <div class="kanji-main">
                    <div class="kanji-char">${escapeHtml(ref)}</div>
                    ${k?.es ? `<div class="kanji-mean">${escapeHtml(k.es)}</div>` : ''}
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </section>
      `;
    }

    function renderWordsPanel(palabras){
      if(!palabras || !palabras.length) return '';
    
      return `
        <section class="panel">
          <div class="panel-title">Palabras</div>
          <div class="pieces">
            ${palabras.map(ref => {
              const w = state.wordsByJp?.get(ref);
    
              return `
                <div class="piece">
                  <div class="jp">${escapeHtml(ref)}</div>
                  ${w?.romaji ? `<div class="romaji">${escapeHtml(w.romaji)}</div>` : ''}
                  ${w?.es ? `<div class="es">${escapeHtml(w.es)}</div>` : ''}
                </div>
              `;
            }).join('')}
          </div>
        </section>
      `;
    }

    function renderKanjiCard(item, index){
      return `
        <article
          class="entry entry--kanji capture-card"
          id="entry-${index+1}"
          data-type="KANJI"
          data-tags="${escapeHtml(getItemTags(item).join('||'))}"
        >
          <div class="entry-top">
            <div class="entry-tag">KANJI</div>
            <div class="entry-date">Tags: ${escapeHtml(getItemTags(item).join(', '))}</div>
          </div>
    
          <div class="entry-body">
            <div class="summary">
              <div class="jp-line">${escapeHtml(item.jp || '')}</div>
              ${item.es ? `<div class="es-line">${escapeHtml(item.es)}</div>` : ''}
            </div>
    
            <div class="details">
              <div class="meaning-boxes">
                ${item.kun ? `
                  <div class="meaning-box">
                    <span class="label">Kun</span>
                    <div class="value">${escapeHtml(item.kun)}</div>
                  </div>
                ` : ''}
                ${item.on ? `
                  <div class="meaning-box">
                    <span class="label">On</span>
                    <div class="value">${escapeHtml(item.on)}</div>
                  </div>
                ` : ''}
              </div>
              ${item.extra ? `
                <div class="meaning-boxes">
                  <div class="meaning-box">
                    <span class="label">Extra</span>
                    <div class="value">${escapeHtml(item.extra)}</div>
                  </div>
                </div>
              ` : ''}
            </div>
          </div>
        </article>
      `;
    }

    function renderWordCard(item, index){
      return `
        <article
          class="entry entry--word capture-card"
          id="entry-${index+1}"
          data-type="PALABRA"
          data-tags="${escapeHtml(getItemTags(item).join('||'))}"
        >
          <div class="entry-top">
            <div class="entry-tag">PALABRA</div>
            <div class="entry-date">Tags: ${escapeHtml(getItemTags(item).join(', '))}</div>
          </div>

          <div class="entry-body">
            <div class="summary">
              <div class="jp-line">${escapeHtml(item.jp || '')}</div>
              ${item.romaji ? `<div class="reading-line">${escapeHtml(item.romaji)}</div>` : ''}
              ${item.es ? `<div class="es-line">${escapeHtml(item.es)}</div>` : ''}
            </div>

            <div class="details">
              ${item.extra ? `
                <div class="meaning-boxes">
                  <div class="meaning-box">
                    <span class="label">Extra</span>
                    <div class="value">${escapeHtml(item.extra)}</div>
                  </div>
                </div>
              ` : ''}

              ${renderKanjiPanel(item.kanjis)}
            </div>
          </div>
        </article>
      `;
    }

    function buildIndex(data){
      state.wordsByJp = new Map(
        data.filter(x => normalizeType(x.tipo) === 'PALABRA')
          .map(x => [x.jp, x])
      );
    
      state.kanjiByJp = new Map(
        data.filter(x => normalizeType(x.tipo) === 'KANJI')
          .map(x => [x.jp, x])
      );
    }
    
    function renderSentenceCard(item, index){
      return `
        <article
          class="entry entry--sentence capture-card"
          id="entry-${index+1}"
          data-type="ORACION"
          data-tags="${escapeHtml(getItemTags(item).join('||'))}"
        >
          <div class="entry-top">
            <div class="entry-tag">FRASE</div>
            <div class="entry-date">Tags: ${escapeHtml(getItemTags(item).join(', '))}</div>
          </div>

          <div class="entry-body">
            <div class="summary">
              <div class="jp-line">${escapeHtml(item.jp || '')}</div>
              ${item.romaji ? `<div class="reading-line">${escapeHtml(item.romaji)}</div>` : ''}
              ${item.es ? `<div class="es-line">${escapeHtml(item.es)}</div>` : ''}
            </div>

            <div class="details">
              ${item.extra ? `
                <div class="meaning-boxes">
                  <div class="meaning-box">
                    <span class="label">Observación</span>
                    <div class="value">${escapeHtml(item.extra)}</div>
                  </div>
                </div>
              ` : ''}

              ${renderWordsPanel(item.palabras)}
            </div>
          </div>
        </article>
      `;
    }

    function renderItem(item, index){
      const type = normalizeType(item.tipo || '');
    
      if(type === 'KANJI') return renderKanjiCard(item, index);
      if(type === 'PALABRA') return renderWordCard(item, index);
      return renderSentenceCard(item, index);
    }

    function buildTags(data){
      const tagSet = new Set();

      data.forEach(item => {
        getItemTags(item).forEach(tag => tagSet.add(tag));
      });

      state.allTags = Array.from(tagSet).sort((a,b) => a.localeCompare(b, 'es'));
      state.activeTags = new Set(state.allTags);
    }

    function renderModeFilters(){
      const container = document.getElementById('modeFilters');

      container.innerHTML = MODE_CONFIG.map(mode => `
        <button
          type="button"
          class="toggle-chip ${state.activeModes.has(mode.key) ? 'is-active' : ''}"
          data-mode="${escapeHtml(mode.key)}"
        >
          ${escapeHtml(mode.label)}
        </button>
      `).join('');

      container.querySelectorAll('[data-mode]').forEach(button => {
        button.addEventListener('click', () => {
          const mode = button.dataset.mode;

          if(state.activeModes.has(mode)){
            state.activeModes.delete(mode);
          }else{
            state.activeModes.add(mode);
          }

          renderModeFilters();
          applyFilters();
        });
      });
    }

    function renderTagFilters(){
      const container = document.getElementById('tagFilters');

      if(!state.allTags.length){
        container.innerHTML = `<div class="empty-tags">No hay tags disponibles.</div>`;
        return;
      }

      container.innerHTML = state.allTags.map(tag => `
        <button
          type="button"
          class="toggle-chip ${state.activeTags.has(tag) ? 'is-active' : ''}"
          data-tag="${escapeHtml(tag)}"
        >
          ${escapeHtml(tag)}
        </button>
      `).join('');

      container.querySelectorAll('[data-tag]').forEach(button => {
        button.addEventListener('click', () => {
          const tag = button.dataset.tag;

          if(state.activeTags.has(tag)){
            state.activeTags.delete(tag);
          }else{
            state.activeTags.add(tag);
          }

          renderTagFilters();
          applyFilters();
        });
      });
    }

    function applyFilters(){
      const cards = [...document.querySelectorAll('.entry')];
      let visibleCount = 0;

      cards.forEach(card => {
        const type = card.dataset.type || '';
        const cardTags = String(card.dataset.tags || '')
          .split('||')
          .map(tag => tag.trim())
          .filter(Boolean);

        const modeMatch = state.activeModes.has(type);
        const tagMatch = cardTags.some(tag => state.activeTags.has(tag));

        const visible = modeMatch && tagMatch;

        card.style.display = visible ? '' : 'none';

        if(visible) visibleCount++;
      });

      updateResultsInfo(visibleCount);
      layoutMasonry();
    }

    function updateResultsInfo(count){
      const info = document.getElementById('resultsInfo');

      const activeModeLabels = MODE_CONFIG
        .filter(mode => state.activeModes.has(mode.key))
        .map(mode => mode.label);

      const modeText = activeModeLabels.length
        ? activeModeLabels.join(', ')
        : 'ninguno';

      info.textContent = `${count} tarjeta${count === 1 ? '' : 's'} visibles`;
    }

function layoutMasonry(){
  const container = document.getElementById('vivoGrid');
  const cards = [...container.querySelectorAll('.entry:not([style*="display: none"])')];

  if(window.innerWidth < 900){
    container.style.height = 'auto';
    return;
  }

  if(!cards.length){
    container.style.height = '0px';
    return;
  }

  const gap = 12;
  const containerWidth = container.clientWidth;
  const centerX = containerWidth / 2;
  const placed = [];

  cards.forEach(card => {
    card.style.left = '0px';
    card.style.top = '0px';
  });

  function collides(a, b){
    return !(
      a.right + gap <= b.left ||
      a.left >= b.right + gap ||
      a.bottom + gap <= b.top ||
      a.top >= b.bottom + gap
    );
  }

  function canPlace(rect){
    if(rect.left < 0) return false;
    if(rect.right > containerWidth) return false;
    if(rect.top < 0) return false;
    return !placed.some(p => collides(rect, p));
  }

  function score(rect){
    const rectCenter = (rect.left + rect.right) / 2;
    const centerPenalty = Math.abs(rectCenter - centerX);
    const heightPenalty = rect.top * 2;
    const widthPenalty = Math.abs(rect.left - centerX) * .25;

    return heightPenalty + centerPenalty + widthPenalty;
  }

  cards.forEach((card, index) => {
    const width = Math.ceil(card.offsetWidth);
    const height = Math.ceil(card.offsetHeight);

    let best = null;
    let bestScore = Infinity;

    if(index === 0){
      best = {
        left:Math.round((containerWidth - width) / 2),
        top:0,
        right:Math.round((containerWidth - width) / 2) + width,
        bottom:height
      };
    }else{
      const candidates = [];

      placed.forEach(p => {
        candidates.push({
          left:p.right + gap,
          top:p.top,
          right:p.right + gap + width,
          bottom:p.top + height
        });

        candidates.push({
          left:p.left - width - gap,
          top:p.top,
          right:p.left - gap,
          bottom:p.top + height
        });

        candidates.push({
          left:p.left,
          top:p.bottom + gap,
          right:p.left + width,
          bottom:p.bottom + gap + height
        });

        candidates.push({
          left:p.right - width,
          top:p.bottom + gap,
          right:p.right,
          bottom:p.bottom + gap + height
        });
      });

      candidates.forEach(rect => {
        rect.left = Math.round(rect.left);
        rect.top = Math.round(rect.top);
        rect.right = Math.round(rect.right);
        rect.bottom = Math.round(rect.bottom);

        if(!canPlace(rect)) return;

        const s = score(rect);

        if(s < bestScore){
          bestScore = s;
          best = rect;
        }
      });
    }

    if(!best){
      best = {
        left:Math.round((containerWidth - width) / 2),
        top:Math.max(...placed.map(p => p.bottom), 0) + gap,
        right:Math.round((containerWidth - width) / 2) + width,
        bottom:Math.max(...placed.map(p => p.bottom), 0) + gap + height
      };
    }

    card.style.left = `${best.left}px`;
    card.style.top = `${best.top}px`;

    placed.push(best);
  });

  const minLeft = Math.min(...placed.map(p => p.left));
  const maxRight = Math.max(...placed.map(p => p.right));
  const layoutWidth = maxRight - minLeft;
  const offsetX = Math.round((containerWidth - layoutWidth) / 2 - minLeft);

  placed.forEach((p, i) => {
    p.left += offsetX;
    p.right += offsetX;
    cards[i].style.left = `${p.left}px`;
  });

  const maxBottom = Math.max(...placed.map(p => p.bottom), 0);
  container.style.height = `${maxBottom + gap}px`;

  magnetCards();
}

function magnetCards(){
  const container = document.getElementById('vivoGrid');
  const cards = [...container.querySelectorAll('.entry:not([style*="display: none"])')];
  const gap = 12;

  function rectOf(card){
    const left = parseFloat(card.style.left) || 0;
    const top = parseFloat(card.style.top) || 0;

    return {
      left,
      top,
      right:left + card.offsetWidth,
      bottom:top + card.offsetHeight,
      width:card.offsetWidth,
      height:card.offsetHeight
    };
  }

  function collides(a, b){
    return !(
      a.right + gap <= b.left ||
      a.left >= b.right + gap ||
      a.bottom + gap <= b.top ||
      a.top >= b.bottom + gap
    );
  }

  function canMove(card, newLeft, newTop){
    const test = {
      left:newLeft,
      top:newTop,
      right:newLeft + card.offsetWidth,
      bottom:newTop + card.offsetHeight
    };

    if(test.left < 0) return false;
    if(test.right > container.clientWidth) return false;

    return !cards.some(other => {
      if(other === card) return false;
      return collides(test, rectOf(other));
    });
  }

  for(let pass = 0; pass < 30; pass++){
    cards.forEach(card => {
      const r = rectOf(card);
      const sameRow = cards
        .filter(other => other !== card)
        .map(other => rectOf(other))
        .filter(o => r.top < o.bottom && r.bottom > o.top);

      if(!sameRow.length) return;

      const nearest = sameRow
        .map(o => {
          const dist = o.right <= r.left ? r.left - o.right : o.left - r.right;
          return {o, dist};
        })
        .filter(x => x.dist > gap)
        .sort((a,b) => a.dist - b.dist)[0];

      if(!nearest) return;

      const target = nearest.o.right <= r.left
        ? nearest.o.right + gap
        : nearest.o.left - r.width - gap;

      const step = Math.sign(target - r.left) * Math.min(gap, Math.abs(target - r.left));

      if(canMove(card, r.left + step, r.top)){
        card.style.left = `${r.left + step}px`;
      }
    });
  }
}
    
    fetch('data/elvivo.json')
      .then(res => res.json())
      .then(data => {
    
        const shuffled = [...data].sort(() => Math.random() - 0.5);
    
        state.data = Array.isArray(shuffled) ? shuffled : [];
        buildIndex(state.data);
        buildTags(state.data);

        const grid = document.getElementById('vivoGrid');
        grid.innerHTML = state.data.map((item, index) => renderItem(item, index)).join('');

        renderModeFilters();
        renderTagFilters();
        applyFilters();

        window.addEventListener('resize', layoutMasonry);
      })
      .catch(err => {
        const grid = document.getElementById('vivoGrid');
        grid.innerHTML = `
          <article class="entry" style="position:static;">
            <div class="entry-body">
              <div class="es-line">No se pudo cargar el JSON.</div>
              <div class="reading-line">${escapeHtml(err.message || 'Error desconocido')}</div>
            </div>
          </article>
        `;
        document.getElementById('tagFilters').innerHTML = `<div class="empty-tags">No se pudieron cargar las tags.</div>`;
        document.getElementById('resultsInfo').textContent = '0 tarjetas visibles';
        console.error(err);
      });

    window.addEventListener('load', layoutMasonry);
    document.fonts?.ready.then(layoutMasonry);
  </script>
