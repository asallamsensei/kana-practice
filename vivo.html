<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vivo de Kanji y Palabras — Asallam Sensei</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#081120;
      --bg2:#0c1830;
      --card:rgba(255,255,255,.08);
      --card-strong:rgba(255,255,255,.12);
      --text:#eef2ff;
      --muted:rgba(238,242,255,.74);
      --accent:#8b5cf6;
      --accent-2:#ec4899;
      --accent-3:#22c55e;
      --border:rgba(255,255,255,.16);
      --shadow:0 20px 60px rgba(0,0,0,.35);
      --radius:24px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Inter,system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(139,92,246,.22), transparent 30%),
        radial-gradient(circle at top right, rgba(236,72,153,.18), transparent 28%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      min-height:100vh;
    }

    .wrap{
      width:min(1120px, calc(100% - 32px));
      margin:0 auto;
      padding:32px 0 64px;
    }

    .hero{
      display:grid;
      gap:18px;
      margin-bottom:28px;
      background:linear-gradient(135deg, rgba(139,92,246,.16), rgba(236,72,153,.10));
      border:1px solid rgba(255,255,255,.12);
      border-radius:32px;
      padding:28px;
      box-shadow:var(--shadow);
      backdrop-filter: blur(10px);
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:.86rem;
      color:#ddd6fe;
      background:rgba(139,92,246,.14);
      width:max-content;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(139,92,246,.28);
    }

    h1{
      margin:0;
      font-size:clamp(1.8rem, 4vw, 3.2rem);
      line-height:1.02;
      letter-spacing:-.03em;
    }

    .hero p{
      margin:0;
      max-width:820px;
      color:var(--muted);
      font-size:1.02rem;
      line-height:1.7;
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:8px;
    }

    button{
      border:0;
      cursor:pointer;
      border-radius:16px;
      padding:14px 18px;
      font-weight:800;
      font-size:.95rem;
      transition:.2s transform ease, .2s opacity ease, .2s box-shadow ease;
    }

    button:hover{transform:translateY(-1px)}
    .btn-primary{
      color:white;
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow:0 12px 30px rgba(139,92,246,.28);
    }
    .btn-secondary{
      color:var(--text);
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
    }

    .vivo-grid{
      display:grid;
      gap:22px;
    }

    .entry{
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow);
      backdrop-filter: blur(10px);
    }

    .entry-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:18px 22px;
      border-bottom:1px solid rgba(255,255,255,.1);
      background:linear-gradient(135deg, rgba(139,92,246,.13), rgba(236,72,153,.08));
    }

    .entry-tag{
      font-size:.8rem;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#f5d0fe;
    }

    .entry-date{
      color:var(--muted);
      font-size:.92rem;
      font-weight:700;
    }

    .entry-body{
      padding:24px;
      display:grid;
      gap:20px;
    }

    .jp-line{
      font-family:"Noto Sans JP", sans-serif;
      font-size:clamp(1.5rem, 3vw, 2.4rem);
      font-weight:900;
      line-height:1.35;
      letter-spacing:.01em;
    }

    .reading-line{
      font-size:1rem;
      color:#ddd6fe;
      font-weight:700;
    }

    .meaning-boxes{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:14px;
    }

    .meaning-box{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.1);
      border-radius:20px;
      padding:16px;
    }

    .label{
      display:block;
      font-size:.78rem;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#fbcfe8;
      margin-bottom:8px;
      font-weight:800;
    }

    .value{
      line-height:1.65;
      color:var(--text);
      font-size:1rem;
    }

    .pieces{
      display:grid;
      gap:12px;
    }

    .piece{
      display:grid;
      grid-template-columns:170px 1fr;
      gap:14px;
      align-items:start;
      padding:16px;
      border-radius:18px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
    }

    .piece .jp{
      font-family:"Noto Sans JP", sans-serif;
      font-size:1.25rem;
      font-weight:800;
      line-height:1.35;
    }

    .piece .romaji{
      color:#c4b5fd;
      font-weight:700;
      font-size:.95rem;
      margin-top:4px;
    }

    .piece .exp{
      color:var(--muted);
      line-height:1.65;
    }

    .kanji-panel{
      display:grid;
      gap:14px;
      padding:18px;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(34,197,94,.08), rgba(34,197,94,.03));
      border:1px solid rgba(34,197,94,.18);
    }

    .kanji-title{
      font-size:1rem;
      font-weight:900;
      letter-spacing:.02em;
    }

    .kanji-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
      gap:14px;
    }

    .kanji-card{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:16px;
      display:grid;
      gap:10px;
    }

    .kanji-main{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .kanji-char{
      font-family:"Noto Sans JP", sans-serif;
      font-size:3rem;
      font-weight:900;
      line-height:1;
      width:72px;
      height:72px;
      display:grid;
      place-items:center;
      border-radius:18px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.1);
    }

    .kanji-meta strong{display:block;font-size:1.05rem}
    .kanji-meta span{color:var(--muted);font-size:.95rem}

    .mini-actions{
      display:flex;
      justify-content:flex-end;
      padding-top:6px;
    }

    .capture-btn{
      background:rgba(255,255,255,.08);
      color:var(--text);
      border:1px solid rgba(255,255,255,.12);
      padding:11px 14px;
      border-radius:14px;
      font-size:.88rem;
    }

    .footer-note{
      margin-top:18px;
      color:var(--muted);
      font-size:.92rem;
      line-height:1.7;
      text-align:center;
    }

    .footer-badge{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:12px 0;
      font-family: Inter, sans-serif;
      font-size:.9rem;
      font-weight:700;
      color:#fff;
      background: rgba(0,0,0,.2); /* fondo suave */
      border-top:1px solid rgba(255,255,255,.1);
      border-radius:12px; /* opcional para suavizar los bordes */
    }
    
    @media (max-width: 860px){
      .meaning-boxes{grid-template-columns:1fr}
      .piece{grid-template-columns:1fr}
      .entry-top{align-items:flex-start; flex-direction:column}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <span class="eyebrow">Asallam Sensei • EL VIVO!!</span>
      <h1>Esto lo vimos en EL VIVO</h1>
      <div class="toolbar">
        <button class="btn-primary" onclick="downloadAllCards()">Descargar todas las tarjetas</button>
      </div>
      <input type="text" id="tagSearch" placeholder="Buscar por tag..." style="padding:8px 12px; border-radius:12px; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.05); color:white; margin-top:12px;">
    </section>

    <main class="vivo-grid" id="vivoGrid"></main>
  </div>

  <footer class="footer-badge">© Asallam Sensei</footer>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    async function renderCard(element){
      return await html2canvas(element,{backgroundColor:null,scale:2,useCORS:true});
    }

    async function downloadCard(id,filename){
      const element=document.getElementById(id);
      const canvas=await renderCard(element);
      const link=document.createElement('a');
      link.download=`${filename}.png`;
      link.href=canvas.toDataURL('image/png');
      link.click();
    }

    async function downloadAllCards(){
      const cards=[...document.querySelectorAll('.capture-card')];
      for(let i=0;i<cards.length;i++){
        const card=cards[i];
        const name=card.id||`tarjeta-${i+1}`;
        await downloadCard(name,name);
      }
    }

    // Cargar JSON y renderizar tarjetas con Traducción literal y Matiz, y panel de palabras como los kanji
    fetch('data/elvivo.json')
      .then(res => res.json())
      .then(data => {
        const grid = document.getElementById('vivoGrid');
    
        data.forEach((item, index) => {
          const entry = document.createElement('article');
          entry.className = 'entry capture-card';
          entry.id = `entry-${index+1}`;
    
          // Construir el HTML de la tarjeta
          const isKanjiOnly = (item.type || '').toUpperCase() === 'KANJI';
          
          const meaningHTML = isKanjiOnly ? '' : `
            <div class="meaning-boxes">
              <div class="meaning-box">
                <span class="label">Traducción natural</span>
                <div class="value">${item.es}</div>
              </div>
              <div class="meaning-box">
                <span class="label">Traducción literal</span>
                <div class="value">${item.literal || ''}</div>
              </div>
              <div class="meaning-box">
                <span class="label">Matiz</span>
                <div class="value">${item.matiz || ''}</div>
              </div>
            </div>
          `;
    
          // Panel de palabras involucradas
          // ✅ palabras con estilo original de pieces
          // Panel de palabras involucradas (dentro de un panel con título)
          // Panel de palabras involucradas, cada palabra en su fila
          let wordsHTML = '';
          if(item.words && item.words.length){
            wordsHTML = `
              <section class="kanji-panel">
                <div class="kanji-title">Palabras involucradas</div>
                <div class="pieces">
                  ${item.words.map(w => `
                    <div class="piece">
                      <div>
                        <div class="jp">${w.jp}</div>
                        <div class="romaji">${w.romaji}</div>
                      </div>
                      <div class="exp">${w.es}</div>
                    </div>
                  `).join('')}
                </div>
              </section>
            `;
          }
    
          // Panel de kanjis
          let kanjiHTML = '';
          if (item.kanjis && item.kanjis.length) {
            kanjiHTML = `
              <section class="kanji-panel">
                <div class="kanji-title">Kanji involucrados</div>
                <div class="kanji-grid">
                  ${item.kanjis.map(k => `
                    <div class="kanji-card">
                      <div class="kanji-char">${k.char}</div>
                      <div class="value">${k.mean}</div>
                    </div>
                  `).join('')}
                </div>
              </section>
            `;
          }
    
          // Combinar todo en la entrada
          entry.innerHTML = `
            <div class="entry-top">
              <div><div class="entry-tag">${item.type}</div></div>
              <div class="entry-date">Tema: ${item.theme}</div>
            </div>
            <div class="entry-body">
              <div class="jp-line">${item.jp}</div>
              ${isKanjiOnly ? '' : `<div class="reading-line">${item.romaji || ''}</div>`}
              ${meaningHTML}
              ${isKanjiOnly ? '' : wordsHTML}
              ${kanjiHTML}
              <div class="mini-actions">
                <button class="capture-btn" onclick="downloadCard('entry-${index+1}','vivo-${index+1}')">Descargar esta tarjeta</button>
              </div>
            </div>
          `;
    
          // Añadir la tarjeta al grid
          grid.appendChild(entry);
        }); // fin del forEach
      }); // fin del .then del fetch
  </script>
</body>
</html>
