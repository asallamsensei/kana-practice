<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EL VIVO de Asallam Sensei</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#07101f;
      --bg2:#0d1630;
      --text:#eef2ff;
      --muted:rgba(238,242,255,.72);
      --border:rgba(255,255,255,.10);
      --shadow:0 20px 60px rgba(0,0,0,.35);

      --violet-1:#6d28d9;
      --violet-2:#9333ea;
      --blue-1:#2563eb;
      --blue-2:#1d4ed8;
      --red-1:#dc2626;
      --red-2:#ef4444;
      --orange-1:#ea580c;
      --orange-2:#f97316;

      --card-kanji:linear-gradient(135deg, rgba(109,40,217,.24), rgba(37,99,235,.16));
      --card-word:linear-gradient(135deg, rgba(220,38,38,.18), rgba(249,115,22,.14));
      --card-sentence:linear-gradient(135deg, rgba(37,99,235,.18), rgba(147,51,234,.16));

      --panel-soft:rgba(255,255,255,.05);
      --panel-strong:rgba(255,255,255,.08);

      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:18px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Inter,system-ui,sans-serif;
      color:var(--text);
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(109,40,217,.20), transparent 28%),
        radial-gradient(circle at top right, rgba(239,68,68,.16), transparent 28%),
        radial-gradient(circle at bottom center, rgba(249,115,22,.12), transparent 30%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }

    .wrap{
      width:min(1120px, calc(100% - 32px));
      margin:0 auto;
      padding:32px 0 64px;
    }

    .hero{
      display:grid;
      gap:16px;
      margin-bottom:28px;
      padding:28px;
      border-radius:32px;
      border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(135deg, rgba(109,40,217,.18), rgba(37,99,235,.10), rgba(239,68,68,.08));
      box-shadow:var(--shadow);
      backdrop-filter: blur(10px);
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      width:max-content;
      padding:8px 12px;
      border-radius:999px;
      font-size:.86rem;
      font-weight:800;
      color:#f5d0fe;
      background:rgba(147,51,234,.14);
      border:1px solid rgba(147,51,234,.30);
    }

    h1{
      margin:0;
      font-size:clamp(1.8rem, 4vw, 3.2rem);
      line-height:1.02;
      letter-spacing:-.03em;
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:4px;
    }

    button{
      border:0;
      cursor:pointer;
      border-radius:16px;
      padding:14px 18px;
      font-weight:800;
      font-size:.95rem;
      transition:.2s transform ease, .2s opacity ease, .2s box-shadow ease;
    }

    button:hover{transform:translateY(-1px)}

    .btn-primary{
      color:white;
      background:linear-gradient(135deg, var(--violet-2), var(--blue-1), var(--red-2));
      box-shadow:0 12px 30px rgba(109,40,217,.25);
    }

    .search{
      padding:12px 14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.05);
      color:white;
      outline:none;
      width:min(360px, 100%);
      font-size:.96rem;
    }

.vivo-grid{
  display:grid;
  gap:18px;
  justify-items:start;
  align-items:start;
}

.entry{
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  overflow:hidden;
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
  width:fit-content;
  max-width:100%;
  height:auto;
}

    .entry--kanji{background-image:var(--card-kanji)}
    .entry--word{background-image:var(--card-word)}
    .entry--sentence{background-image:var(--card-sentence)}
/*
.entry-top{
  display:inline-flex;
  align-items:center;
  gap:14px;
  padding:18px 22px;
  border-bottom:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.05);
  width:fit-content;
  border-radius:0 0 18px 0;
}
*/
.entry-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  padding:18px 22px;
  border-bottom:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.05);
  width:100%;
}
    
    .entry-tag{
      font-size:.82rem;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#fbcfe8;
    }

    .entry-date{
      font-size:.95rem;
      color:var(--muted);
      font-weight:800;
      text-align:right;
    }

    .entry-body{
      padding:22px;
      display:grid;
      gap:18px;
      align-content:start;
    }

    .summary{
      display:grid;
      gap:10px;
      user-select:none;
    }

    .jp-line{
      font-family:"Noto Sans JP", sans-serif;
      font-size:clamp(1.8rem, 3.8vw, 3rem);
      font-weight:900;
      line-height:1.2;
      letter-spacing:.01em;
    }

    .reading-line{
      font-size:1rem;
      color:#ddd6fe;
      font-weight:700;
    }

    .es-line{
      font-size:1.12rem;
      font-weight:800;
      color:#fff;
      line-height:1.35;
    }

    .details{
      display:grid;
      gap:16px;
      padding-top:6px;
      animation:fadeIn .18s ease;
    }

    .entry.open .details{
      display:grid;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(-4px)}
      to{opacity:1; transform:translateY(0)}
    }

.meaning-boxes{
  display:grid;
  grid-auto-flow:column;
  grid-auto-columns:max-content;
  gap:14px;
  width:fit-content;
}

    .meaning-box{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      border-radius:22px;
      padding:16px;
    }

    .label{
      display:block;
      margin-bottom:8px;
      font-size:.78rem;
      text-transform:uppercase;
      letter-spacing:.08em;
      font-weight:900;
      color:#fecdd3;
    }

    .value{
      line-height:1.7;
      font-size:1rem;
      color:var(--text);
    }

    .panel{
      display:grid;
      gap:12px;
      padding:18px;
      border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.10);
    }

    .panel-title{
      font-size:1rem;
      font-weight:900;
      letter-spacing:.02em;
      color:#fff;
    }

.pieces{
  display:grid;
  gap:12px;
  width:fit-content;
}

.piece{
  display:grid;
  gap:10px;
  align-items:start;
  padding:16px;
  border-radius:18px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  width:fit-content;
}

    .piece .jp{
      font-family:"Noto Sans JP", sans-serif;
      font-size:1.2rem;
      font-weight:800;
      line-height:1.35;
    }

    .piece .romaji{
      color:#ddd6fe;
      font-weight:700;
      font-size:.95rem;
      margin-top:4px;
    }

.piece .es{
  color:var(--muted);
  line-height:1.6;
  font-size:1rem;
}
    
    .piece .exp{
      color:var(--muted);
      line-height:1.65;
    }

.kanji-grid{
  display:grid;
  grid-auto-flow:column;
  grid-auto-columns:max-content;
  gap:14px;
  width:fit-content;
}
  
    .kanji-card{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      border-radius:22px;
      padding:16px;
      display:grid;
      gap:10px;
      justify-items:center;
      text-align:center;
    }

    .kanji-card--solo{
      grid-template-columns:1fr;
    }

.kanji-main{
  display:grid;
  gap:10px;
  justify-items:center;
}

    .kanji-char{
      width:76px;
      height:76px;
      border-radius:20px;
      display:grid;
      place-items:center;
      font-family:"Noto Sans JP", sans-serif;
      font-size:3rem;
      font-weight:900;
      line-height:1;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
    }

.kanji-mean{
  font-size:1rem;
  line-height:1.5;
  color:var(--text);
  font-weight:700;
  text-align:center;
}

    .mini-actions{
      display:flex;
      justify-content:flex-end;
      padding-top:2px;
    }

    .capture-btn{
      background:rgba(255,255,255,.08);
      color:var(--text);
      border:1px solid rgba(255,255,255,.12);
      padding:11px 14px;
      border-radius:14px;
      font-size:.88rem;
    }

    .footer-badge{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:14px 0;
      font-size:.9rem;
      font-weight:800;
      color:#fff;
      background:rgba(0,0,0,.20);
      border-top:1px solid rgba(255,255,255,.10);
    }

    @media (max-width: 900px){
      .meaning-boxes{grid-template-columns:1fr}
      .piece{grid-template-columns:1fr}
      .entry-top{flex-direction:column; align-items:flex-start}
      .entry-date{text-align:left}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <span class="eyebrow">Asallam Sensei • EL VIVO!!</span>
      <h1>Me lo contaron en EL VIVO!!</h1>
      <div class="toolbar">
        <input class="search" type="text" id="tagSearch" placeholder="">
      </div>
    </section>

    <main class="vivo-grid" id="vivoGrid"></main>
  </div>

  <footer class="footer-badge">© Asallam Sensei</footer>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    async function renderCard(element){
      return await html2canvas(element,{backgroundColor:null,scale:2,useCORS:true});
    }

    async function downloadCard(id, filename){
      const element = document.getElementById(id);
      const canvas = await renderCard(element);
      const link = document.createElement('a');
      link.download = `${filename}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    async function downloadAllCards(){
      const cards = [...document.querySelectorAll('.capture-card')];
      for(let i=0;i<cards.length;i++){
        const card = cards[i];
        const name = card.id || `tarjeta-${i+1}`;
        await downloadCard(name, name);
      }
    }

    function normalizeType(type=''){
      const t = type.trim().toUpperCase();
      if (t === 'KANJI') return 'KANJI';
      if (t === 'PALABRA' || t === 'WORD') return 'PALABRA';
      if (t === 'ORACION' || t === 'ORACIÓN' || t === 'FRASE' || t === 'SENTENCE') return 'ORACION';
      return 'ORACION';
    }

    function escapeHtml(text=''){
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderMatiz(item){
      if(!item.matiz) return '';
      return `
        <div class="meaning-box">
          <span class="label">Matiz</span>
          <div class="value">${escapeHtml(item.matiz)}</div>
        </div>
      `;
    }

    function renderKanjiPanel(kanjis){
      if(!kanjis || !kanjis.length) return '';
      return `
        <section class="panel">
          <div class="panel-title">Kanjis</div>
          <div class="kanji-grid">
            ${kanjis.map(k => `
              <div class="kanji-card">
                <div class="kanji-main">
                  <div class="kanji-char">${escapeHtml(k.char || '')}</div>
                  <div class="kanji-mean">${escapeHtml(k.mean || '')}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    function renderWordsPanel(words){
      if(!words || !words.length) return '';
      return `
        <section class="panel">
          <div class="panel-title">Palabras</div>
          <div class="pieces">
            ${words.map(w => `
              <div class="piece">
                <div class="jp">${escapeHtml(w.jp || '')}</div>
                ${w.romaji ? `<div class="romaji">${escapeHtml(w.romaji)}</div>` : ''}
                ${w.es ? `<div class="es">${escapeHtml(w.es)}</div>` : ''}
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    function renderKanjiCard(item, index){
    
      const meanings = (item.kanjis && item.kanjis.length)
        ? item.kanjis.map(k => `
          <div class="kanji-card kanji-card--solo">
            <div class="kanji-char">${escapeHtml(k.char || '')}</div>
            <div class="kanji-mean">${escapeHtml(k.mean || '')}</div>
          </div>
          `).join('')
        : `
          <div class="kanji-card kanji-card--solo">
            <div class="kanji-char">${escapeHtml(item.jp || '')}</div>
            <div class="kanji-mean">${escapeHtml(item.es || '')}</div>
          </div>
        `;
    
      return `
        <article class="entry entry--kanji capture-card" id="entry-${index+1}">
          <div class="entry-top">
            <div class="entry-tag">KANJIS</div>
            <div class="entry-date">Tags: ${escapeHtml(item.theme || '')}</div>
          </div>
    
          <div class="entry-body">
    
            <div class="kanji-grid">
              ${meanings}
            </div>
    
          </div>
        </article>
      `;
    }

    function renderWordCard(item, index){
      const literalHTML = item.literal ? `
        <div class="meaning-box">
          <span class="label">Traducción literal</span>
          <div class="value">${escapeHtml(item.literal)}</div>
        </div>
      ` : '';

      const matizHTML = renderMatiz(item);

      return `
        <article class="entry entry--word capture-card" id="entry-${index+1}" data-search="${escapeHtml((item.type||'') + ' ' + (item.theme||'') + ' ' + (item.jp||'') + ' ' + (item.romaji||'') + ' ' + (item.es||''))}">
          <div class="entry-top">
            <div class="entry-tag">PALABRA</div>
            <div class="entry-date">Tags: ${escapeHtml(item.theme || '')}</div>
          </div>

          <div class="entry-body">
            <div class="summary">
              <div class="jp-line">${escapeHtml(item.jp || '')}</div>
              ${item.romaji ? `<div class="reading-line">${escapeHtml(item.romaji)}</div>` : ''}
              ${item.es ? `<div class="es-line">${escapeHtml(item.es)}</div>` : ''}
            </div>

            <div class="details">
              ${item.matiz ? `
              <div class="meaning-boxes">
                <div class="meaning-box">
                  <span class="label">Observación</span>
                  <div class="value">${escapeHtml(item.matiz)}</div>
                </div>
              </div>
              ` : ''}
              
              </div>

              ${renderKanjiPanel(item.kanjis)}

            </div>
          </div>
        </article>
      `;
    }

    function renderSentenceCard(item, index){
      const literalHTML = item.literal ? `
        <div class="meaning-box">
          <span class="label">Traducción literal</span>
          <div class="value">${escapeHtml(item.literal)}</div>
        </div>
      ` : '';

      const matizHTML = renderMatiz(item);

      return `
        <article class="entry entry--sentence capture-card" id="entry-${index+1}" data-search="${escapeHtml((item.type||'') + ' ' + (item.theme||'') + ' ' + (item.jp||'') + ' ' + (item.romaji||'') + ' ' + (item.es||''))}">
          <div class="entry-top">
            <div class="entry-tag">ORACIÓN</div>
            <div class="entry-date">Tags: ${escapeHtml(item.theme || '')}</div>
          </div>

          <div class="entry-body">
            <div class="summary">
              <div class="jp-line">${escapeHtml(item.jp || '')}</div>
              ${item.romaji ? `<div class="reading-line">${escapeHtml(item.romaji)}</div>` : ''}
              ${item.es ? `<div class="es-line">${escapeHtml(item.es)}</div>` : ''}
            </div>

            <div class="details">

              ${item.matiz ? `
              <div class="meaning-boxes">
                <div class="meaning-box">
                  <span class="label">Observación</span>
                  <div class="value">${escapeHtml(item.matiz)}</div>
                </div>
              </div>
              ` : ''}

              ${renderWordsPanel(item.words)}
              ${renderKanjiPanel(item.kanjis)}

            </div>
          </div>
        </article>
      `;
    }

    function renderItem(item, index){
      const type = normalizeType(item.type || '');

      if(type === 'KANJI') return renderKanjiCard(item, index);
      if(type === 'PALABRA') return renderWordCard(item, index);
      return renderSentenceCard(item, index);
    }

    function setupSearch(){
      const input = document.getElementById('tagSearch');
      input.addEventListener('input', () => {
        const q = input.value.trim().toLowerCase();
        const cards = document.querySelectorAll('.entry');

        cards.forEach(card => {
          const text = (card.getAttribute('data-search') || '').toLowerCase();
          card.style.display = text.includes(q) ? '' : 'none';
        });
      });
    }

    fetch('data/elvivo.json')
      .then(res => res.json())
      .then(data => {
        const grid = document.getElementById('vivoGrid');
        grid.innerHTML = data.map((item, index) => renderItem(item, index)).join('');
        setupSearch();
      })
      .catch(err => {
        const grid = document.getElementById('vivoGrid');
        grid.innerHTML = `
          <article class="entry">
            <div class="entry-body">
              <div class="es-line">No se pudo cargar el JSON.</div>
              <div class="reading-line">${escapeHtml(err.message || 'Error desconocido')}</div>
            </div>
          </article>
        `;
        console.error(err);
      });
  </script>
</body>
</html>
