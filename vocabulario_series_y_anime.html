<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Canciones & Series — Asallam Sensei</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #0b1020;
    --card: rgba(255,255,255,.08);
    --card2: rgba(255,255,255,.10);
    --text: #eef2ff;
    --muted: rgba(238,242,255,.75);
    --accent: #7d5cff;
    --accent2:#22c55e;
    --danger:#ef4444;
    --border: rgba(255,255,255,.14);
    --font-jp: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", "MS PGothic", system-ui, sans-serif;
    --soft: rgba(255,255,255,.06);
    --series-accent: #d84f7f;
    --series-accent-soft: rgba(216,79,127,.16);
    --series-accent-border: rgba(216,79,127,.48);
    --series-accent-text: #ffd6e5;
    --mix-soft: rgba(214,40,40,.18);
    --mix-soft-border: rgba(214,40,40,.55);
    --mix-soft-text: #fecaca;
  }

  body{
    margin:0;
    font-family: Arial, sans-serif;
    background: radial-gradient(1200px 700px at 20% 10%, rgba(125,92,255,.35), transparent 60%),
                radial-gradient(900px 600px at 90% 20%, rgba(34,197,94,.22), transparent 60%),
                radial-gradient(900px 600px at 30% 90%, rgba(239,68,68,.18), transparent 55%),
                var(--bg);
    color: var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:28px 14px 70px;
  }

  .wrap{ width:min(980px, 100%); }

  header{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:16px;
  }

  h1{
    margin:0;
    font-size:clamp(22px, 5vw, 32px);
    margin-top:16px;
    margin-bottom:10px;
    text-align:center;
    letter-spacing:.2px;
  }

  .grid{
    display:grid;
    grid-template-columns: 1.1fr .9fr;
    gap:14px;
  }

  .card{
    background: linear-gradient(180deg, var(--card2), var(--card));
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: 0 18px 45px rgba(0,0,0,.35);
    padding: 16px;
  }

  .row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
  }

  .pill{
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.06);
    color: var(--muted);
    font-size: 13px;
  }

  .tag-kanji{
    display:block;          /* <- clave: que sea una línea sola */
    width: fit-content;
    margin: 0 auto 10px;    /* centrado + espacio abajo */
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 800;
    background: rgba(34,197,94,.18);
    border: 1px solid rgba(34,197,94,.5);
    color: #86efac;
    letter-spacing: .5px;
  }
  
  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:8px;
  }

.chip{
  padding: 10px 14px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,.06);
  color: var(--muted);
  cursor: pointer;
  user-select: none;
  font-size: 13px;
  font-weight: 800;
  transition: transform .12s, filter .12s, box-shadow .18s, background .18s, border-color .18s, color .18s;
}

.chip:hover{
  transform: translateY(-1px);
  background: rgba(255,255,255,.10);
}

.chip.activo{
  background: var(--series-accent-soft);
  border-color: var(--series-accent-border);
  color: var(--series-accent-text);
  box-shadow:
    0 0 8px rgba(34,197,94,.26),
    0 0 18px rgba(34,197,94,.14),
    inset 0 0 8px rgba(34,197,94,.08);
}

.btn{
  border: none;
  border-radius: 12px;
  padding: 11px 14px;
  cursor: pointer;
  color: white;
  background: var(--accent);
  font-weight: 700;
  font-size: 15px;
  transition: transform .15s, filter .15s, box-shadow .18s, background .18s, border-color .18s, color .18s;
}
.btn:hover{
  transform: translateY(-1px);
  filter: brightness(1.06);
}

  .btn-ghost{
    background: rgba(255,255,255,.08);
    border: 1px solid var(--border);
    color: var(--text);
    font-weight: 700;
  }

  .btn-danger{
    background: rgba(239,68,68,.15);
    border: 1px solid rgba(239,68,68,.5);
    color: #fecaca;
  }

  .btn-danger.activo{
    background: var(--danger);
    border-color: transparent;
    color: white;
  }

.btn-mode{
  background: rgba(255,255,255,.08);
  border: 1px solid var(--border);
  color: var(--text);
  font-weight: 700;
}

.btn-mode:hover{
  background: rgba(255,255,255,.12);
}

.btn-mode.activo{
  opacity: 1;
  background: rgba(125,92,255,.22);
  border-color: rgba(125,92,255,.55);
  color: #efe9ff;
  box-shadow:
    0 0 8px rgba(125,92,255,.25),
    inset 0 0 8px rgba(125,92,255,.08);
}

  .big{
    text-align:center;
    padding: 20px 10px 10px;
  }

#m-mix.activo{
  background: var(--mix-soft);
  border-color: var(--mix-soft-border);
  color: var(--mix-soft-text);
  box-shadow:
    0 0 8px rgba(214,40,40,.38),
    0 0 18px rgba(214,40,40,.18),
    inset 0 0 8px rgba(214,40,40,.08);
}
  
  #promptJP{
    font-size: 52px;
    font-weight: 500;
    letter-spacing: .5px;
    margin: 6px 0 8px;
  }

.prompt-es{
  font-size: 25px !important;
  line-height: 1.25;
  letter-spacing: .2px;
}
  
/* JP → ES: baja un poquito el japonés del prompt */
body.modo-jp-es #promptJP{
  font-size: 46px;
  font-family: var(--font-jp);
  letter-spacing: .35px;
}

body.modo-es-jp #promptJP{
  font-size: 34px;
  letter-spacing: .2px;
  font-family: var(--font-jp);
}

body.modo-es-jp #opciones{
  font-size: 22px;
  font-family: var(--font-jp);
}

/* Bafle grande solo en dictado */
#btnReplay{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background: rgba(125,92,255,.10);
  border:1px solid rgba(125,92,255,.42);
  color:#efe9ff;
  box-shadow:
    0 0 5px rgba(125,92,255,.35),
    inset 0 0 6px rgba(125,92,255,.10);

}

#btnReplay.big-sound{
  font-size: 28px;
  padding: 16px 20px;
  border-radius: 16px;
  background: rgba(125,92,255,.12);
  border:1px solid rgba(125,92,255,.55);
  color:#efe9ff;
  box-shadow:
    0 0 6px rgba(125,92,255,.6),
    0 0 14px rgba(125,92,255,.35),
    inset 0 0 8px rgba(125,92,255,.15);
}

#btnReplay.big-sound:hover{
  background: rgba(125,92,255,.22);
  box-shadow:
    0 0 10px rgba(125,92,255,.9),
    0 0 24px rgba(125,92,255,.6);
}
  
#opciones{
  margin-top: 10px;
  font-size: 20px;
  line-height: 1.7;
  text-align:left;
  width: fit-content;
  margin-left:auto;
  margin-right:auto;
  padding: 10px 14px;
  border-radius: 14px;
  border: 1px dashed rgba(255,255,255,.22);
  background: rgba(0,0,0,.18);
}
  
.opbtns{
  display:grid;
  grid-template-columns: repeat(3, minmax(0, 145px));
  justify-content:center;
  gap:10px;
  margin-top: 16px;
}

.opbtns button{
  width:100%;
  min-height:62px;
}

.opbtns .btn{
  border-radius:16px;
  padding:12px 14px;
  background: rgba(125,92,255,.12);
  border:1px solid rgba(125,92,255,.55);
  color:#efe9ff;
  font-size:22px;
  font-weight:700;
  text-align:center;
  box-shadow:
    0 0 6px rgba(125,92,255,.6),
    0 0 14px rgba(125,92,255,.35),
    inset 0 0 8px rgba(125,92,255,.15);
}

.opbtns .btn:hover{
  background: rgba(125,92,255,.22);
  box-shadow:
    0 0 10px rgba(125,92,255,.9),
    0 0 24px rgba(125,92,255,.6);
}  

  #resultado{
    margin-top: 12px;
    font-size: 20px;
    min-height: 32px;
    text-align:center;
    font-weight: 800;
    white-space: pre-line;
  }

  .correcto{ color: var(--accent2); }
  .incorrecto{ color: var(--danger); }

  .stats{
    margin-top: 12px;
    text-align:center;
    color: var(--muted);
    font-size: 15px;
  }

  .sep{
    height: 1px;
    background: rgba(255,255,255,.10);
    margin: 12px 0;
  }

  .hint{
    color: rgba(238,242,255,.7);
    font-size: 13px;
    line-height: 1.35;
    text-align:center;
  }

  code.kbd{
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.14);
    padding: 2px 7px;
    border-radius: 8px;
    font-weight: 700;
  }

#btnTodo.activo{
  background: var(--series-accent-soft);
  border-color: var(--series-accent-border);
  color: var(--series-accent-text);
  box-shadow:
    0 0 8px rgba(34,197,94,.26),
    0 0 18px rgba(34,197,94,.14),
    inset 0 0 8px rgba(34,197,94,.08);
}
  
@media (max-width: 900px){
  h1{
    font-size: 20px;
    line-height: 1.2;
    margin-top: 8px;
    margin-bottom: 6px;
  }
}

@media (max-width: 900px){
  .grid{
    grid-template-columns: 1fr;
  }

  .grid > .card:first-child{
    order: 1;
  }

  .grid > .card:last-child{
    order: 2;
  }
}

@media (max-width: 900px){
  .opbtns{
    grid-template-columns: 1fr;
  }

  .opbtns .btn{
    font-size: 18px;
    min-height: 56px;
  }
}
  
  
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Canciones & Series — Asallam Sensei</h1>
  </header>

  <div class="grid">
    <!-- Panel izquierdo: juego -->
    <div class="card big">
      <div id="promptJP">—</div>

      <div class="row" style="margin-top:6px;">
        <button id="btnReplay" class="btn btn-ghost" type="button" onclick="replayAudio()">🔊</button>
      </div>

      <div id="opciones"></div>

      <div class="opbtns">
        <button class="btn btn-ghost" onclick="responder('a')">a</button>
        <button class="btn btn-ghost" onclick="responder('b')">b</button>
        <button class="btn btn-ghost" onclick="responder('c')">c</button>
      </div>

      <div id="resultado"></div>

      <div class="stats">
        <div>
          Aciertos: <span id="aciertos">0</span> —
          Errores: <span id="errores">0</span>
        </div>
        <div style="margin-top:6px;">
          Racha: <span id="racha">0</span> —
          Mejor racha: <span id="mejorRacha">0</span> —
          Precisión: <span id="precision">0%</span>
        </div>
      </div>

      <div class="row" style="margin-top: 14px;">
        <button class="btn" onclick="siguiente()">Siguiente</button>
        <button class="btn btn-ghost" onclick="resetStats()">Reset stats</button>
      </div>

      <!-- <div class="sep"></div> -->
      <div class="hint" id="ayuda" style="display:none;">
        <b>Atajos:</b> <code class="kbd">a</code>, <code class="kbd">b</code>, <code class="kbd">c</code> responden.
        <code class="kbd">Enter</code> pasa a la siguiente.
      </div>
    </div>

    <!-- Panel derecho: controles -->
    <div class="card">
      <div class="row" style="justify-content:flex-start;">
        <span class="pill">Canción / Serie</span>
      </div>

      <div class="row" style="justify-content:flex-start; margin-top: 8px;">
        <div id="chipsBloques" class="chips"></div>
      </div>

      <div class="row" style="justify-content:flex-start; margin-top:10px; gap:10px;">
        <button id="btnTodo" class="btn btn-ghost btn-danger" onclick="seleccionarTodo()">Todo</button>
        <button id="btnNinguna" class="btn btn-ghost" onclick="seleccionarNinguna()">Ninguna</button>
      </div>

      <div class="sep"></div>

      <div class="row" style="justify-content:flex-start;">
        <span class="pill">Modo</span>
      </div>

      <div class="row" style="justify-content:flex-start; margin-top: 8px;">
        <button class="btn btn-mode" id="m-jp-es"   onclick="setModo('jp_es')">JP → ES</button>
        <button class="btn btn-mode" id="m-es-jp"   onclick="setModo('es_jp')">ES → JP</button>
        <button class="btn btn-mode" id="m-dict-es" onclick="setModo('dict_es')">Dictado → ES</button>
        <button class="btn btn-mode" id="m-dict-jp" onclick="setModo('dict_jp')">Dictado → JP</button>
        <button class="btn btn-mode" id="m-kanji"   onclick="setModo('kanji_mc')">Kanji</button>
        <button class="btn btn-mode" id="m-mix"     onclick="setModo('mix')">Mix</button>
      </div>

      <div class="sep"></div>

      <div class="row" style="justify-content:flex-start;">
        <span class="pill">Pool de opciones</span>
      </div>

      <div class="row" style="justify-content:flex-start; margin-top: 8px;">
        <button class="btn btn-mode" id="pool-sel"  onclick="setPoolScope('seleccion')">Solo selección</button>
        <button class="btn btn-mode" id="pool-glob" onclick="setPoolScope('global')">Global</button>
      </div>

      <div class="sep"></div>

      <div class="hint">
        A / B / C = responder · Enter = siguiente
      </div>
    </div>
  </div>

</div>

<script>
let DATA = { bloques: [] };

let bloqueIdx = 0;
let modoActual = "jp_es";
let yaValidado = false;
let actual = null;

let aciertos = 0;
let errores = 0;
let racha = 0;
let mejorRacha = 0;

let bloquesActivos = new Set([0]); // por defecto, el primero activo

// Pool de distractores: por defecto "seleccion"
let poolScope = "seleccion"; // "seleccion" | "global"

/* ===============================
   AUDIO (ROMAJI EXACTO)
   Regla: archivo = romaji EXACTO + ".mp3"
   Ej: "mirai kara" -> data/audios/series/mirai%20kara.mp3
=============================== */
const AUDIO_DIR = "data/audios/series/";
let audio = new Audio();
audio.preload = "auto";

// autoplay policy: habilitar audio tras primer click/tecla
let audioHabilitado = false;
document.addEventListener("pointerdown", () => (audioHabilitado = true), { once:true });
document.addEventListener("keydown",     () => (audioHabilitado = true), { once:true });

function audioUrlDesdeRomaji(romaji){
  return AUDIO_DIR + encodeURIComponent(String(romaji || "").trim()) + ".mp3";
}

function playAudioForRomaji(romaji){
  if(!romaji) return;

  const src = audioUrlDesdeRomaji(romaji);

  try{
    audio.pause();
    audio.currentTime = 0;
  }catch(e){}

  audio.onerror = () => {
    console.warn("[audio] No cargó:", src, "romaji=", romaji);
  };

  audio.src = src;
  audio.play().catch(err => {
    console.warn("[audio] play() falló:", err);
  });
}
  
/* ===============================
   STATS globales (1 solo contador)
=============================== */
const STATS_KEY = "animeVocabStats_global_v1";

function cargarStatsGlobal() {
  try {
    return JSON.parse(localStorage.getItem(STATS_KEY)) || {
      aciertos: 0,
      errores: 0,
      racha: 0,
      mejorRacha: 0
    };
  } catch {
    return {
      aciertos: 0,
      errores: 0,
      racha: 0,
      mejorRacha: 0
    };
  }
}

function guardarStatsGlobal() {
  localStorage.setItem(STATS_KEY, JSON.stringify({
    aciertos,
    errores,
    racha,
    mejorRacha
  }));
}

function cargarStatsActual() {
  const s = cargarStatsGlobal();
  aciertos = s.aciertos || 0;
  errores = s.errores || 0;
  racha = s.racha || 0;
  mejorRacha = s.mejorRacha || 0;
  pintarStats();
}

function precisionPct(){
  const total = aciertos + errores;
  if(total <= 0) return "0%";
  return Math.round((aciertos / total) * 100) + "%";
}
  
function guardarStatsActual() {
  guardarStatsGlobal();
}

/* ===============================
   POOLS (selección vs global)
=============================== */
function getVocabPool(scope){
  const idxs = (scope === "global")
    ? DATA.bloques.map((_, i) => i)
    : [...bloquesActivos];

  let pool = [];
  idxs.forEach(i => {
    const b = DATA.bloques[i];
    if(b?.vocabulario?.length) pool = pool.concat(b.vocabulario);
  });
  return pool;
}

function getKanjiPool(scope){
  const idxs = (scope === "global")
    ? DATA.bloques.map((_, i) => i)
    : [...bloquesActivos];

  let pool = [];
  idxs.forEach(i => {
    const b = DATA.bloques[i];
    if(b?.kanji?.length) pool = pool.concat(b.kanji);
  });
  return pool;
}

function setPoolScope(scope){
  poolScope = scope;
  $("pool-sel")?.classList.toggle("activo", poolScope === "seleccion");
  $("pool-glob")?.classList.toggle("activo", poolScope === "global");
  yaValidado = false;
  limpiarResultado();
  siguiente();
}

/* ===============================
   Selección de bloques (chips)
=============================== */
function seleccionarTodo(){
  bloquesActivos = new Set(DATA.bloques.map((_, i) => i));

  const cont = $("chipsBloques");
  if(cont){
    [...cont.children].forEach(el => el.classList.add("activo"));
  }

  $("btnTodo")?.classList.add("activo");

  yaValidado = false;
  limpiarResultado();
  siguiente();
}

function seleccionarNinguna(){
  bloquesActivos.clear();

  const cont = $("chipsBloques");
  if(cont){
    [...cont.children].forEach(el => el.classList.remove("activo"));
  }

  $("btnTodo")?.classList.remove("activo");

  limpiarResultado();
}

/* ===============================
   UI helpers
=============================== */
function $(id){ return document.getElementById(id); }

function limpiarResultado(){
  $("resultado").innerText = "";
  $("resultado").className = "";
}

function pintarStats(){
  $("aciertos").innerText = aciertos;
  $("errores").innerText = errores;
  $("racha").innerText = racha;
  $("mejorRacha").innerText = mejorRacha;
  $("precision").innerText = precisionPct();
}

function refrescarPills(){
  const b = DATA.bloques[bloqueIdx];
  document.title = `Repaso Anime Vocab — ${b?.cancion || "Asallam Sensei"}`;
}

function replayAudio(){
  audioHabilitado = true;
  if(!actual) return;

  const r = actual?.extra?.romaji;
  if(r) playAudioForRomaji(r);
}

/* ===============================
   Modo
=============================== */
function setModo(modo){
  modoActual = modo;

  // estilos por modo (solo afecta ES→JP)
  document.body.classList.toggle("modo-es-jp", modo === "es_jp" || modo === "dict_jp");

  // botones activos
  ["jp-es","es-jp","dict-es","dict-jp","kanji","mix"].forEach(x=>{
    const el = $("m-" + x);
    if(el) el.classList.remove("activo");
  });

  const map = {
    jp_es: "m-jp-es",
    es_jp: "m-es-jp",
    dict_es: "m-dict-es",
    dict_jp: "m-dict-jp",
    kanji_mc: "m-kanji",
    mix: "m-mix"
  };
  $(map[modo])?.classList.add("activo");

  yaValidado = false;
  limpiarResultado();
  cargarStatsActual();
  siguiente();
}

/* ===============================
   Random helpers
=============================== */
function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// arma 3 opciones únicas con un "correct"
function build3Options(pool, correctValue, mapFn, allowFn = null){
  const opciones = [correctValue];

  let tries = 0;
  while(opciones.length < 3 && tries < 300){
    tries++;

    const item = pick(pool);
    if(!item) continue;

    if(allowFn && !allowFn(item)) continue;

    const v = mapFn(item);
    if(v != null && v !== "" && !opciones.includes(v)) opciones.push(v);
  }

  while(opciones.length < 3){
    opciones.push("—");
  }

  return shuffle(opciones);
}

/* ===============================
   Generadores de preguntas
=============================== */
function preguntaVocabJP_ES(b){
  const poolLocal = b.vocabulario || [];
  if(poolLocal.length < 3) return null;

  const v = pick(poolLocal);
  const correct = v.es;

  const poolOpciones = getVocabPool(poolScope);
  const basePool = (poolOpciones.length >= 3) ? poolOpciones : poolLocal;

  const opciones = build3Options(
    basePool,
    correct,
    x => x.es,
    x => x.jp !== v.jp
  );
  
  const letras = ["a","b","c"];
  const correcta = letras[opciones.indexOf(correct)];

  return {
    tipo: "vocab_jp_es",
    prompt: v.jp,
    opciones,
    correcta,
    respuesta: correct,
    extra: v
  };
}

function preguntaVocabES_JP(b){
  const poolLocal = b.vocabulario || [];
  if(poolLocal.length < 3) return null;

  const v = pick(poolLocal);
  const correct = v.jp;

  const poolOpciones = getVocabPool(poolScope);
  const basePool = (poolOpciones.length >= 3) ? poolOpciones : poolLocal;

  const opciones = build3Options(basePool, correct, x => x.jp);
  const letras = ["a","b","c"];
  const correcta = letras[opciones.indexOf(correct)];

  return {
    tipo: "vocab_es_jp",
    prompt: v.es,
    opciones,
    correcta,
    respuesta: correct,
    extra: v
  };
}

function preguntaDictado_ES(b){
  const poolLocal = b.vocabulario || [];
  if(poolLocal.length < 3) return null;

  const v = pick(poolLocal);
  const correct = v.es;

  const poolOpciones = getVocabPool(poolScope);
  const basePool = (poolOpciones.length >= 3) ? poolOpciones : poolLocal;

  const opciones = build3Options(
    basePool,
    correct,
    x => x.es,
    x => x.jp !== v.jp
  );
  
  const letras = ["a","b","c"];
  const correcta = letras[opciones.indexOf(correct)];

  return {
    tipo: "dict_es",
    prompt: "🔊",
    opciones,
    correcta,
    respuesta: correct,
    extra: v,
    audioJP: v.jp
  };
}

/* ===============================
   Flujo
=============================== */
function siguiente(){
  const activos = [...bloquesActivos].filter(i => DATA.bloques[i]);
  if(activos.length === 0){
    $("promptJP").innerText = "Selecciona una canción/serie";
    $("opciones").innerHTML = "";
    return;
  }

  // elegimos al azar entre los bloques seleccionados (default: solo selección)
  bloqueIdx = pick(activos);
  const b = DATA.bloques[bloqueIdx];
  if(!b) return;

  let q = null;

  if(modoActual === "jp_es") q = preguntaVocabJP_ES(b);
  else if(modoActual === "es_jp") q = preguntaVocabES_JP(b);
  else if(modoActual === "dict_es") q = preguntaDictado_ES(b);
  else if(modoActual === "dict_jp") q = preguntaDictado_JP(b);
  else if(modoActual === "kanji_mc") q = preguntaKanjiMC(b);
  else {
    // mix
    const r = Math.random();
    if(r < 0.35) q = preguntaVocabJP_ES(b);
    else if(r < 0.60) q = preguntaVocabES_JP(b);
    else if(r < 0.78) q = preguntaDictado_ES(b);
    else if(r < 0.90) q = preguntaDictado_JP(b);
    else q = preguntaKanjiMC(b);
  }

  if(!q){
    $("promptJP").innerText = "Faltan datos en el JSON";
    $("opciones").innerHTML = "";
    return;
  }

  actual = q;

  // Reset clases del prompt
  $("promptJP").classList.remove("prompt-es");
  
  // Si la pregunta muestra español como prompt
  if(actual.tipo === "vocab_es_jp"){
    $("promptJP").classList.add("prompt-es");
  }
  
const btnReplay = $("btnReplay");

// 🔊 ocultar solo en modo Kanji
if(actual.tipo === "kanji_mc"){
  btnReplay.style.display = "none";
} else {
  btnReplay.style.display = "";
}
  
// reset: tamaño normal del bafle
btnReplay?.classList.remove("big-sound");

// dictado: NO mostrar 🔊 arriba, solo el botón grande
if(actual.tipo === "dict_es" || actual.tipo === "dict_jp"){
  $("promptJP").textContent = "";          // o "DICTADO" si quieres
  btnReplay?.classList.add("big-sound");
}
// kanji: badge + kanji
else if(actual.tipo === "kanji_mc"){
  $("promptJP").innerHTML = `
    <div class="tag-kanji">(KANJI)</div>
    <div class="kanji-prompt">${actual.prompt}</div>
  `;
}
// resto: prompt normal
else{
  $("promptJP").textContent = actual.prompt;
}

  $("opciones").innerHTML =
    `a) ${actual.opciones[0]}<br>b) ${actual.opciones[1]}<br>c) ${actual.opciones[2]}`;

  limpiarResultado();
  yaValidado = false;

  // dictado: reproduce apenas sale
  if(actual.tipo === "dict_es" || actual.tipo === "dict_jp"){
    audioHabilitado = true;
    if(actual.extra?.romaji) playAudioForRomaji(actual.extra.romaji);
  }

  // stats por (bloque + modo) ya queda bien
  cargarStatsActual();
}

function responder(letra){
  if(yaValidado) return;
  verificar(letra);
}

function verificar(letra = ""){
  const input = String(letra || "").trim().toLowerCase();
  const res = $("resultado");

  if(actual?.extra?.romaji){
    playAudioForRomaji(actual.extra.romaji);
  }

  if(!["a","b","c"].includes(input)){
    res.className = "incorrecto";
    res.innerText = "Usa solo los botones: a / b / c";
    return;
  }

  if(input === actual.correcta){
    res.className = "correcto";
    res.innerText = "Correcto ✔";
    aciertos++;
    racha++;
    if(racha > mejorRacha) mejorRacha = racha;
  }else{
    const extra = (actual.extra?.romaji && ["vocab_jp_es","vocab_es_jp","dict_es","dict_jp"].includes(actual.tipo))
      ? `\nRomaji: ${actual.extra.romaji}`
      : "";

    res.className = "incorrecto";
    res.innerText = `Incorrecto ✘ (era ${actual.correcta})\nRespuesta: ${actual.correcta}) ${actual.respuesta}${extra}`;
    errores++;
    racha = 0;
  }

  pintarStats();
  guardarStatsActual();
  yaValidado = true;
}

function resetStats(){
  aciertos = 0;
  errores = 0;
  racha = 0;
  mejorRacha = 0;
  pintarStats();
  guardarStatsActual();
}

/* ===============================
   CARGA JSON
=============================== */

/* ===============================
   LISTA de canciones que SÍ tienen audio
   (exactamente igual a como viene en el JSON)
=============================== */
  
fetch("data/anime_vocab.json")
  .then(r => r.json())
  .then(json => {
    DATA = (json && json.bloques) ? json : { bloques: [] };

    if(DATA.bloques.length === 0){
      $("promptJP").innerText = "No hay canciones habilitadas (revisa CANCIONES_CON_AUDIO)";
      $("opciones").innerHTML = "";
      return;
    }
    
    const cont = $("chipsBloques");
    cont.innerHTML = "";
    
    // default: TODO lo visible activo
    bloquesActivos = new Set(DATA.bloques.map((_, i) => i));
    $("btnTodo")?.classList.add("activo");

    DATA.bloques.forEach((b, i) => {
      const chip = document.createElement("div");
      chip.className = "chip" + (bloquesActivos.has(i) ? " activo" : "");
      chip.textContent = b.cancion || `Bloque ${i+1}`;

      chip.onclick = () => {
        $("btnTodo")?.classList.remove("activo");

        if(bloquesActivos.has(i)) bloquesActivos.delete(i);
        else bloquesActivos.add(i);

        // nunca dejar vacío: si apaga el último, lo volvemos a prender
        if(bloquesActivos.size === 0) bloquesActivos.add(i);

        [...cont.children].forEach((el, idx) => {
          el.classList.toggle("activo", bloquesActivos.has(idx));
        });

        yaValidado = false;
        limpiarResultado();
        siguiente();
      };

      cont.appendChild(chip);
    });

    bloqueIdx = 0;
    refrescarPills();

    // default: pool por selección
    setPoolScope("seleccion");

    // default: modo jp_es
    setModo("mix");
  })
  .catch(err => {
    $("promptJP").innerText = "No se pudo cargar data/anime_vocab.json";
    $("resultado").innerText = "Revisa la ruta y que estés en servidor (GitHub Pages / Live Server).";
    console.error(err);
  });

document.addEventListener("keydown", (event) => {
  const k = (event.key || "").toLowerCase();

  if(k === "a" || k === "b" || k === "c"){
    event.preventDefault();
    if(!yaValidado) responder(k);
    return;
  }

  if(k === "enter"){
    event.preventDefault();
    if(yaValidado) siguiente();
  }
});
  
</script>
