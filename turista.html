<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Turista en Japón — Asallam Sensei</title>
<style>
  :root{
    --bg: #f6f6ff;
    --card: #ffffff;
    --text: #111;
    --muted: #555;
    --accent: #7d5cff;
    --accent2:#5d46d4;
    --danger:#d93025;
    --ok:#28a745;
    --border:#d9d9e7;
  }

  body{
    background: var(--bg);
    font-family: Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 26px 14px 60px;
    color: var(--text);
  }

  h1{
    font-size: 40px;
    margin: 10px 0 14px;
    text-align:center;
  }

  /* Barra superior: bloques + modos */
  .bar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    max-width: 920px;
    margin-bottom: 10px;
  }

  .btn{
    padding: 10px 14px;
    font-size: 16px;
    border-radius: 999px;
    border: 2px solid var(--accent);
    background: transparent;
    color: #2b214b;
    cursor:pointer;
    user-select:none;
    transition: 0.15s;
  }
  .btn:hover{ transform: translateY(-1px); }
  .btn.activo{
    background: var(--accent);
    color: white;
  }

  .panel{
    width: min(920px, 100%);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 16px 16px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.06);
    text-align:center;
  }

  /* Prompt base (JP→ES y ES→JP) responsive */
  #prompt{
    font-size: clamp(36px, 8vw, 64px);  /* móvil → mediano → pc */
    font-weight: 800;
    margin: 6px 0 10px;
    line-height: 1.05;
    word-break: break-word;
  }
  
  /* Cuando la pregunta es español → japonés (más pequeñoo) */
  #prompt.prompt-es-jp{
    font-size: clamp(22px, 4.5vw, 35px);
    font-weight: 700;
    line-height: 1.2;
  }
  
  /* Opciones también responsive */
  #opciones{
    font-size: clamp(16px, 4.2vw, 22px);
    text-align:left;
    line-height: 1.7;
    width: fit-content;
    margin: 0 auto 10px;
  }

  #respuestaUsuario{
    margin-top: 8px;
    font-size: 22px;
    padding: 8px 12px;
    border-radius: 10px;
    border: 2px solid #aaa;
    text-align:center;
    width: 110px;
  }

  .acciones{
    margin-top: 14px;
    display:flex;
    flex-wrap:wrap;
    gap: 10px;
    justify-content:center;
  }

  .accion-btn{
    padding: 12px 18px;
    border-radius: 12px;
    border:none;
    background: var(--accent);
    color: white;
    cursor:pointer;
    font-size: 18px;
  }
  .accion-btn:hover{ background: var(--accent2); }

  #resultado{
    margin-top: 12px;
    font-size: 22px;
    min-height: 30px;
    text-align:center;
    white-space: pre-line;
  }

  .correcto{ color: var(--ok); font-weight: 800; }
  .incorrecto{ color: var(--danger); font-weight: 800; }

  #estadisticas{
    margin-top: 14px;
    font-size: 18px;
    text-align:center;
    color: #222;
  }

  .mini{
    margin-top: 6px;
    font-size: 13px;
    color: var(--muted);
    text-align:center;
  }

  .sep{
    height:1px;
    background: var(--border);
    margin: 12px 0;
  }

  /* Botones a/b/c */
  #opbtns{
    display:flex;
    gap:10px;
    justify-content:center;
    margin: 6px 0 2px;
  }

  .btnABC{
    padding:10px 16px;
    font-size:18px;
    border-radius:10px;
    border:none;
    background:#b94a48;        /* rojo apagado */
    color:#fff;
    cursor:pointer;
    min-width:64px;
    font-weight:800;
  }
  .btnABC:hover{
    background:#a94442;
  }

  .jp{
  font-family: "Yu Gothic", "Hiragino Sans", "Meiryo", "Noto Sans JP", sans-serif;
  font-feature-settings: "palt" 0;
  }

  /* Botón TODOS */
  .btn-todos{
    border-color:#e03131;
    color:#a11b1b;
    opacity:0.45;            /* fantasma cuando NO activo */
  }
  .btn-todos.activo{
    background:#ffb3b3;      /* rojo pastel cuando activo */
    border-color:#ffb3b3;
    color:#7a1c1c;
    opacity:1;
  }
  
</style>
</head>
<body>

<h1>Turista en Japón — Asallam Sensei</h1>

<!-- Bloques (dinámicos) -->
<div class="bar" id="bloquesBar"></div>

<!-- Modos -->
<div class="bar" id="modosBar">
  <button class="btn" id="btn-jp_es" onclick="setModo('jp_es')">Japonés → Español</button>
  <button class="btn" id="btn-es_jp" onclick="setModo('es_jp')">Español → Japonés</button>
</div>

<div class="panel">
  <div id="prompt">…</div>

  <div id="opciones"></div>

  <div id="opbtns">
    <button class="btnABC" type="button" onclick="responder('a')">a</button>
    <button class="btnABC" type="button" onclick="responder('b')">b</button>
    <button class="btnABC" type="button" onclick="responder('c')">c</button>
  </div>
  
  <input id="respuestaUsuario"
         type="text"
         placeholder="a / b / c"
         maxlength="1"
         onkeydown="manejarEnter(event)"/>

  <div class="acciones">
    <button class="accion-btn" onclick="mostrarRespuesta()">Mostrar respuesta</button>
    <button class="accion-btn" onclick="siguienteDesdeBoton()">Siguiente</button>
  </div>

  <div id="resultado"></div>

  <div class="sep"></div>

  <div id="estadisticas">
    Aciertos: <span id="aciertos">0</span> — Errores: <span id="errores">0</span>
  </div>

  <div class="acciones" style="margin-top:12px;">
    <button class="btn" onclick="resetStatsTodo()">Reset stats</button>
  </div>
</div>

<script>
/* ===============================
   CONFIG
=============================== */
const DATA_PATH  = "data/turista.json";   // <-- cambia el nombre si tu archivo se llama distinto
const AUDIO_DIR  = "data/audios/turista/";             // <-- carpeta de audios

/* ===============================
   STATE
=============================== */
let dataRaw = {};
let bloques = [];              // keys del JSON
let bloqueActual = "";         // key actual
let lista = [];                // items normalizados del bloque actual

let modoActual = "jp_es";      // "jp_es" | "es_jp"
let pool = [];                 // lista activa para el quiz

let actualIdx = 0;
let actualItem = null;

let correcta = "";             // 'a'|'b'|'c'
let opcionCorrectaTexto = "";  // texto correcto mostrado en opciones
let yaValidado = false;

let aciertos = 0;
let errores  = 0;
let focoAutomatico = false; // por defecto: NO abrir teclado en móvil

let todosActivo = false;
let bloquesSeleccionados = new Set();  // temas marcados
  
/* ===============================
   AUDIO (usa romaji del JSON) - estilo Turista
=============================== */
let audio = new Audio();
audio.preload = "auto";

function unique(arr){
  return [...new Set(arr.filter(Boolean))];
}

function stripDiacritics(s){
  // ō ū ā ē ī -> o u a e i
  return (s || "").normalize("NFKD").replace(/[\u0300-\u036f]/g, "");
}

function cleanRomajiToken(s){
    let x = String(s || "").trim().toLowerCase().normalize("NFC"); // ✅ NFC aquí

  // quita puntuación final típica
  x = x.replace(/[！？?!。．…]+$/g, "").trim();

  // normaliza comas/puntos dentro
  x = x.replace(/[、，,]/g, " ");
  x = x.replace(/[.]/g, "");

  // quita apóstrofo de n: shin'ya -> shinya
  x = x.replace(/n'/g, "n");

  // colapsa espacios
  x = x.replace(/\s+/g, " ").trim();

  return x;
}

function splitRomajiOptions(romaji){
  // "hairu / nyū" -> ["hairu","nyū"]
  const raw = String(romaji || "");
  return raw
    .split("/")
    .map(s => cleanRomajiToken(s))
    .filter(Boolean);
}

function longVowelVariants(s){
  s = String(s || "").normalize("NFC"); // ✅ NFC aquí también
  const v = new Set([s]);

  // macrones -> variantes
  v.add(s.replace(/ō/g, "ou"));
  v.add(s.replace(/ō/g, "oo"));

  v.add(s.replace(/ū/g, "uu"));
  v.add(s.replace(/ā/g, "aa"));
  v.add(s.replace(/ē/g, "ee"));
  v.add(s.replace(/ī/g, "ii"));

  // versión sin macrón
  v.add(s.replace(/ō/g, "o"));
  v.add(s.replace(/ū/g, "u"));
  v.add(s.replace(/ā/g, "a"));
  v.add(s.replace(/ē/g, "e"));
  v.add(s.replace(/ī/g, "i"));

  return [...v];
}

function separatorVariants(s){
  const baseRaw = String(s || "").trim();          // 👈 NO lower aquí
  const baseLow = baseRaw.toLowerCase();

  // normaliza espacios
  const spacedRaw = baseRaw.replace(/\s+/g, " ").trim();
  const spacedLow = baseLow.replace(/\s+/g, " ").trim();

  // separadores típicos (raw + lower)
  const undersRaw = spacedRaw.replace(/\s+/g, "_");
  const dashedRaw = spacedRaw.replace(/\s+/g, "-");
  const dottedRaw = spacedRaw.replace(/\s+/g, ".");
  const joinedRaw = spacedRaw.replace(/\s+/g, "");

  const undersLow = spacedLow.replace(/\s+/g, "_");
  const dashedLow = spacedLow.replace(/\s+/g, "-");
  const dottedLow = spacedLow.replace(/\s+/g, ".");
  const joinedLow = spacedLow.replace(/\s+/g, "");

  // cambiar separadores existentes
  const swap1Raw = spacedRaw.replace(/[_-]+/g, " ");
  const swap2Raw = spacedRaw.replace(/[_]+/g, "-");
  const swap3Raw = spacedRaw.replace(/[-]+/g, "_");

  const unders2Raw = swap1Raw.replace(/\s+/g, "_");
  const dashed2Raw = swap1Raw.replace(/\s+/g, "-");

  const safe = (x) => x.replace(/[^a-z0-9 _.-]/gi, ""); // 👈 gi para no matar mayúsculas
  const safe_spacedRaw = safe(spacedRaw);
  const safe_undersRaw = safe(undersRaw);
  const safe_dashedRaw = safe(dashedRaw);
  const safe_dottedRaw = safe(dottedRaw);
  const safe_joinedRaw = safe(joinedRaw);

  const safe_spacedLow = safe(spacedLow);
  const safe_undersLow = safe(undersLow);
  const safe_dashedLow = safe(dashedLow);
  const safe_dottedLow = safe(dottedLow);
  const safe_joinedLow = safe(joinedLow);

  // super-pegado (máxima tolerancia)
  const alnumOnlyRaw = baseRaw.replace(/[^a-z0-9]/gi, "");
  const alnumOnlyLow = baseLow.replace(/[^a-z0-9]/g, "");

  const squeezeUnders = (x) => x.replace(/_+/g, "_");
  const squeezeDash   = (x) => x.replace(/-+/g, "-");

  return unique([
    baseRaw, spacedRaw, undersRaw, dashedRaw, dottedRaw, joinedRaw,
    swap1Raw, swap2Raw, swap3Raw, unders2Raw, dashed2Raw,
    safe_spacedRaw, safe_undersRaw, safe_dashedRaw, safe_dottedRaw, safe_joinedRaw,
    squeezeUnders(undersRaw), squeezeDash(dashedRaw),
    alnumOnlyRaw,

    // 👇 también prueba la versión lower (por si el archivo sí está todo en minúscula)
    baseLow, spacedLow, undersLow, dashedLow, dottedLow, joinedLow,
    safe_spacedLow, safe_undersLow, safe_dashedLow, safe_dottedLow, safe_joinedLow,
    squeezeUnders(undersLow), squeezeDash(dashedLow),
    alnumOnlyLow
  ].map(x => String(x).trim()).filter(Boolean));
}

function romajiCandidatesFromJson(romaji){
  const opts = splitRomajiOptions(romaji);
  if(opts.length === 0) return [];

  let all = [];

  opts.forEach(opt => {
    const plain = stripDiacritics(opt);

    [opt, plain].forEach(base => {
      longVowelVariants(base).forEach(v => {
        separatorVariants(v).forEach(s => all.push(s));
      });
    });
  });

  return unique(all);
}

function playAudioForRomaji(romaji){
  const candidates = romajiCandidatesFromJson(romaji);
  if(candidates.length === 0) return;

  let i = 0;

  const tryNext = () => {
    if(i >= candidates.length) return;

    const name = candidates[i++];
    const src = AUDIO_DIR + encodeURIComponent(name) + ".mp3";

    audio.onended = null;
    audio.onerror = () => { tryNext(); };

    try{
      audio.pause();
      audio.currentTime = 0;
      audio.src = src;
      audio.play().catch(() => tryNext());
    }catch(e){
      tryNext();
    }
  };

  tryNext();
}

  
/* ===============================
   STATS (localStorage) - por modo + bloque
=============================== */
const STATS_KEY = "saludosQuizStats_v1";

function cargarStatsObj(){
  try{ return JSON.parse(localStorage.getItem(STATS_KEY)) || {}; }
  catch{ return {}; }
}
function guardarStatsObj(o){
  localStorage.setItem(STATS_KEY, JSON.stringify(o));
}
function statsKey(modo, bloque){
  return `${bloque}__${modo}`;
}
function cargarStatsActual(){
  const stats = cargarStatsObj();
  const k = statsKey(modoActual, bloqueActual);
  const s = stats[k] || { aciertos: 0, errores: 0 };
  aciertos = s.aciertos || 0;
  errores  = s.errores  || 0;
  actualizarEstadisticas();
}
function guardarStatsActual(){
  const stats = cargarStatsObj();
  const k = statsKey(modoActual, bloqueActual);
  stats[k] = { aciertos, errores };
  guardarStatsObj(stats);
}
function resetStatsTodo(){
  localStorage.removeItem(STATS_KEY);
  aciertos = 0; errores = 0;
  actualizarEstadisticas();
}

/* ===============================
   UI HELPERS
=============================== */
function $(id){ return document.getElementById(id); }

// Si el usuario toca/clickea el input, permitimos foco automático después
document.addEventListener("pointerdown", (e) => {
  focoAutomatico = (e.target && e.target.id === "respuestaUsuario");
});

// Si el usuario presiona teclas, asumimos que quiere modo teclado
document.addEventListener("keydown", (e) => {
  if(["a","b","c","Enter"].includes(e.key)) focoAutomatico = true;
});

  
function pintarBotonesActivos(){
  // modos
  ["jp_es","es_jp"].forEach(m => {
    const b = $("btn-" + m);
    if(!b) return;
    b.classList.toggle("activo", modoActual === m);
  });

  // bloques
  document.querySelectorAll(".btn-bloque").forEach(btn => {
    const k = btn.dataset.bloque;
    btn.classList.toggle("activo", bloquesSeleccionados.has(k));
  });
  
  // botón TODOS
  const bt = $("btn-todos");
  if(bt) bt.classList.toggle("activo", todosActivo);
  
}

function actualizarEstadisticas(){
  $("aciertos").innerText = aciertos;
  $("errores").innerText  = errores;
}

/* ===============================
   CARGA Y NORMALIZACIÓN
=============================== */
function normalizarItem(x){
  return {
    japones: String(x.japones || "").trim(),
    romaji:  String(x.romaji  || "").trim(),
    espanol: String(x.espanol || "").trim()
  };
}

fetch(DATA_PATH)
  .then(r => r.json())
  .then(data => {
    dataRaw = data || {};
    bloques = Object.keys(dataRaw).filter(k => Array.isArray(dataRaw[k]));

    if(bloques.length === 0){
      $("prompt").innerText = "No hay bloques";
      $("resultado").innerText = "El JSON no contiene listas de vocabulario.";
      return;
    }

    construirBarraBloques(bloques);
    bloqueActual = bloques[0];

    // modo por defecto
    modoActual = "jp_es";
    pintarBotonesActivos();

    cargarBloque(bloqueActual);
    setModo(modoActual); // esto llama a cargar stats + siguiente
  })
  .catch(err => {
    console.error(err);
    $("resultado").innerText = "No se pudo cargar el JSON. Revisa ruta y servidor.";
    $("resultado").className = "incorrecto";
  });

function construirBarraBloques(keys){
  const bar = $("bloquesBar");
  bar.innerHTML = "";

  // por defecto: solo "saludos_y_despedidas"
  const defaultBloque = "saludos_y_despedidas";
  
  if(keys.includes(defaultBloque)){
    bloquesSeleccionados = new Set([defaultBloque]);
  }else{
    // si no existe, usa el primero
    bloquesSeleccionados = new Set([keys[0]]);
  }
  
  todosActivo = false;

  keys.forEach(k => {
    const btn = document.createElement("button");
    btn.className = "btn btn-bloque";
    btn.dataset.bloque = k;
    btn.textContent = k.replaceAll("_"," ");
    btn.onclick = () => toggleTema(k);
    bar.appendChild(btn);
  });

  // Botón TODOS al final
  const btnAll = document.createElement("button");
  btnAll.className = "btn btn-todos";
  btnAll.id = "btn-todos";
  btnAll.textContent = "Todos";
  btnAll.onclick = toggleTodos;
  bar.appendChild(btnAll);

  actualizarPoolDesdeSeleccion();
  pintarBotonesActivos();
}

function actualizarPoolDesdeSeleccion(){
  const sel = [...bloquesSeleccionados];
  let combinado = [];
  sel.forEach(k => {
    const arr = (dataRaw[k] || []).map(normalizarItem)
      .filter(it => it.japones && it.espanol && it.romaji);
    combinado = combinado.concat(arr);
  });
  pool = combinado;
}

function toggleTodos(){
  if(!bloques.length) return;

  if(todosActivo){
    // si apaga TODOS, deja solo el primero para no quedar vacío
    todosActivo = false;
    bloquesSeleccionados = new Set([bloques[0]]);
  }else{
    // activa TODOS
    todosActivo = true;
    bloquesSeleccionados = new Set(bloques);
  }

  actualizarPoolDesdeSeleccion();
  cargarStatsActual();      // stats siguen por modo+bloqueActual (lo dejas igual)
  pintarBotonesActivos();
  siguiente();
}

function toggleTema(k){
  // si estaba "Todos", al tocar un tema pasamos a modo selección manual
  if(todosActivo){
    todosActivo = false;
    bloquesSeleccionados = new Set([k]);
  }else{
    if(bloquesSeleccionados.has(k)) bloquesSeleccionados.delete(k);
    else bloquesSeleccionados.add(k);

    // evita quedar vacío
    if(bloquesSeleccionados.size === 0) bloquesSeleccionados.add(k);
  }

  // si ya quedaron todos marcados -> vuelve a TODOS
  if(bloquesSeleccionados.size === bloques.length) todosActivo = true;

  actualizarPoolDesdeSeleccion();
  pintarBotonesActivos();
  siguiente();
}


function cargarBloque(k){
  lista = (dataRaw[k] || []).map(normalizarItem)
    .filter(it => it.japones && it.espanol && it.romaji);

  pool = lista.slice();
  
  if(pool.length < 3){
    $("resultado").innerText = "Pool muy pequeño: necesitas al menos 3 entradas en el bloque.";
    $("resultado").className = "incorrecto";
  }else{
    $("resultado").innerText = "";
    $("resultado").className = "";
  }
}

/* ===============================
   MODO
=============================== */
function setModo(modo){
  modoActual = modo;
  pintarBotonesActivos();
  cargarStatsActual();
  siguiente();
}

/* ===============================
   QUIZ (3 opciones)
=============================== */
function mezclar(arr){
  return arr.slice().sort(() => Math.random() - 0.5);
}

function siguiente(){
  if(pool.length < 3) return;

  yaValidado = false;
  $("resultado").innerText = "";
  $("resultado").className = "";
  $("respuestaUsuario").value = "";
  if(focoAutomatico){
    $("respuestaUsuario").focus();
  }


  actualIdx = Math.floor(Math.random() * pool.length);
  actualItem = pool[actualIdx];

  // pregunta según modo
  const pregunta = (modoActual === "jp_es") ? actualItem.japones : actualItem.espanol;

  // correcto y distractores según modo (si pregunta jp -> opciones español, si pregunta es -> opciones japonés)
  const campoOpciones = (modoActual === "jp_es") ? "espanol" : "japones";
  const campoCorrecto = campoOpciones;

  const correctoTexto = actualItem[campoCorrecto];

  let opciones = [correctoTexto];
  while(opciones.length < 3){
    const r = pool[Math.floor(Math.random() * pool.length)][campoOpciones];
    if(r && !opciones.includes(r)) opciones.push(r);
  }
  opciones = mezclar(opciones);

  const letras = ["a","b","c"];
  correcta = letras[opciones.indexOf(correctoTexto)];
  opcionCorrectaTexto = correctoTexto;

  const promptEl = $("prompt");
  promptEl.innerText = pregunta;

  promptEl.classList.remove("jp");
  if(modoActual === "jp_es"){
    promptEl.classList.add("jp");
  }

  
  // tamaño según modo
  promptEl.classList.remove("prompt-es-jp");
  if(modoActual === "es_jp"){
    promptEl.classList.add("prompt-es-jp");
  }

  $("opciones").innerHTML =
    `a) ${escapeHTML(opciones[0])}<br>
     b) ${escapeHTML(opciones[1])}<br>
     c) ${escapeHTML(opciones[2])}`;

  $("opciones").classList.remove("jp");
  if(modoActual === "es_jp"){
    $("opciones").classList.add("jp");
  }
 
  // subinfo: mostramos el romaji SOLO después (al corregir / mostrar / saltar)

}

function escapeHTML(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function responder(letra){
  focoAutomatico = false;  // si usa botones, no queremos teclado automático
  if(yaValidado) return;               // evita doble respuesta
  $("respuestaUsuario").value = letra; // rellena el input
  verificar();                         // valida igual que Enter
}

function verificar(){
  const r = $("respuestaUsuario").value.toLowerCase().trim();
  const res = $("resultado");

  // 🔊 sonido al validar
  playAudioForRomaji(actualItem.romaji);

  if(r === correcta){
    res.innerText = `Correcto ✔\nRomaji: ${actualItem.romaji}`;
    res.className = "correcto";
    aciertos++;
  }else{
    res.innerText =
      `Incorrecto ✘ (era ${correcta})\n` +
      `Respuesta: ${opcionCorrectaTexto}\n` +
      `Romaji: ${actualItem.romaji}`;
    res.className = "incorrecto";
    errores++;
  }

  actualizarEstadisticas();
  guardarStatsActual();
  yaValidado = true;
}

function mostrarRespuesta(){
  if(yaValidado) return;

  const res = $("resultado");

  playAudioForRomaji(actualItem.romaji);

  // penaliza
  errores++;
  actualizarEstadisticas();
  guardarStatsActual();

  // muestra solución + romaji
  res.innerText =
    `Mostrada ✘ (era ${correcta})\n` +
    `Respuesta: ${opcionCorrectaTexto}\n` +
    `Romaji: ${actualItem.romaji}`;
  res.className = "incorrecto";

  yaValidado = true;
}

function siguienteDesdeBoton(){
  const res = $("resultado");

  // si NO ha respondido aún
  if(!yaValidado){
    const v = $("respuestaUsuario").value.trim();

    // ✅ SOLO suena si está en blanco
    if(v === ""){
      playAudioForRomaji(actualItem.romaji);
    }

    errores++;
    actualizarEstadisticas();
    guardarStatsActual();

    res.innerText =
      `Saltado ✘ (era ${correcta})\n` +
      `Respuesta: ${opcionCorrectaTexto}\n` +
      `Romaji: ${actualItem.romaji}`;
    res.className = "incorrecto";

    yaValidado = true;
    return;
  }

  // ✅ si YA estaba revisado, NO suena, solo pasa
  siguiente();
}

function manejarEnter(ev){
  if(ev.key !== "Enter") return;

  if(!yaValidado){
    // Enter sin letra -> lo tratamos como "mostrar respuesta" y penaliza (como tu estilo)
    const v = $("respuestaUsuario").value.trim();
    if(v === ""){
      mostrarRespuesta();
      return;
    }
    verificar();
  }else{
    siguiente();
  }
}
</script>
