<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Turista en Japón — Asallam Sensei</title>
<style>
  :root{
    --bg: #f6f6ff;
    --card: #ffffff;
    --text: #111;
    --muted: #555;
    --accent: #7d5cff;
    --accent2:#5d46d4;
    --danger:#d93025;
    --ok:#28a745;
    --border:#d9d9e7;
  }

  body{
    background: var(--bg);
    font-family: Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 26px 14px 60px;
    color: var(--text);
  }

  h1{
    font-size: 40px;
    margin: 10px 0 14px;
    text-align:center;
  }

  /* Sidebar: bloques y modos */
.bar{
  width: 100%;
  margin-bottom: 0;
}

  .btn{
    padding: 10px 14px;
    font-size: 16px;
    border-radius: 999px;
    border: 2px solid var(--accent);
    background: transparent;
    color: #2b214b;
    cursor:pointer;
    user-select:none;
    transition: 0.15s;
  }
  .btn:hover{ transform: translateY(-1px); }
  .btn.activo{
    background: var(--accent);
    color: white;
  }

.panel{
  width: auto;
  min-width: 0;
  max-width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px 16px 16px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.06);
  text-align:center;
  justify-self: stretch;
}

  /* Prompt base (JP→ES y ES→JP) responsive */
#prompt{
  font-size: clamp(34px, 4.8vw, 56px);
  font-weight: 800;
  margin: 6px 0 10px;
  line-height: 1.05;
  word-break: break-word;
}

  /* Cuando la pregunta es español → japonés (más pequeñoo) */
  #prompt.prompt-es-jp{
    font-size: clamp(22px, 4.5vw, 35px);
    font-weight: 700;
    line-height: 1.2;
  }

  /* Opciones también responsive */
  #opciones{
    font-size: clamp(16px, 4.2vw, 22px);
    text-align:left;
    line-height: 1.7;
    width: fit-content;
    margin: 0 auto 10px;
  }

  #respuestaUsuario{
    margin-top: 8px;
    font-size: 22px;
    padding: 8px 12px;
    border-radius: 10px;
    border: 2px solid #aaa;
    text-align:center;
    width: 110px;
  }

  .acciones{
    margin-top: 14px;
    display:flex;
    flex-wrap:wrap;
    gap: 10px;
    justify-content:center;
  }

  .accion-btn{
    padding: 12px 18px;
    border-radius: 12px;
    border:none;
    background: var(--accent);
    color: white;
    cursor:pointer;
    font-size: 18px;
  }
  .accion-btn:hover{ background: var(--accent2); }

  #resultado{
    margin-top: 12px;
    font-size: 22px;
    min-height: 30px;
    text-align:center;
    white-space: pre-line;
  }

  .correcto{ color: var(--ok); font-weight: 800; }
  .incorrecto{ color: var(--danger); font-weight: 800; }

  #estadisticas{
    margin-top: 14px;
    font-size: 18px;
    text-align:center;
    color: #222;
  }

  .sep{
    height:1px;
    background: var(--border);
    margin: 12px 0;
  }

  
  /* Botones a/b/c */
  #opbtns{
    display:flex;
    gap:10px;
    justify-content:center;
    margin: 6px 0 2px;
  }

  .btnABC{
    padding:10px 16px;
    font-size:18px;
    border-radius:10px;
    border:none;
    background:#b94a48;
    color:#fff;
    cursor:pointer;
    min-width:64px;
    font-weight:800;
  }
  .btnABC:hover{ background:#a94442; }

  .jp{
    font-family: "Yu Gothic", "Hiragino Sans", "Meiryo", "Noto Sans JP", sans-serif;
    font-feature-settings: "palt" 0;
  }

  /* Botón TODOS */
  .btn-todos{
    border-color:#e03131;
    color:#a11b1b;
    opacity:0.45;
  }
  .btn-todos.activo{
    background:#ffb3b3;
    border-color:#ffb3b3;
    color:#7a1c1c;
    opacity:1;
  }

.layout{
  width: min(1180px, 100%);
  display: grid;
  grid-template-columns: minmax(0, 1fr) fit-content(320px);
  gap: 18px;
  align-items: start;
}

.sidebar{
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.panel-side{
  width: fit-content;
  max-width: 320px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.06);
}

.side-section{
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.side-section + .side-section{
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.side-title{
  font-size: 14px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .04em;
  text-align: left;
}

.side-bar{
  display: grid;
  grid-template-columns: repeat(auto-fit, max-content);
  gap: 10px;
  justify-content: start;
  width: auto;
  max-width: 100%;
  margin: 0;
}

.side-bar .btn{
  width: auto;
}

@media (max-width: 900px){
  .layout{
    width: 100%;
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .panel,
  .panel-side{
    width: calc(100vw - 28px);
    max-width: 100%;
    box-sizing: border-box;
    justify-self: center;
  }

  .sidebar{
    gap: 14px;
  }

  .panel-side{
    padding: 14px;
    max-width: none;
  }

  .side-bar{
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    width: 100%;
  }

  .side-bar .btn{
    width: auto;
    max-width: 100%;
  }

  #prompt{
    font-size: clamp(28px, 9vw, 42px);
    line-height: 1.1;
  }

  #prompt.prompt-es-jp{
    font-size: clamp(20px, 5.8vw, 28px);
    line-height: 1.25;
  }

  #opciones{
    font-size: clamp(15px, 4.3vw, 20px);
    width: 100%;
    max-width: 100%;
  }

  #respuestaUsuario{
    width: 100px;
    font-size: 20px;
  }

  .accion-btn{
    font-size: 16px;
    padding: 11px 15px;
  }

  h1{
    font-size: 28px;
    line-height: 1.15;
  }
}
  
</style>
</head>
<body>

<h1>Turista en Japón — Asallam Sensei</h1>

<div class="layout">
  <div class="panel">
    <div id="prompt">…</div>

    <div id="opciones"></div>

    <div id="opbtns">
      <button class="btnABC" type="button" onclick="responder('a')">a</button>
      <button class="btnABC" type="button" onclick="responder('b')">b</button>
      <button class="btnABC" type="button" onclick="responder('c')">c</button>
    </div>

    <input id="respuestaUsuario"
           type="text"
           placeholder="a / b / c"
           maxlength="1"
           onkeydown="manejarEnter(event)"/>

    <div class="acciones">
      <button class="accion-btn" onclick="mostrarRespuesta()">Mostrar respuesta</button>
      <button class="accion-btn" onclick="siguienteDesdeBoton()">Siguiente</button>
    </div>

    <div id="resultado"></div>

    <div class="sep"></div>

    <div id="estadisticas">
      Aciertos: <span id="aciertos">0</span> — Errores: <span id="errores">0</span>
    </div>

    <div class="acciones" style="margin-top:12px;">
      <button class="btn" onclick="resetStatsTodo()">Reset stats</button>
    </div>
  </div>

  <div class="sidebar panel-side">
    <div class="side-section">
      <div class="side-title">Bloques</div>
      <div class="bar side-bar" id="bloquesBar"></div>
    </div>

    <div class="side-section">
      <div class="side-title">Modo</div>
      <div class="bar side-bar" id="modosBar">
        <button class="btn" id="btn-jp_es" onclick="setModo('jp_es')">Japonés → Español</button>
        <button class="btn" id="btn-es_jp" onclick="setModo('es_jp')">Español → Japonés</button>
      </div>
    </div>
  </div>
</div>
  
<script>
/* ===============================
   CONFIG
=============================== */
const DATA_PATH  = "data/turista.json";
const AUDIO_DIR  = "data/audios/turista/";

/* ===============================
   STATE
=============================== */
let dataRaw = {};
let bloques = [];
let bloqueActual = "";
let lista = [];

let modoActual = "jp_es";
let pool = [];

let actualIdx = 0;
let actualItem = null;

let correcta = "";
let opcionCorrectaTexto = "";
let yaValidado = false;

let aciertos = 0;
let errores  = 0;

let focoAutomatico = false;
let todosActivo = false;
let bloquesSeleccionados = new Set();

/* ===============================
   AUDIO — EXACTO AL JSON
   archivo = AUDIO_DIR + romaji + ".mp3"
=============================== */
const audio = new Audio();
audio.preload = "auto";

function buildExactSrcFromRomaji(romaji){
  const key = String(romaji || "").trim();
  if(!key) return null;
  return AUDIO_DIR + encodeURIComponent(key) + ".mp3";
}

async function playAudioForRomaji(romaji){
  const src = buildExactSrcFromRomaji(romaji);
  if(!src) return;

  try{
    audio.pause();
    audio.currentTime = 0;
    audio.src = src;
    audio.load();
    await audio.play();
  }catch{
    // si falla, no hacemos nada (silencioso)
  }
}

/* ===============================
   STATS (localStorage) - por modo + bloque
=============================== */
const STATS_KEY = "saludosQuizStats_v1";

function cargarStatsObj(){
  try{ return JSON.parse(localStorage.getItem(STATS_KEY)) || {}; }
  catch{ return {}; }
}
function guardarStatsObj(o){
  localStorage.setItem(STATS_KEY, JSON.stringify(o));
}
function statsKey(modo, bloque){
  return `${bloque}__${modo}`;
}
function cargarStatsActual(){
  const stats = cargarStatsObj();
  const k = statsKey(modoActual, bloqueActual);
  const s = stats[k] || { aciertos: 0, errores: 0 };
  aciertos = s.aciertos || 0;
  errores  = s.errores  || 0;
  actualizarEstadisticas();
}
function guardarStatsActual(){
  const stats = cargarStatsObj();
  const k = statsKey(modoActual, bloqueActual);
  stats[k] = { aciertos, errores };
  guardarStatsObj(stats);
}
function resetStatsTodo(){
  localStorage.removeItem(STATS_KEY);
  aciertos = 0; errores = 0;
  actualizarEstadisticas();
}

/* ===============================
   UI HELPERS
=============================== */
function $(id){ return document.getElementById(id); }

document.addEventListener("pointerdown", (e) => {
  focoAutomatico = (e.target && e.target.id === "respuestaUsuario");
});
document.addEventListener("keydown", (e) => {
  if(["a","b","c","Enter"].includes(e.key)) focoAutomatico = true;
});

function pintarBotonesActivos(){
  ["jp_es","es_jp"].forEach(m => {
    const b = $("btn-" + m);
    if(!b) return;
    b.classList.toggle("activo", modoActual === m);
  });

  document.querySelectorAll(".btn-bloque").forEach(btn => {
    const k = btn.dataset.bloque;
    btn.classList.toggle("activo", bloquesSeleccionados.has(k));
  });

  const bt = $("btn-todos");
  if(bt) bt.classList.toggle("activo", todosActivo);
}

function actualizarEstadisticas(){
  $("aciertos").innerText = aciertos;
  $("errores").innerText  = errores;
}

/* ===============================
   CARGA Y NORMALIZACIÓN
=============================== */
function normalizarItem(x){
  return {
    japones: String(x.japones || "").trim(),
    romaji:  String(x.romaji  || "").trim(),
    espanol: String(x.espanol || "").trim()
  };
}

fetch(DATA_PATH)
  .then(r => r.json())
  .then(data => {
    dataRaw = data || {};
    bloques = Object.keys(dataRaw).filter(k => Array.isArray(dataRaw[k]));

    if(bloques.length === 0){
      $("prompt").innerText = "No hay bloques";
      $("resultado").innerText = "El JSON no contiene listas de vocabulario.";
      return;
    }

    construirBarraBloques(bloques);
    bloqueActual = bloques[0];

    modoActual = "jp_es";
    pintarBotonesActivos();

    cargarBloque(bloqueActual);
    setModo(modoActual);
  })
  .catch(err => {
    console.error(err);
    $("resultado").innerText = "No se pudo cargar el JSON. Revisa ruta y servidor.";
    $("resultado").className = "incorrecto";
  });

function construirBarraBloques(keys){
  const bar = $("bloquesBar");
  bar.innerHTML = "";

  const defaultBloque = "saludos_y_despedidas";

  if(keys.includes(defaultBloque)){
    bloquesSeleccionados = new Set([defaultBloque]);
  }else{
    bloquesSeleccionados = new Set([keys[0]]);
  }

  todosActivo = false;

  keys.forEach(k => {
    const btn = document.createElement("button");
    btn.className = "btn btn-bloque";
    btn.dataset.bloque = k;
    btn.textContent = k.replaceAll("_"," ");
    btn.onclick = () => toggleTema(k);
    bar.appendChild(btn);
  });

  const btnAll = document.createElement("button");
  btnAll.className = "btn btn-todos";
  btnAll.id = "btn-todos";
  btnAll.textContent = "Todos";
  btnAll.onclick = toggleTodos;
  bar.appendChild(btnAll);

  actualizarPoolDesdeSeleccion();
  pintarBotonesActivos();
}

function actualizarPoolDesdeSeleccion(){
  const sel = [...bloquesSeleccionados];
  let combinado = [];
  sel.forEach(k => {
    const arr = (dataRaw[k] || []).map(normalizarItem)
      .filter(it => it.japones && it.espanol && it.romaji);
    combinado = combinado.concat(arr);
  });
  pool = combinado;
}

function toggleTodos(){
  if(!bloques.length) return;

  if(todosActivo){
    todosActivo = false;
    bloquesSeleccionados = new Set([bloques[0]]);
  }else{
    todosActivo = true;
    bloquesSeleccionados = new Set(bloques);
  }

  actualizarPoolDesdeSeleccion();
  cargarStatsActual();
  pintarBotonesActivos();
  siguiente();
}

function toggleTema(k){
  if(todosActivo){
    todosActivo = false;
    bloquesSeleccionados = new Set([k]);
  }else{
    if(bloquesSeleccionados.has(k)) bloquesSeleccionados.delete(k);
    else bloquesSeleccionados.add(k);
    if(bloquesSeleccionados.size === 0) bloquesSeleccionados.add(k);
  }

  if(bloquesSeleccionados.size === bloques.length) todosActivo = true;

  actualizarPoolDesdeSeleccion();
  pintarBotonesActivos();
  siguiente();
}

function cargarBloque(k){
  lista = (dataRaw[k] || []).map(normalizarItem)
    .filter(it => it.japones && it.espanol && it.romaji);

  pool = lista.slice();

  if(pool.length < 3){
    $("resultado").innerText = "Pool muy pequeño: necesitas al menos 3 entradas en el bloque.";
    $("resultado").className = "incorrecto";
  }else{
    $("resultado").innerText = "";
    $("resultado").className = "";
  }
}

/* ===============================
   MODO
=============================== */
function setModo(modo){
  modoActual = modo;
  pintarBotonesActivos();
  cargarStatsActual();
  siguiente();
}

/* ===============================
   QUIZ (3 opciones)
=============================== */
function mezclar(arr){
  return arr.slice().sort(() => Math.random() - 0.5);
}

function siguiente(){
  if(pool.length < 3) return;

  yaValidado = false;
  $("resultado").innerText = "";
  $("resultado").className = "";
  $("respuestaUsuario").value = "";
  if(focoAutomatico) $("respuestaUsuario").focus();

  actualIdx = Math.floor(Math.random() * pool.length);
  actualItem = pool[actualIdx];

  const pregunta = (modoActual === "jp_es") ? actualItem.japones : actualItem.espanol;

  const campoOpciones = (modoActual === "jp_es") ? "espanol" : "japones";
  const correctoTexto = actualItem[campoOpciones];

  let opciones = [correctoTexto];
  while(opciones.length < 3){
    const r = pool[Math.floor(Math.random() * pool.length)][campoOpciones];
    if(r && !opciones.includes(r)) opciones.push(r);
  }
  opciones = mezclar(opciones);

  const letras = ["a","b","c"];
  correcta = letras[opciones.indexOf(correctoTexto)];
  opcionCorrectaTexto = correctoTexto;

  const promptEl = $("prompt");
  promptEl.innerText = pregunta;

  promptEl.classList.remove("jp");
  if(modoActual === "jp_es") promptEl.classList.add("jp");

  promptEl.classList.remove("prompt-es-jp");
  if(modoActual === "es_jp") promptEl.classList.add("prompt-es-jp");

  $("opciones").innerHTML =
    `a) ${escapeHTML(opciones[0])}<br>
     b) ${escapeHTML(opciones[1])}<br>
     c) ${escapeHTML(opciones[2])}`;

  $("opciones").classList.remove("jp");
  if(modoActual === "es_jp") $("opciones").classList.add("jp");
}

function escapeHTML(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function responder(letra){
  focoAutomatico = false;
  if(yaValidado) return;
  $("respuestaUsuario").value = letra;
  verificar();
}

async function verificar(){
  const r = $("respuestaUsuario").value.toLowerCase().trim();
  const res = $("resultado");

  await playAudioForRomaji(actualItem.romaji);

  if(r === correcta){
    res.innerText = `Correcto ✔\nRomaji: ${actualItem.romaji}`;
    res.className = "correcto";
    aciertos++;
  }else{
    res.innerText =
      `Incorrecto ✘ (era ${correcta})\n` +
      `Respuesta: ${opcionCorrectaTexto}\n` +
      `Romaji: ${actualItem.romaji}`;
    res.className = "incorrecto";
    errores++;
  }

  actualizarEstadisticas();
  guardarStatsActual();
  yaValidado = true;
}

async function mostrarRespuesta(){
  if(yaValidado) return;

  const res = $("resultado");

  await playAudioForRomaji(actualItem.romaji);

  errores++;
  actualizarEstadisticas();
  guardarStatsActual();

  res.innerText =
    `Mostrada ✘ (era ${correcta})\n` +
    `Respuesta: ${opcionCorrectaTexto}\n` +
    `Romaji: ${actualItem.romaji}`;
  res.className = "incorrecto";

  yaValidado = true;
}

async function siguienteDesdeBoton(){
  const res = $("resultado");

  if(!yaValidado){
    const v = $("respuestaUsuario").value.trim();
    if(v === ""){
      await playAudioForRomaji(actualItem.romaji);
    }

    errores++;
    actualizarEstadisticas();
    guardarStatsActual();

    res.innerText =
      `Saltado ✘ (era ${correcta})\n` +
      `Respuesta: ${opcionCorrectaTexto}\n` +
      `Romaji: ${actualItem.romaji}`;
    res.className = "incorrecto";

    yaValidado = true;
    return;
  }

  siguiente();
}

function manejarEnter(ev){
  if(ev.key !== "Enter") return;

  if(!yaValidado){
    const v = $("respuestaUsuario").value.trim();
    if(v === ""){
      mostrarRespuesta();
      return;
    }
    verificar();
  }else{
    siguiente();
  }
}
</script>

</body>
</html>
