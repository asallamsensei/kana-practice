<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Turista en Japón — Asallam Sensei</title>

<style>
  :root{
    --bg: #0b1020;
    --card: rgba(255,255,255,.08);
    --text: #eef2ff;
    --muted: rgba(238,242,255,.75);
    --accent: #7d5cff;
    --accent2:#22c55e;
    --danger:#ef4444;
    --ok:#22c55e;
    --border: rgba(255,255,255,.14);
    --mix: #d84f7f;
    --mix-soft: rgba(216,79,127,.22);
    --mix-soft-border: rgba(216,79,127,.58);
    --mix-soft-text: #ffd6e5;
    --mix-hover: #c63f70;
  }

  *,
  *::before,
  *::after{
    box-sizing: border-box;
  }

  html, body{
    margin: 0;
    padding: 0;
  }

  body{
    margin:0;
    background:
      radial-gradient(1200px 700px at 20% 10%, rgba(125,92,255,.35), transparent 60%),
      radial-gradient(900px 600px at 90% 20%, rgba(34,197,94,.22), transparent 60%),
      radial-gradient(900px 600px at 30% 90%, rgba(239,68,68,.18), transparent 55%),
      var(--bg);
    font-family: Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:26px 14px 60px;
    color: var(--text);
    min-height:100vh;
  }

  h1{
    font-size: 40px;
    margin: 10px 0 18px;
    text-align: center;
    line-height: 1.15;
  }

  .layout{
    width: 100%;
    max-width: 1120px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
    gap: 20px;
    align-items: start;
  }

  .panel{
    width: 100%;
    min-width: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 20px 18px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.06);
    text-align: center;
    overflow: hidden;
  }

  .sidebar{
    width: 100%;
    min-width: 0;
  }

  .panel-side{
    width: 100%;
    min-width: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.06);
  }

  .side-section{
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .side-section + .side-section{
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .side-title{
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .04em;
    text-align: left;
  }

  .bar{
    width: 100%;
    margin-bottom: 0;
  }

  .side-bar{
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    margin: 0;
  }

.btn{
  width: auto;
  padding: 10px 14px;
  font-size: 16px;
  border-radius: 999px;
  border: 2px solid var(--accent);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  user-select: none;
  transition: 0.15s;
  text-align: center;
}

  .btn:hover{
    transform: translateY(-1px);
  }

  .btn.activo{
    background: var(--accent);
    color: white;
  }

.btn.mix-activo{
  background: var(--mix);
  border-color: var(--mix);
  color: white;
}

.btn.mix-activo:hover{
  background: var(--mix-hover);
  border-color: var(--mix-hover);
}

.btn.mix-secundario{
  background: var(--mix-soft);
  border-color: var(--mix-soft-border);
  color: var(--mix-soft-text);
}
  
  .btn-todos{
    border-color: #ef4444;
    color: #ffd6d6;
    opacity: 0.75;
  }

  .btn-todos.activo{
    background: #ffb3b3;
    border-color: #ffb3b3;
    color: #7a1c1c;
    opacity: 1;
  }

  #prompt{
    font-size: clamp(30px, 3.2vw, 48px);
    font-weight: 800;
    margin: 4px 0 12px;
    line-height: 1.08;
    word-break: break-word;
  }

  #prompt.prompt-es-jp{
    font-size: clamp(22px, 2.5vw, 34px);
    font-weight: 700;
    line-height: 1.22;
  }

  #opciones{
    font-size: clamp(22px, 2.4vw, 28px);
    text-align: left;
    line-height: 1.8;
    width: fit-content;
    max-width: 100%;
    margin: 0 auto 14px;
    padding: 10px 14px;
    border-radius: 14px;
    border: 1px dashed rgba(255,255,255,.22);
    background: rgba(0,0,0,.18);
  }

  .jp{
    font-family: "Yu Gothic", "Hiragino Sans", "Meiryo", "Noto Sans JP", sans-serif;
    font-feature-settings: "palt" 0;
  }

  #opciones.jp{
    font-size: clamp(28px, 3vw, 36px);
    line-height: 1.9;
  }
  
  #opbtns{
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 8px 0 8px;
    flex-wrap: wrap;
  }

  .btnABC{
    padding: 10px 16px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: #b94a48;
    color: #fff;
    cursor: pointer;
    min-width: 64px;
    font-weight: 800;
  }

  .btnABC:hover{
    background: #a94442;
  }

  .acciones{
    margin-top: 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  .accion-btn{
    padding: 12px 18px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    font-size: 18px;
  }

  .accion-btn:hover{
    background: var(--accent2);
  }
  
  #resultado{
    margin-top: 12px;
    font-size: 22px;
    min-height: 30px;
    text-align: center;
    white-space: pre-line;
  }

  .correcto{
    color: var(--ok);
    font-weight: 800;
  }

  .incorrecto{
    color: var(--danger);
    font-weight: 800;
  }

  .sep{
    height: 1px;
    background: var(--border);
    margin: 16px 0 12px;
  }

  #estadisticas{
    margin-top: 14px;
    font-size: 18px;
    text-align: center;
    color: var(--text);
  }

  @media (max-width: 1020px){
    .layout{
      max-width: 760px;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .panel,
    .panel-side{
      width: 100%;
      max-width: 100%;
    }

    .side-bar{
      display: flex;
      flex-wrap: wrap;
      flex-direction: row;
      gap: 10px;
    }

.side-bar .btn{
  width: 100%;
}
  }

.badge-kanji{
  display:inline-block;
  background:#ef4444;
  color:white;
  font-weight:800;
  font-size:12px;
  letter-spacing:.08em;
  padding:4px 10px;
  border-radius:999px;
  margin-bottom:8px;
}
  
  @media (max-width: 900px){
    h1{
      font-size: clamp(18px, 5.5vw, 24px);
      line-height: 1.2;
      margin: 8px 0 14px;
    }

    .layout{
      width: 100%;
      max-width: 100%;
      gap: 14px;
    }

    .panel,
    .panel-side{
      width: 100%;
      padding-left: 14px;
      padding-right: 14px;
    }

    .panel-side{
      padding-top: 14px;
      padding-bottom: 14px;
    }

    #prompt{
      font-size: clamp(28px, 9vw, 42px);
      line-height: 1.1;
    }

    #prompt.prompt-es-jp{
      font-size: clamp(20px, 5.8vw, 28px);
      line-height: 1.25;
    }

    #opciones{
      font-size: clamp(18px, 4.8vw, 24px);
      width: 100%;
      max-width: 100%;
    }

    .accion-btn{
      font-size: 16px;
      padding: 11px 15px;
    }
  }
</style>
  
</head>
<body>

<h1>Turista en Japón — Asallam Sensei</h1>

<div class="layout">
  <div class="panel">
    <div id="badgeKanji" class="badge-kanji" style="display:none;">KANJI</div>
    <div id="prompt">…</div>

    <div id="opciones"></div>

    <div id="opbtns">
      <button class="btnABC" type="button" onclick="responder('a')">a</button>
      <button class="btnABC" type="button" onclick="responder('b')">b</button>
      <button class="btnABC" type="button" onclick="responder('c')">c</button>
    </div>

    <div class="acciones">
      <button class="accion-btn" onclick="siguienteDesdeBoton()">Siguiente</button>
    </div>

    <div id="resultado"></div>

    <div class="sep"></div>

    <div id="estadisticas">
      Aciertos: <span id="aciertos">0</span> — Errores: <span id="errores">0</span>
      <div style="margin-top:6px;">
        Racha: <span id="racha">0</span> — Mejor racha: <span id="mejorRacha">0</span> — Precisión: <span id="precision">0%</span>
      </div>
    </div>

    <div class="acciones" style="margin-top:12px;">
      <button class="btn" onclick="resetStatsTodo()">Reset stats</button>
    </div>
  </div>

  <div class="sidebar panel-side">

    <div class="side-section">
      <div class="side-title">Modo</div>
      <div class="bar side-bar" id="modosBar">
        <button class="btn" id="btn-jp_es" onclick="setModo('jp_es')">Japonés → Español</button>
        <button class="btn" id="btn-es_jp" onclick="setModo('es_jp')">Español → Japonés</button>
        <button class="btn" id="btn-mix" onclick="setModo('mix')">Mix</button>
      </div>
    </div>

    <div class="side-section">
      <div class="side-title">Bloques</div>
      <div class="bar side-bar" id="bloquesBar"></div>
    </div>
  </div>
</div>
  
<script>
/* ===============================
   CONFIG
=============================== */
const DATA_PATH  = "data/turista.json";
const AUDIO_DIR  = "data/audios/turista/";

/* ===============================
   STATE
=============================== */
let dataRaw = {};
let bloques = [];
let bloqueActual = "";
let lista = [];

let modoActual = "mix";
let modoPreguntaActual = "jp_es";
let pool = [];

let actualIdx = 0;
let actualItem = null;

let correcta = "";
let opcionCorrectaTexto = "";
let yaValidado = false;

let aciertos = 0;
let errores  = 0;
let racha = 0;
let mejorRacha = 0;

let todosActivo = false;
let bloquesSeleccionados = new Set();

/* ===============================
   AUDIO — EXACTO AL JSON
   archivo = AUDIO_DIR + romaji + ".mp3"
=============================== */
const audio = new Audio();
audio.preload = "auto";

function buildExactSrcFromRomaji(romaji){
  const key = String(romaji || "").trim();
  if(!key) return null;
  return AUDIO_DIR + encodeURIComponent(key) + ".mp3";
}

async function playAudioForRomaji(romaji){
  const src = buildExactSrcFromRomaji(romaji);
  if(!src) return;

  try{
    audio.pause();
    audio.currentTime = 0;
    audio.src = src;
    audio.load();
    await audio.play();
  }catch{
    // si falla, no hacemos nada (silencioso)
  }
}

/* ===============================
   STATS (localStorage) - por modo + bloque
=============================== */
const STATS_KEY = "saludosQuizStats_v1";

function cargarStatsObj(){
  try{ return JSON.parse(localStorage.getItem(STATS_KEY)) || {}; }
  catch{ return {}; }
}
function guardarStatsObj(o){
  localStorage.setItem(STATS_KEY, JSON.stringify(o));
}
  
function statsKey(modo, bloque){
  return `${bloque}__${modo}`;
}
  
function cargarStatsActual(){
  const stats = cargarStatsObj();
  const k = statsKey(modoActual, bloqueActual);
  const s = stats[k] || { aciertos: 0, errores: 0, racha: 0, mejorRacha: 0 };

  aciertos = s.aciertos || 0;
  errores = s.errores || 0;
  racha = s.racha || 0;
  mejorRacha = s.mejorRacha || 0;

  actualizarEstadisticas();
}
  
function guardarStatsActual(){
  const stats = cargarStatsObj();
  const k = statsKey(modoActual, bloqueActual);
  stats[k] = { aciertos, errores, racha, mejorRacha };
  guardarStatsObj(stats);
}
  
function resetStatsTodo(){
  localStorage.removeItem(STATS_KEY);
  aciertos = 0;
  errores = 0;
  racha = 0;
  mejorRacha = 0;
  actualizarEstadisticas();
}

/* ===============================
   UI HELPERS
=============================== */
function $(id){ return document.getElementById(id); }

document.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();

  if(k === "a" || k === "b" || k === "c"){
    responder(k);
    return;
  }

  if(k === "enter"){
    if(yaValidado) siguiente();
    else siguienteDesdeBoton();
  }
});

function pintarBotonesActivos(){
  ["jp_es","es_jp","mix"].forEach(m => {
    const b = $("btn-" + m);
    if(!b) return;
    b.classList.remove("activo", "mix-activo", "mix-secundario");
  });

  if(modoActual === "mix"){
    const btnMix = $("btn-mix");
    const btnJpEs = $("btn-jp_es");
    const btnEsJp = $("btn-es_jp");

    if(btnMix) btnMix.classList.add("mix-activo");
    if(btnJpEs) btnJpEs.classList.add("mix-secundario");
    if(btnEsJp) btnEsJp.classList.add("mix-secundario");
  }else{
    const b = $("btn-" + modoActual);
    if(b) b.classList.add("activo");
  }

  document.querySelectorAll(".btn-bloque").forEach(btn => {
    const k = btn.dataset.bloque;
    btn.classList.toggle("activo", bloquesSeleccionados.has(k));
  });

  const bt = $("btn-todos");
  if(bt) bt.classList.toggle("activo", todosActivo);
}

function actualizarEstadisticas(){
  $("aciertos").innerText = aciertos;
  $("errores").innerText = errores;
  $("racha").innerText = racha;
  $("mejorRacha").innerText = mejorRacha;

  const total = aciertos + errores;
  const precision = total > 0 ? Math.round((aciertos / total) * 100) : 0;
  $("precision").innerText = precision + "%";
}

/* ===============================
   CARGA Y NORMALIZACIÓN
=============================== */
function normalizarItem(x, bloque = ""){
  return {
    japones: String(x.japones || "").trim(),
    romaji:  String(x.romaji  || "").trim(),
    espanol: String(x.espanol || "").trim(),
    bloque:  String(bloque || "").trim()
  };
}

fetch(DATA_PATH)
  .then(r => r.json())
  .then(data => {
    dataRaw = data || {};
    bloques = Object.keys(dataRaw).filter(k => Array.isArray(dataRaw[k]));

    if(bloques.length === 0){
      $("prompt").innerText = "No hay bloques";
      $("resultado").innerText = "El JSON no contiene listas de vocabulario.";
      return;
    }

    construirBarraBloques(bloques);

    modoActual = "mix";
    pintarBotonesActivos();

    setModo(modoActual);
  })
  .catch(err => {
    console.error(err);
    $("resultado").innerText = "No se pudo cargar el JSON. Revisa ruta y servidor.";
    $("resultado").className = "incorrecto";
  });

function construirBarraBloques(keys){
  const bar = $("bloquesBar");
  bar.innerHTML = "";

  bloquesSeleccionados = new Set(keys);
  todosActivo = true;

  keys.forEach(k => {
    const btn = document.createElement("button");
    btn.className = "btn btn-bloque";
    btn.dataset.bloque = k;
    btn.textContent = k.replaceAll("_"," ");
    btn.onclick = () => toggleTema(k);
    bar.appendChild(btn);
  });

  const btnAll = document.createElement("button");
  btnAll.className = "btn btn-todos";
  btnAll.id = "btn-todos";
  btnAll.textContent = "Todos";
  btnAll.onclick = toggleTodos;
  bar.appendChild(btnAll);

  actualizarPoolDesdeSeleccion();
  pintarBotonesActivos();
}

function actualizarPoolDesdeSeleccion(){
  const sel = [...bloquesSeleccionados];
  let combinado = [];
  sel.forEach(k => {
    const arr = (dataRaw[k] || [])
      .map(x => normalizarItem(x, k))
      .filter(it => it.japones && it.espanol && it.romaji);
    combinado = combinado.concat(arr);
  });
  pool = combinado;
}

function toggleTodos(){
  if(!bloques.length) return;

  if(todosActivo){
    todosActivo = false;
    bloquesSeleccionados = new Set([bloques[0]]);
  }else{
    todosActivo = true;
    bloquesSeleccionados = new Set(bloques);
  }

  actualizarPoolDesdeSeleccion();
  cargarStatsActual();
  pintarBotonesActivos();
  siguiente();
}

function toggleTema(k){
  if(todosActivo){
    todosActivo = false;
    bloquesSeleccionados = new Set([k]);
  }else{
    if(bloquesSeleccionados.has(k)) bloquesSeleccionados.delete(k);
    else bloquesSeleccionados.add(k);
    if(bloquesSeleccionados.size === 0) bloquesSeleccionados.add(k);
  }

  if(bloquesSeleccionados.size === bloques.length) todosActivo = true;

  actualizarPoolDesdeSeleccion();
  pintarBotonesActivos();
  siguiente();
}

function cargarBloque(k){
  lista = (dataRaw[k] || [])
    .map(x => normalizarItem(x, k))
    .filter(it => it.japones && it.espanol && it.romaji);

  pool = lista.slice();

  if(pool.length < 3){
    $("resultado").innerText = "Pool muy pequeño: necesitas al menos 3 entradas en el bloque.";
    $("resultado").className = "incorrecto";
  }else{
    $("resultado").innerText = "";
    $("resultado").className = "";
  }
}

/* ===============================
   MODO
=============================== */
function setModo(modo){
  modoActual = modo;
  pintarBotonesActivos();
  cargarStatsActual();
  siguiente();
}

/* ===============================
   QUIZ (3 opciones)
=============================== */
function mezclar(arr){
  return arr.slice().sort(() => Math.random() - 0.5);
}

function itemEsDeKanji(item){
  return String(item?.bloque || "").toLowerCase().includes("kanji");
}  
  
function siguiente(){
  if(pool.length < 3) return;

  yaValidado = false;
  $("resultado").innerText = "";
  $("resultado").className = "";

  actualIdx = Math.floor(Math.random() * pool.length);
  actualItem = pool[actualIdx];

modoPreguntaActual = (modoActual === "mix")
  ? (Math.random() < 0.5 ? "jp_es" : "es_jp")
  : modoActual;

const pregunta = (modoPreguntaActual === "jp_es") ? actualItem.japones : actualItem.espanol;

const campoOpciones = (modoPreguntaActual === "jp_es") ? "espanol" : "japones";
  const correctoTexto = actualItem[campoOpciones];

  let opciones = [correctoTexto];
  while(opciones.length < 3){
    const r = pool[Math.floor(Math.random() * pool.length)][campoOpciones];
    if(r && !opciones.includes(r)) opciones.push(r);
  }
  opciones = mezclar(opciones);

  const letras = ["a","b","c"];
  correcta = letras[opciones.indexOf(correctoTexto)];
  opcionCorrectaTexto = correctoTexto;

const badge = $("badgeKanji");
const hayKanji = itemEsDeKanji(actualItem);
badge.style.display = hayKanji ? "inline-block" : "none";
  
  const promptEl = $("prompt");
  promptEl.innerText = pregunta;

promptEl.classList.remove("jp");
if(modoPreguntaActual === "jp_es") promptEl.classList.add("jp");

promptEl.classList.remove("prompt-es-jp");
if(modoPreguntaActual === "es_jp") promptEl.classList.add("prompt-es-jp");

  $("opciones").innerHTML =
    `a) ${escapeHTML(opciones[0])}<br>
     b) ${escapeHTML(opciones[1])}<br>
     c) ${escapeHTML(opciones[2])}`;

  $("opciones").classList.remove("jp");
  if(modoPreguntaActual === "es_jp") $("opciones").classList.add("jp");
}

function escapeHTML(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function responder(letra){
  if(yaValidado) return;
  verificar(letra);
}

async function verificar(letra){
  const r = String(letra).toLowerCase().trim();
  const res = $("resultado");

  if(!itemEsDeKanji(actualItem)){
    await playAudioForRomaji(actualItem.romaji);
  }

  if(r === correcta){
    res.innerText = `Correcto ✔\nRomaji: ${actualItem.romaji}`;
    res.className = "correcto";
    aciertos++;
    racha++;
    if(racha > mejorRacha) mejorRacha = racha;
  }else{
    res.innerText =
      `Incorrecto ✘ (era ${correcta})\n` +
      `Respuesta: ${opcionCorrectaTexto}\n` +
      `Romaji: ${actualItem.romaji}`;
    res.className = "incorrecto";
    errores++;
    racha = 0;
  }

  actualizarEstadisticas();
  guardarStatsActual();
  yaValidado = true;
}

async function siguienteDesdeBoton(){
  const res = $("resultado");
  
  if(!yaValidado){
      if(!itemEsDeKanji(actualItem)){
        await playAudioForRomaji(actualItem.romaji);
      }

    errores++;
    racha = 0;
    actualizarEstadisticas();
    guardarStatsActual();

    res.innerText =
      `Saltado ✘ (era ${correcta})\n` +
      `Respuesta: ${opcionCorrectaTexto}\n` +
      `Romaji: ${actualItem.romaji}`;
    res.className = "incorrecto";

    yaValidado = true;
    return;
  }

  siguiente();
}

</script>

</body>
</html>
