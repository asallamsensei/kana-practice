<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Math Command — Asallam Sensei</title>
<style>
  :root{
    --bg:#0b1020;
    --card:rgba(255,255,255,.08);
    --card2:rgba(255,255,255,.10);
    --border:rgba(255,255,255,.14);
    --text:#ffffff;
    --muted:#ffffff;
    --accent:#7d5cff;
    --good:#22c55e;
    --bad:#ef4444;
    --warn:#fbbf24;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Apple Color Emoji","Segoe UI Emoji";
    color:var(--text);
    background:
      radial-gradient(1200px 700px at 20% 10%, rgba(125,92,255,.35), transparent 60%),
      radial-gradient(900px 600px at 80% 20%, rgba(34,197,94,.20), transparent 55%),
      radial-gradient(1000px 700px at 50% 110%, rgba(239,68,68,.12), transparent 60%),
      var(--bg);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
  }
  .wrap{
    width:min(1100px, 98vw);
    display:grid;
    grid-template-columns: 360px 1fr;
    gap:14px;
  }

  .panel{
    background:linear-gradient(180deg, var(--card), rgba(0,0,0,.08));
    border:1px solid var(--border);
    border-radius:18px;
    padding:14px;
    box-shadow: 0 18px 60px rgba(0,0,0,.35);
    backdrop-filter: blur(8px);
  }
  .brand{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:6px 6px 10px 6px;
  }
  .brand h1{
    font-size:16px; margin:0; font-weight:800; letter-spacing:.2px;
  }
  .chip{
    font-size:12px;
    padding:6px 10px;
    border-radius:999px;
    background:rgba(125,92,255,.18);
    border:1px solid rgba(125,92,255,.35);
    color:var(--text);
    user-select:none;
  }
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .stat{
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:14px;
    padding:10px;
  }
  .stat .k{font-size:12px; color:var(--muted)}
  .stat .v{font-size:22px; font-weight:900; margin-top:2px}

  .btnRow{display:flex; gap:10px; margin-top:12px}
  button{
    border:1px solid var(--border);
    background:rgba(125,92,255,.20);
    color:var(--text);
    padding:10px 12px;
    border-radius:14px;
    font-weight:800;
    cursor:pointer;
    transition:.15s transform, .15s background;
    user-select:none;
    flex:1;
  }
  button:hover{transform: translateY(-1px); background: rgba(125,92,255,.28)}
  button.secondary{background: rgba(255,255,255,.08)}
  button.secondary:hover{background: rgba(255,255,255,.12)}
  button.danger{background: rgba(239,68,68,.18); border-color: rgba(239,68,68,.35)}
  button.danger:hover{background: rgba(239,68,68,.26)}
  button:disabled{opacity:.55; cursor:not-allowed; transform:none}

  .configHidden{display:none !important;}

  /* --- GAME (canvas) --- */
  .game{
    position:relative;
    overflow:hidden;
  
    border-radius:18px;
    border:1px solid var(--border);
    box-shadow: 0 18px 60px rgba(0,0,0,.35);
  
    background-image: url("data/velocidad/fondo.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  
    image-rendering: pixelated;
  
    isolation:isolate;
    z-index:0;
  }
  
  .game::before{
    content:"";
    position:absolute;
    inset:0;
    background: rgba(0,0,0,.10); /* 10% oscurecido */
    z-index:1;
  }
  
.meteor{
  position:absolute;
  top:-60px;

  min-width:110px;
  max-width:240px;           /* límite para que no se vuelva gigante */
  width:auto;

  padding:10px 14px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.16);
  background: rgba(0,0,0,.22);
  backdrop-filter: blur(6px);
  box-shadow: 0 16px 40px rgba(0,0,0,.35);

  isolation:isolate;
  text-align:center;
  white-space:nowrap;        /* 🔥 evita salto de línea */
  z-index: 30; /* Aseguramos que los meteoros estén por detrás de otros elementos */
}
  .meteor .expr{font-size:20px; font-weight:900; letter-spacing:.2px}
  .meteor.hit{border-color: rgba(34,197,94,.45); background: rgba(34,197,94,.12); animation: hitFlash 120ms ease-out;}
  .meteor.miss{border-color: rgba(239,68,68,.45); background: rgba(239,68,68,.12); animation: hitFlash 120ms ease-out;}
  .meteor.bonus{border-color: rgba(251,191,36,.40); background: rgba(251,191,36,.10)}

/* === BOSS === */
.meteor.boss{
  padding:12px 16px;
  border-radius:18px;
  background: rgba(0,0,0,.28);
  border:1px solid rgba(125,92,255,.45);
  box-shadow: 0 22px 60px rgba(0,0,0,.55);
  z-index:35; /* boss arriba de topbar, debajo de px/shot si quieres */
}
.meteor.boss .expr{
  font-size:22px;
  letter-spacing:.6px;
}
  
  /* --- Answer UI (sin input) --- */
.answerBox{
  width:100%;
  max-width:700px;
  margin:14px auto 0 auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* =========================
   TOP BAR (nuevo)
   PC: 4 pills ~22% + espacios iguales
   Móvil: autofit y centrado
========================= */

/* Contenedor */
.topBar{
  position:absolute;
  left:0; right:0; top:0;
  z-index:15;

  display:grid;
  align-items:center;

  /* 4 columnas: cada pill ~22% (0.22fr) y 5 espacios iguales (0.024fr)
     Espacios: izq + entre + entre + entre + der = 5 */
  grid-template-columns:
    0.024fr 0.22fr 0.024fr 0.22fr 0.024fr 0.22fr 0.024fr 0.22fr 0.024fr;

  padding:10px 12px;
  background: rgba(0,0,0,.18);
  border-bottom: 1px solid rgba(255,255,255,.10);
  backdrop-filter: blur(8px);
  border-radius: 18px 18px 0 0;
}

/* Colocamos cada pill en su columna */
#pillProg  { grid-column:2; }
#pillScore { grid-column:4; }
#pillLives { grid-column:6; }
#pillBest  { grid-column:8; }

/* Base pill (sirve para todos) */
.pill{
  min-width:0;                 /* clave para que no rompa el grid */
  height:28px;
  padding:6px 10px;
  border-radius:999px;

  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.18);
  color: var(--text);

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:12px;
  font-weight:800;
  user-select:none;

  white-space:nowrap;          /* HUD compacto */
  overflow:hidden;             /* si el texto es largo, no explota */
  text-overflow:ellipsis;
}

/* Progress pill (Nivel / Vidas) */
.pill.progress{
  position:relative;
  overflow:hidden;             /* para que el fill no se salga */
}

/* Fill (se pinta con --p) */
.pill.progress::before{
  content:"";
  position:absolute;
  inset:0;
  width: var(--p, 0%);
  background: rgba(34,197,94,.18);
  border-right: 1px solid rgba(34,197,94,.28);
}

/* Texto por encima del fill */
.pill.progress > span{
  position:relative;
  z-index:1;
}

/* Flash dorado al subir nivel (si lo sigues usando) */
.pill.progress.levelUp{
  animation: levelUpFlash 300ms ease-out;
}
@keyframes levelUpFlash{
  0%   { filter: brightness(1);   box-shadow:0 0 0 rgba(0,0,0,0); }
  45%  { filter: brightness(1.9); box-shadow:0 0 22px rgba(251,191,36,.85); }
  100% { filter: brightness(1);   box-shadow:0 0 0 rgba(0,0,0,0); }
}
.pill.progress.levelUp::before{
  background: rgba(251,191,36,.22);
  border-right-color: rgba(251,191,36,.35);
}

/* =========================
   MÓVIL: 1 sola fila
   auto-fit al texto + centrado
========================= */
@media (max-width:900px){
  .topBar{
    display:flex;
    justify-content:center;  /* centra todo el grupo */
    align-items:center;
    gap:8px;
    padding:10px 8px;

    /* opcional (solo si se te corta en pantallas muy pequeñas) */
    /* overflow-x:auto; */
    /* -webkit-overflow-scrolling: touch; */
  }

  .topBar .pill{
    flex:0 0 auto;           /* tamaño según contenido */
    width:auto;
    white-space:nowrap;      /* no salta línea */
  }
}
  
  .displayRow{
    display:flex;
    gap:10px;
    align-items:center;
  }
  .display{
    flex:1;
    min-height:48px;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    padding:10px 12px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(0,0,0,.18);
    font-size:22px;
    font-weight:900;
    letter-spacing:.6px;
    color:var(--text);
    user-select:none;
    overflow:hidden;
  }
  .display.placeholder{
    color:rgba(238,242,255,.35);
    font-weight:800;
    letter-spacing:.2px;
    justify-content:flex-start;
  }

  .keypad{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:2px;
  }
  .kbtn{
    padding:14px 10px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.08);
    color: var(--text);
    font-weight:900;
    font-size:18px;
    cursor:pointer;
    user-select:none;
    transition:.12s transform, .12s background;
  }
  .kbtn:hover{transform: translateY(-1px); background: rgba(255,255,255,.12)}
  .kbtn:active{transform: translateY(0px);}

.kbtn.ok{
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border-color: rgba(34,197,94,.55);
  color:#ffffff;
  box-shadow:
    0 0 14px rgba(34,197,94,.55),
    0 0 28px rgba(34,197,94,.35);
}

.kbtn.ok:hover{
  background: linear-gradient(135deg, #16a34a, #15803d);
  box-shadow:
    0 0 18px rgba(34,197,94,.7),
    0 0 34px rgba(34,197,94,.45);
}

  .kbtn.bad{
    background: rgba(239,68,68,.12);
    border-color: rgba(239,68,68,.28);
  }
  .kbtn.bad:hover{background: rgba(239,68,68,.18)}
  .kbtn.secondary{
    background: rgba(125,92,255,.16);
    border-color: rgba(125,92,255,.28);
  }
  .kbtn.secondary:hover{background: rgba(125,92,255,.22)}

  .overlay{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    z-index:100;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(6px);
    padding:16px;
  }
  .modal{
    width:min(520px, 96%);
    border-radius:18px;
    border:1px solid rgba(255,255,255,.16);
    background: rgba(15,18,35,.85);
    box-shadow: 0 30px 90px rgba(0,0,0,.6);
    padding:16px;
  }
  .modal h2{margin:0 0 6px 0;}
  .modal .actions{display:flex; gap:10px; margin-top:12px}

/* === Pixel fire particles (se desprenden arriba) === */
.px{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:2px;         /* cuadradito suave; pon 0 si lo quieres 100% pixel */
  pointer-events:none;
  z-index:40;                 /* encima del city */
  opacity:1;
  transform: translate(-50%, -50%) scale(1);
  will-change: transform, opacity, filter;
  filter: drop-shadow(0 0 8px rgba(0,0,0,.25));
  animation: pxBurn var(--life, 520ms) steps(2,end) forwards;
}

  .px.gold{
    box-shadow:
      0 0 10px rgba(251,191,36,.55),
      0 0 18px rgba(251,191,36,.35);
    filter: drop-shadow(0 0 10px rgba(251,191,36,.45));
  }

  .px.rain{
    animation-name: pxRain;
    animation-timing-function: linear;
  }
  
  @keyframes pxRain{
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0px); }
    60%  { opacity: .8; transform: translate(calc(-50% + var(--dx,0px)), calc(-50% + var(--dy, 40px))) scale(.9); }
    100% { opacity: 0; transform: translate(calc(-50% + var(--dx,0px)), calc(-50% + var(--dy, 90px))) scale(.35); filter: blur(1px); }
  }
    
  /* animación: “quema” y desaparece */
  @keyframes pxBurn{
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0px); }
    65%  { opacity: .75; transform: translate(-50%, -50%) scale(.95); filter: blur(.2px); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(.35); filter: blur(1px); }
  }
  
  @keyframes hitFlash {
    0%{
      filter: brightness(1);
      box-shadow: 0 0 0 rgba(255,255,255,0);
    }
    40%{
      filter: brightness(3);
      box-shadow: 0 0 18px rgba(255,255,255,.9);
    }
    100%{
      filter: brightness(1);
      box-shadow: 0 0 0 rgba(255,255,255,0);
    }
  }
  
/* === Explosión radial (sale para todos lados) === */
.px.explode{
  animation-name: pxExplode;
  animation-timing-function: linear;
}

@keyframes pxExplode{
  0%{
    opacity:1;
    transform: translate(-50%, -50%) scale(1);
    filter: blur(0px);
  }
  70%{
    opacity:.85;
    transform: translate(
      calc(-50% + var(--dx,0px)),
      calc(-50% + var(--dy,0px))
    ) scale(.9);
  }
  100%{
    opacity:0;
    transform: translate(
      calc(-50% + var(--dx,0px)),
      calc(-50% + var(--dy,0px))
    ) scale(.35);
    filter: blur(1px);
  }
}

/* === Lluvia que rebota 1 vez (arcade) === */
.px.bounce{
  animation-name: pxBounce;
  animation-timing-function: linear;
}

@keyframes pxBounce{
  /* cae */
  0%{
    opacity:1;
    transform: translate(-50%, -50%) scale(1);
    filter: blur(0px);
  }
  55%{
    opacity:.9;
    transform: translate(
      calc(-50% + var(--dx,0px)),
      calc(-50% + var(--fall, 140px))
    ) scale(.95);
  }
  /* rebote (sube un poquito) */
  75%{
    opacity:.8;
    transform: translate(
      calc(-50% + (var(--dx,0px) * .65)),
      calc(-50% + (var(--fall, 140px) - var(--bounce, 60px)))
    ) scale(.85);
  }
  /* vuelve a caer y muere */
  100%{
    opacity:0;
    transform: translate(
      calc(-50% + (var(--dx,0px) * .85)),
      calc(-50% + (var(--fall, 140px) + 24px))
    ) scale(.35);
    filter: blur(1px);
  }
}

.canvasDisplay{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:110px;

  font-size:42px;
  font-weight:900;
  letter-spacing:2px;
  color:#ffffff;

  text-align:center;
  z-index:20;
  user-select:none;

  text-shadow:
    0 0 8px rgba(255,255,255,.6),
    0 0 18px rgba(125,92,255,.4);
}

/* 🎯 número-disparo que viaja hacia el meteoro */
.shotNum{
  position:absolute;
  left:0; top:0;
  transform: translate(-50%, -50%);
  font-size:42px;
  font-weight:900;
  letter-spacing:2px;
  color:#fff;
  text-shadow:
    0 0 8px rgba(255,255,255,.6),
    0 0 18px rgba(125,92,255,.4);
  pointer-events:none;
  z-index:60;

  /* animación controlada por variables */
  animation: shotFly var(--t, 240ms) cubic-bezier(.2,.9,.2,1) forwards;
}

@keyframes shotFly{
  0%{
    opacity:1;
    transform: translate(-50%, -50%) translate(0px, 0px) scale(1);
    filter: blur(0px);
  }
  70%{
    opacity:.95;
    transform: translate(-50%, -50%) translate(var(--dx), var(--dy)) scale(.92);
  }
  100%{
    opacity:0;
    transform: translate(-50%, -50%) translate(var(--dx), var(--dy)) scale(.55);
    filter: blur(.8px);
  }
}

/* 👻 estela del disparo */
.shotGhost{
  position:absolute;
  left:0; top:0;
  transform: translate(-50%, -50%);
  font-size:42px;
  font-weight:900;
  letter-spacing:2px;
  color:#fff;
  pointer-events:none;
  z-index:50;

  opacity:.45;
  filter: blur(.2px);

  text-shadow:
    0 0 8px rgba(255,255,255,.35),
    0 0 18px rgba(125,92,255,.25);

  animation: ghostFade var(--gt, 160ms) linear forwards;
}

@keyframes ghostFade{
  from{ opacity: var(--go, .45); transform: translate(-50%, -50%) scale(1); }
  to  { opacity: 0;              transform: translate(-50%, -50%) scale(.85); }
}

/* === Placa afuera del juego (arriba del .game) === */
.gameHeader{
  grid-column: 1;              /* en PC: misma columna del juego */
  grid-row: 1;                 /* arriba del juego */
  align-self: start;
  justify-self: stretch;
  margin: 0 0 10px 0;
}

.gameHeader .inner{
  position:relative;
  padding:12px 16px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(15,18,35,.75);
  backdrop-filter: blur(10px);
  box-shadow: 0 18px 60px rgba(0,0,0,.35);
  overflow:hidden;
}

/* grid retro elegante */
.gameHeader .inner::before{
  content:"";
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(125,92,255,.16) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,197,94,.12) 1px, transparent 1px);
  background-size: 26px 26px;
  opacity:.55;
  mix-blend-mode: screen;
}

/* glow suave */
.gameHeader .inner::after{
  content:"";
  position:absolute; inset:-40%;
  background:
    radial-gradient(circle at 30% 40%, rgba(125,92,255,.28), transparent 60%),
    radial-gradient(circle at 70% 60%, rgba(34,197,94,.18), transparent 65%);
  filter: blur(16px);
  opacity:.85;
}

.gameHeader .title{
  position:relative; z-index:1;
  font-weight:900;
  font-size:18px;
  letter-spacing:.9px;
  text-transform: uppercase;
  text-shadow: 0 0 12px rgba(125,92,255,.45);
  text-align: center;
}

.gameHeader .sub{
  position:relative; z-index:1;
  margin-top:2px;
  font-size:12px;
  color: rgba(238,242,255,.78);
  letter-spacing:.35px;
}

.missionTitle{
  margin:0 0 10px 0;
  font-size:40px;
  font-weight:900;
  letter-spacing:.6px;
  text-transform:uppercase;
  text-align:center;
  text-shadow: 0 0 14px rgba(125,92,255,.55);
}

.missionText{
  margin:0;
  font-size:35px;
  line-height:1.45;
  text-align:center;
  color: rgba(238,242,255,.92);
}

.missionText .dangerLine{
  display:inline-block;
  font-size:35px;
  letter-spacing:.2px;
}

.missionHint{
  margin:10px 0 0 0;
  font-size:13px;
  text-align:center;
  color: rgba(238,242,255,.72);
}

.btnPlay{
  font-size:20px !important;
  padding:14px 16px !important;
  border-radius:16px !important;
  font-weight:900 !important;
  letter-spacing:.6px;
  text-transform:uppercase;
  background: linear-gradient(135deg, rgba(125,92,255,.95), rgba(34,197,94,.70)) !important;
  border-color: rgba(255,255,255,.18) !important;
  box-shadow: 0 0 22px rgba(125,92,255,.35), 0 0 30px rgba(34,197,94,.18);
}

.btnPlay:hover{
  transform: translateY(-1px);
  filter: brightness(1.05);
}

.alertLine{
  margin:0 0 12px 0;
  font-size:31px;
  font-weight:900;
  text-align:center;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#ff2d2d;

  animation: alertSiren 1.2s linear infinite;
}

@keyframes alertSiren{
  0%{
    opacity:1;
    text-shadow:
      0 0 6px rgba(255,0,0,.7),
      0 0 14px rgba(255,0,0,.6);
  }

  45%{
    opacity:1;
    text-shadow:
      0 0 14px rgba(255,0,0,1),
      0 0 28px rgba(255,0,0,.9),
      0 0 55px rgba(255,0,0,.7);
  }

  50%{
    opacity:.4;
    text-shadow:none;
  }

  55%{
    opacity:1;
    text-shadow:
      0 0 18px rgba(255,0,0,1),
      0 0 35px rgba(255,0,0,.9),
      0 0 70px rgba(255,0,0,.8);
  }

  100%{
    opacity:1;
    text-shadow:
      0 0 6px rgba(255,0,0,.7),
      0 0 14px rgba(255,0,0,.6);
  }
}

/* =========================
   RESPONSIVE LIMPIO
   MÓVIL: juego arriba, teclado abajo
   PC: juego izquierda, teclado derecha
========================= */

<script>
(() => {
  // ---------- Helpers ----------
  const $ = (id) => document.getElementById(id);
  const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
  const randInt = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
  const now = () => performance.now();
  const fmt = (n) => (n < 0 ? `(${n})` : String(n));
  // ---------- UI ----------
    
  const pillProg = $("pillProg");
  const pillProgText = $("pillProgText");
  
  const pillBest  = $("pillBest");
  
  const pillScore = $("pillScore");
  
  const overlay = $("overlay");
  const btnQuickStart = $("btnQuickStart");
  
  const game = $("game");
    
  const bgMusic = $("bgMusic");

  // ===== Playlist aleatoria =====
  const TRACKS = [
    "data/velocidad/Arcade Divide.mp3",
    "data/velocidad/Hex Grid Calculus.mp3",
    "data/velocidad/Hex Grid Calculus 2.mp3",
    "data/velocidad/Pixel Abyss Countdown.mp3",
    "data/velocidad/Pixel Abyss Countdown 2.mp3",
    "data/velocidad/Pixel Pressure Loop.mp3",
    "data/velocidad/Retro Math Grid.mp3",
    "data/velocidad/Retro Math Grid 2.mp3"
  ];
  
  let lastTrackIndex = -1; // El índice anterior empieza en -1

  function pickNextTrackIndex() {
    let idx;
    
    // Si lastTrackIndex es -1, significa que es la primera vez que se selecciona
    // y no queremos comparar con nada, así que simplemente seleccionamos aleatoriamente
    if (lastTrackIndex === -1) {
      idx = Math.floor(Math.random() * TRACKS.length);
    } else {
      do {
        idx = Math.floor(Math.random() * TRACKS.length); // Selección aleatoria
      } while (idx === lastTrackIndex); // Aseguramos que no repita la canción anterior
    }
  
    lastTrackIndex = idx; // Guardamos el índice para la siguiente vez
    return idx;
  }
  
  function playRandomTrack(){
    const idx = pickNextTrackIndex();
    bgMusic.src = TRACKS[idx];
    bgMusic.currentTime = 0;
    bgMusic.play().catch(()=>{});
  }
  
  const sfxExplosion = $("sfxExplosion");
  const sfxHit = $("sfxHit");
  
  // --- keypad / display ---
  const displayEl = $("display");
  const keypadEl = document.querySelector(".keypad");

  // ---------- Fixed curriculum defaults ----------
  const FIXED = {
    baseSpeed: 0.3,
    targetStart: 20,
    targetStep: 5,

    spawnStartMs: 1500,
    spawnMinMs: 950,
    spawnStepMs: 20,

    maxMeteors: 4,
    maxMeteorsCap: 7,

    bonusBase: 0.06,
    bonusPerLevel: 0.01,
    bonusCap: 0.18,

    // input constraints
    maxDigits: 4,

    // --- BONUS FLYBY ---
    flybyBaseMs: 10000,      // cada cuánto intentamos uno (aprox)
    flybyJitterMs: 2200,    // variación aleatoria
    flybySpeedMin: 160,     // px/s
    flybySpeedMax: 200,     // px/s

  // ---------- State ----------
  const state = {
    running: false,
    score: 0,
    streak: 0,
    bestStreak: 0,
    level: 1,
    lives: 5,
    solvedThisLevel: 0,
    target: FIXED.targetStart,
    baseSpeed: FIXED.baseSpeed,
    spawnEveryMs: FIXED.spawnStartMs,
    lastSpawn: 0,
    meteors: new Map(),
    nextId: 1,
    lastTick: 0,

    typed: "", // lo que va formando el teclado
    lastFlyby: 0,
    nextFlybyAt: 0,
    
    phase: "normal",   // "normal" | "boss"
    boss: null,        // { id, el, x, y, vy, orbiters:Set<number>, t0, ... }
  };

function setDisplay(){
  if(state.typed.length === 0){
    displayEl.textContent = "";
  }else{
    displayEl.textContent = state.typed;
  }
}

  function pushDigit(d){
    if(!state.running) return;
    if(state.typed.length >= FIXED.maxDigits) return;
    // evita "000"
    if(state.typed === "0") state.typed = "";
    state.typed += String(d);
    setDisplay();
  }

  function clearAll(){
    if(!state.running) return;
  
    // 💥 si había algo, explota antes de borrar
    if(state.typed.length > 0){
      explodeTypedAtDisplay("soft");
    }
  
    state.typed = "";
    setDisplay();
  }

  function toggleSign(){
    if(!state.running) return;
  
    if(state.typed.startsWith("-")){
      state.typed = state.typed.slice(1);
    }else{
      state.typed = "-" + state.typed;
    }
    setDisplay();
  }
  
  function targetForLevel(level){
    return FIXED.targetStart + (level - 1) * FIXED.targetStep;
  }

  function bonusProbForLevel(level){
    const p = FIXED.bonusBase + (level - 1) * FIXED.bonusPerLevel;
    return Math.min(FIXED.bonusCap, Math.max(0, p));
  }

  function maxMeteorsForLevel(level){
    return Math.min(FIXED.maxMeteorsCap, FIXED.maxMeteors + Math.floor((level - 1) / 3));
  }

  function loadBest(){
    const v = Number(localStorage.getItem("mc_bestStreak") || "0");
    state.bestStreak = isFinite(v) ? v : 0;
    pillBest.textContent = `Racha • ${state.streak} / ${state.bestStreak}`;
  }
  function saveBest(){
    localStorage.setItem("mc_bestStreak", String(state.bestStreak));
  }

// ===== Pixel fire (particles) =====
const FIRE_COLORS = ["#fbbf24","#fb7185","#60a5fa","#22c55e","#a78bfa","#ffffff"];
const BONUS_COLORS = ["#fbbf24","#fde68a","#fff7cc","#ffffff"]; // dorado + brillo
  
function emitPixelFire(m, count=1){
  const rectG = game.getBoundingClientRect();
  const rectM = m.el.getBoundingClientRect();

  for(let i=0;i<count;i++){
    const p = document.createElement("div");
    p.className = "px";

    const palette = m.isBonus ? BONUS_COLORS : FIRE_COLORS;
    const col = palette[randInt(0, palette.length-1)];
    p.style.background = col;
    
    if(m.isBonus){
      p.classList.add("gold");
    }

    // vida (ms)
    const life = randInt(320, 650);
    p.style.setProperty("--life", `${life}ms`);

    // tamaño aleatorio (px)
    const s = randInt(5, 10);
    p.style.width = `${s}px`;
    p.style.height = `${s}px`;

    // posición: por encima del meteoro, a lo ancho (desorden)
    const x = (rectM.left - rectG.left) + randInt(10, Math.max(10, Math.floor(rectM.width - 10)));
    const y = (rectM.top - rectG.top) + randInt(0, 10); // pegado arriba

    p.style.left = `${x}px`;
    p.style.top  = `${y}px`;

    // “salida” en desorden: drift + subir un poquito + caer sutil
    const dx = randInt(-22, 22);
    const dy = randInt(-28, -10);

    // aplicamos un empujón con transition (simple y efectivo)
    // (arranca en su posición, luego se mueve y se quema)
    requestAnimationFrame(() => {
      p.style.transition = `transform ${life}ms linear`;
      p.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(.9)`;
    });

    // se elimina solo
    p.addEventListener("animationend", () => p.remove(), { once:true });

    game.appendChild(p);
  }
}

// emite según tiempo (para que no dependa de FPS)
function pixelFireTick(m, dt){
  // intensidad base: 0.9–2.0 partículas por segundo por meteoro (ajusta)
  const rate = m.isBonus ? 2.6 : 1.4;

  m.fireAcc = (m.fireAcc || 0) + dt * rate;

  // cuando acumula 1, suelta partículas
  while(m.fireAcc >= 1){
    m.fireAcc -= 1;

    // 1 o 2 pixeles, a veces 3
    const n = m.isBonus
      ? (Math.random() < 0.35 ? 3 : 2)
      : (Math.random() < 0.12 ? 3 : (Math.random() < 0.45 ? 2 : 1));
    emitPixelFire(m, n);
  }
}
  
function updateHUD() {
  
  // Actualiza el puntaje
  pillScore.textContent = `${state.score} pts`;

  // Progreso del nivel
  const pct = Math.max(0, Math.min(100, (state.solvedThisLevel / state.target) * 100));
  pillProg.style.setProperty("--p", `${pct}%`);
  pillProgText.textContent = `Nivel ${state.level} • ${state.solvedThisLevel}/${state.target}`;

  // Racha de puntaje
  pillBest.textContent = `Racha • ${state.streak} / ${state.bestStreak}`;

  // Actualiza la barra de vida
  const lifePct = (state.lives / 5) * 100; // Considerando que el máximo de vidas es 5
  pillLives.style.setProperty("--p", `${lifePct}%`);
  pillLivesText.textContent = `Vidas: ${state.lives}/5`;

}

  // ---------- Curriculum ----------
  function getRangesForLevel(level){
    const addSubMax = clamp(10 + (level - 1) * 2, 10, 80);
    const mulMax = clamp(5 + Math.floor((level - 1) / 2), 5, 20);
  
    const negAddSub = level >= 2;  // negativos desde nivel 2
    const negMul    = level >= 3;  // negativos en multiplicación desde nivel 3
  
    return {
      add: [negAddSub ? -addSubMax : 0, addSubMax],
      sub: [negAddSub ? -addSubMax : 0, addSubMax],
      mul: [negMul ? -mulMax : 0, mulMax]
    };
  }

  function pickOp(){
    const ops = ["add","sub","mul","div"];
    return ops[randInt(0, ops.length-1)];
  }

  function makeEquationProblem(){
    // Devuelve ecuaciones tipo: 2×___ + 1 = 5  (respuesta: 2)
    // Restringimos para que el hueco sea entero y los números no se disparen.
    const level = state.level;
    const xMax = clamp(8 + Math.floor((level-1)*1.5), 8, 25); // hueco máximo
    const x = randInt(0, xMax);

    // Elegimos una plantilla
    const templates = ["a*x+b=c", "a*x-b=c", "(x+a)*b=c", "(x-a)*b=c", "(x*b)+a=c", "(x*b)-a=c", "x/a+b=c", "x/a-b=c"];
    const tpl = templates[randInt(0, templates.length-1)];

    // helpers para evitar división fea
    const pickA = (min, max) => randInt(min, max);
    const pickB = (min, max) => randInt(min, max);

    let a, b, c, text, ans = x;

    if(tpl === "a*x+b=c"){
      a = pickA(1, clamp(3 + Math.floor(level/3), 3, 9));
      b = pickB(0, clamp(6 + level, 6, 25));
      c = a*x + b;
      text = `${a} × ___ + ${b} = ${c}`;

    }else if(tpl === "a*x-b=c"){
      a = pickA(1, clamp(3 + Math.floor(level/3), 3, 9));
      b = pickB(0, clamp(6 + level, 6, 25));
      c = a*x - b;
      // evita c muy negativo (se siente raro para peques)
      if(c < 0){ b = Math.max(0, a*x); c = a*x - b; }
      text = `${a} × ___ − ${b} = ${c}`;

    }else if(tpl === "(x+a)*b=c"){
      a = pickB(0, clamp(6 + level, 6, 25));
      b = pickA(1, clamp(3 + Math.floor(level/4), 3, 8));
      c = (x + a) * b;
      text = `(___ + ${a}) × ${b} = ${c}`;

    }else if(tpl === "(x-a)*b=c"){
      a = pickB(0, Math.min(x, clamp(6 + level, 6, 25))); // para que x-a no sea negativo
      b = pickA(1, clamp(3 + Math.floor(level/4), 3, 8));
      c = (x - a) * b;
      text = `(___ − ${a}) × ${b} = ${c}`;

    }else if(tpl === "(x*b)+a=c"){
      b = pickA(1, clamp(4 + Math.floor(level/3), 4, 10));
      a = pickB(0, clamp(6 + level, 6, 25));
      c = x*b + a;
      text = `___ × ${b} + ${a} = ${c}`;

    }else if(tpl === "(x*b)-a=c"){
      b = pickA(1, clamp(4 + Math.floor(level/3), 4, 10));
      a = pickB(0, clamp(6 + level, 6, 25));
      c = x*b - a;
      if(c < 0){ a = Math.max(0, x*b); c = x*b - a; }
      text = `___ × ${b} − ${a} = ${c}`;

    }else if(tpl === "x/a+b=c"){
      // aquí ___ es x (el hueco), pero queremos división exacta:
      a = pickA(1, clamp(3 + Math.floor(level/4), 3, 10));
      b = pickB(0, clamp(6 + level, 6, 25));
      c = (x / a) + b;
      // forzamos x múltiplo de a: reconstruimos x para que sea exacto
      const k = randInt(0, xMax);
      const x2 = a * k;
      ans = x2;
      c = (x2 / a) + b;
      text = `___ ÷ ${a} + ${b} = ${c}`;

    }else{ // "x/a-b=c"
      a = pickA(1, clamp(3 + Math.floor(level/4), 3, 10));
      b = pickB(0, clamp(6 + level, 6, 25));
      const k = randInt(0, xMax);
      const x2 = a * k;
      ans = x2;
      c = (x2 / a) - b;
      if(c < 0){ b = Math.max(0, (x2 / a)); c = (x2 / a) - b; }
      text = `___ ÷ ${a} − ${b} = ${c}`;
    }

    // --- random: invertir lados (___ queda a la derecha) ---
    const flipProb = 0.5; // 0.5 = 50% (ajusta a gusto)
    if(Math.random() < flipProb){
      const parts = text.split(" = ");
      if(parts.length === 2){
        text = `${parts[1]} = ${parts[0]}`;
      }
    }
    
    return { text, ans };
  }
  
  function makeProblem(){
    // % de ecuaciones con hueco (sube levemente con el nivel)
    const eqProb = clamp(0.12 + (state.level-1)*0.01, 0.12, 0.22);
    if(Math.random() < eqProb){
      return makeEquationProblem();
    }

    // ---- lo tuyo normal, sin cambios ----
    const ranges = getRangesForLevel(state.level);
    const op = pickOp();
    let a, b, text, ans;

    if(op === "add"){
      [a,b] = [randInt(...ranges.add), randInt(...ranges.add)];
      text = `${fmt(a)} + ${fmt(b)}`;
      ans = a + b;

    }else if(op === "sub"){
      a = randInt(...ranges.sub);
      b = randInt(...ranges.sub);
      text = `${fmt(a)} − ${fmt(b)}`;
      ans = a - b;

    }else if(op === "mul"){
      a = randInt(...ranges.mul);
      b = randInt(...ranges.mul);
      text = `${fmt(a)} × ${fmt(b)}`;
      ans = a * b;

    }else{
      const max = ranges.mul[1];
      const divisor = randInt(1, max);
    
      // resultado entero
      let result = randInt(1, max);
    
      // ✅ desde nivel 3, a veces lo hacemos negativo
      if(state.level >= 3 && Math.random() < 0.5){
        result = -result;
      }
    
      const dividend = divisor * result;
    
      text = `${fmt(dividend)} ÷ ${fmt(divisor)}`;
      ans = result;
    }

    return { text, ans };
  }

  // ---------- Meteors ----------
  function spawnMeteor(isBonus=false){
    const { text, ans } = makeProblem();
    const id = state.nextId++;
    const el = document.createElement("div");
    el.className = "meteor";
    if(isBonus) el.classList.add("bonus");
    el.dataset.id = String(id);
    el.innerHTML = `<div class="expr">${text}</div>`;
    game.appendChild(el);

const rect = game.getBoundingClientRect();
const padding = 12;

// medir ancho REAL del meteoro
el.style.left = "0px";
el.style.top  = "-60px";
const meteorWidth = el.offsetWidth;

// rango seguro dentro del canvas
const minX = padding;
const maxX = rect.width - meteorWidth - padding;

// aleatorio con “fairness” suave (evita pegados extremos)
const gap = 18;   // prueba 12–18 en móvil; 18 en PC va bien
const tries = 6;

let x = randInt(minX, Math.max(minX, Math.floor(maxX)));

for(let i=0;i<tries;i++){
  let ok = true;

  for(const other of state.meteors.values()){
    const ox = parseFloat(other.el.style.left || "0");
    const ow = other.el.offsetWidth || 140;

    // solape horizontal con margen gap
    if(x < ox + ow + gap && x + meteorWidth + gap > ox){
      ok = false;
      break;
    }
  }

  if(ok) break;
  x = randInt(minX, Math.max(minX, Math.floor(maxX)));
}

el.style.left = `${x}px`;

    const levelBoost = 1 + (state.level - 1) * 0.03;
    const speed = state.baseSpeed * levelBoost;
    
    // 🎲 variación: 0.88 a 1.18 (ajústalo a gusto)
    const jitter = 0.88 + Math.random() * 0.30;
    
    state.meteors.set(id, {
      id, el, ans,
      y: -60,
      speedPxPerSec: (70 + state.level * 2) * speed * jitter,
      alive: true,
      isBonus
    });
  }

function killMeteor(m, cls){
  if(!m.alive) return;
  m.alive = false;

  // ✅ solo agrega clase si existe
  if(cls) m.el.classList.add(cls);

  setTimeout(() => {
    try { m.el.remove(); } catch {}
  }, 110);

  if(m.kind === "orbiter" && state.boss){
    state.boss.orbiters.delete(m.id);
  }
  
  state.meteors.delete(m.id);
}

function missMeteor(m) {
  killMeteor(m, "miss");

  playExplosion(); // 💥 SONIDO AQUÍ

  burstPixelFX(m, {
    explode: m.isBonus ? 18 : 12,
    rain:    m.isBonus ? 24 : 16,
    bounce:  undefined // que decida nearGround automáticamente
  });

  // Penaliza el puntaje cuando fallamos un meteoro
  state.score = Math.max(0, state.score - 4); // Restar puntos si el meteoro es fallado

  state.lives = Math.max(0, state.lives - 1); // Si no hay vidas, game over
  state.streak = 0; // Racha se reinicia

  if (state.lives === 0) gameOver();
}

  function screenBomb(){
    // Borra TODOS los meteoros actuales (sin penalizar vidas)
    const arr = [...state.meteors.values()];
  
    let cleared = 0;
  
    for(const mm of arr){
      if(!mm.alive) continue;
  
      // efecto visual (ligero)
      burstPixelFX(mm, { explode: 10, rain: 6, bounce: 0 });
  
      // lo removemos como "hit" (sin missMeteor)
      killMeteor(mm, "hit");
      cleared++;
    }
  
    // recompensa opcional por limpieza (ajusta a gusto)
    state.score += cleared * 3;  // +3 por cada meteoro borrado       

  }

// BOSS

function startBossPhase(){
  // congela progreso normal
  state.phase = "boss";

  // limpia meteoros normales/bonus actuales (opcional pero recomendado)
  for(const m of [...state.meteors.values()]){
    if(m.kind === "flyby") killMeteor(m, "");
    else killMeteor(m, "");
  }

  spawnBoss();
  updateHUD();
}

function spawnBoss(){

  const el = document.createElement("div");
  el.className = "meteor boss";
  el.dataset.id = String(id);

  // carita ASCII
  el.innerHTML = `<div class="expr">&lt;^s^&gt;</div>`;
  game.appendChild(el);

  // tamaño real
  el.style.left = "0px";
  el.style.top  = "0px";
  const w = el.offsetWidth;
  const h = el.offsetHeight;

  const x = (game.clientWidth - w) * 0.5;
  const y = -h - 20;

  el.style.left = `${x}px`;

function spawnBossOrbiter(boss, i, n){
  const { text, ans } = makeProblem(); // MISMA dificultad del nivel ✅

  const id = state.nextId++;
  const el = document.createElement("div");
  el.className = "meteor";
  el.dataset.id = String(id);
  el.innerHTML = `<div class="expr">${text}</div>`;
  game.appendChild(el);

  // ring 0/1 (2 anillos)
  const ring = (i % 2);

  // velocidad distinta por minion
  const baseOmega = 1.0 + 0.10 * state.level;              // rad/s
  const omega = (ring ? 1 : -1) * (baseOmega * (0.75 + Math.random()*0.55));

  // fases distintas
  const phase = (i / n) * Math.PI * 2;

  // params por minion
  const orb = {
    id, el, ans,
    alive: true,
    isBonus:false,
    kind:"orbiter",
    bossId: boss.id,

    ring,
    phase,
    omega,

    // respiración
    breathAmp: ring ? 10 : 14,
    breathSpeed: ring ? 0.9 : 0.75,

    // elipse base (A/B) + ring offset
    baseR: (ring ? 74 : 108),

    // pequeño wobble (suave)
    wobbleAmp: ring ? 0.07 : 0.05,
    wobbleSpeed: ring ? 1.6 : 1.3
  };

  // inicio “pegado” al boss (lo posiciona updateBoss)
  el.style.left = `${boss.x}px`;
  el.style.top  = `${boss.y}px`;

  state.meteors.set(id, orb);
  boss.orbiters.add(id);
}

function updateBoss(dt){
  const boss = state.boss;
  if(!boss) return;

  // boss cae lento (presión real)
  boss.y += boss.vy * dt;

  // actualiza posición del boss element
  const bossM = state.meteors.get(boss.id);
  if(bossM && bossM.alive){
    bossM.y = boss.y;
    bossM.el.style.top = `${boss.y}px`;
    // 💀 si el boss toca el suelo => pierdes
    const groundY = game.clientHeight - 2;
    if(bossM && bossM.alive){
      const h = bossM.el.offsetHeight || 60;
      if(boss.y + h >= groundY){
        gameOver();
        return;
      }
    }
  }

  // centro del boss (para orbiters)
  const rectG = game.getBoundingClientRect();
  const rectB = boss.el.getBoundingClientRect();

  const cx = (rectB.left - rectG.left) + rectB.width/2;
  const cy = (rectB.top  - rectG.top)  + rectB.height/2;

  const t = (performance.now() - boss.t0) / 1000;

  // elipse rotando (wow, still fair)
  const ellipseRot = t * (0.25 + state.level*0.006); // rad/s (lento)
  const cosR = Math.cos(ellipseRot);
  const sinR = Math.sin(ellipseRot);

  for(const id of [...boss.orbiters]){
    const m = state.meteors.get(id);
    if(!m || !m.alive){
      boss.orbiters.delete(id);
      continue;
    }

    const theta = m.phase + t * m.omega;

    // respiración (radio pulso)
    const breath = Math.sin(t * m.breathSpeed + m.phase) * m.breathAmp;
    const r = m.baseR + breath;

    // elipse base (A/B)
    const A = 1.18;     // estira X
    const B = 0.82;     // comprime Y

    // wobble suave (micro caos)
    const wob = Math.sin(t * m.wobbleSpeed + m.phase*2) * m.wobbleAmp;

    // coords elípticas
    let ox = Math.cos(theta + wob) * r * A;
    let oy = Math.sin(theta - wob) * r * B;

    // rota elipse (wow)
    const rx = ox * cosR - oy * sinR;
    const ry = ox * sinR + oy * cosR;

    // aplica posición (centrado por CSS ya)
    const x = cx + rx;
    const y = cy + ry;

    m.x = x;
    m.y = y;
    m.el.style.left = `${x}px`;
    m.el.style.top  = `${y}px`;

    // partículas normales funcionan
  }

  // si ya no quedan orbiters -> boss muerto -> siguiente nivel
  if(boss.orbiters.size === 0){
    // limpia boss
    const bossMeteor = state.meteors.get(boss.id);
    if(bossMeteor) killMeteor(bossMeteor, "hit");

    state.boss = null;
    state.phase = "normal";

    // recompensa (tú ajustas)
    state.score += 25;
    state.streak += 1;
    state.bestStreak = Math.max(state.bestStreak, state.streak);
    saveBest();

    state.lastFlyby = now();
    state.nextFlybyAt = state.lastFlyby + FIXED.flybyBaseMs + randInt(0, FIXED.flybyJitterMs);
    nextLevel(); // vuelve al flow normal
  }
}

function makeBonusProblem(){
  // Pesados pero controlados (sin locuras): multiplicación grande, combos, y algunas ecuaciones con hueco
  const L = state.level;

  const pick = (arr) => arr[randInt(0, arr.length-1)];
  const heavy = pick(["mulBig","mix","eqHard"]);

  // 1) Multiplicación grande (2 dígitos × 1-2 dígitos)
  if(heavy === "mulBig"){
    const a = randInt(12, clamp(22 + L*2, 22, 60));
    const b = randInt(6,  clamp(9 + Math.floor(L/2), 9, 18));
    return { text: `${a} × ${b}`, ans: a*b };
  }

  // 2) Combo (a×b ± c)
  if(heavy === "mix"){
    const a = randInt(8,  clamp(12 + L, 12, 30));
    const b = randInt(4,  clamp(6 + Math.floor(L/2), 6, 14));
    const c = randInt(6,  clamp(12 + L, 12, 35));
    const sign = Math.random() < 0.5 ? "+" : "−";
    const ans = sign === "+" ? (a*b + c) : (a*b - c);
    return { text: `(${a} × ${b}) ${sign} ${c}`, ans };
  }

  // 3) Ecuación con hueco un poco más dura
  // ___ × a − b = c   (ans entero)
  {
    const a = randInt(3, clamp(4 + Math.floor(L/3), 4, 10));
    const ans = randInt(4, clamp(8 + L, 8, 25));
    const b = randInt(5, clamp(12 + L, 12, 40));
    const c = ans*a - b;
    // si queda muy negativo, ajusta b
    const b2 = c < -50 ? Math.max(0, ans*a) : b;
    const c2 = ans*a - b2;
    return { text: `___ × ${a} − ${b2} = ${c2}`, ans };
  }
}

  function findMeteorByAnswer(n){
    // Devuelve el meteorito con respuesta n más urgente (más abajo)
    let best = null;

function shootNumberToMeteor(m, text){
  if(!state.running) return; // 🔒 protección temprana
  const rectG = game.getBoundingClientRect();
  const rectD = displayEl.getBoundingClientRect(); // número abajo (en canvas)
  const rectM = m.el.getBoundingClientRect();      // meteoro objetivo

  // salida (centro del display)
  const sx = (rectD.left - rectG.left) + rectD.width/2;
  const sy = (rectD.top  - rectG.top)  + rectD.height/2;

  // target (centro del meteoro)
  const tx = (rectM.left - rectG.left) + rectM.width/2;
  const ty = (rectM.top  - rectG.top)  + rectM.height/2;

  const dx = tx - sx;
  const dy = ty - sy;

  // duración según distancia
  const dist = Math.hypot(dx, dy);
  const t = Math.max(190, Math.min(380, dist * 0.55)); // ms

  // helper: crear ghost en un punto intermedio del trayecto
  function spawnGhost(f, delayMs){
    if(!state.running) return; // 🔒 no crear si el juego ya murió
    setTimeout(() => {
      const g = document.createElement("div");
      g.className = "shotGhost";
      g.textContent = text;

      // punto a lo largo del vector (f = 0..1)
      const gx = sx + dx * f;
      const gy = sy + dy * f;

      g.style.left = `${gx}px`;
      g.style.top  = `${gy}px`;

      // fade rápido
      const gt = 140 + Math.random() * 80; // 140–220ms
      g.style.setProperty("--gt", `${gt}ms`);

      // opacidad ligeramente distinta
      const go = 0.28 + Math.random() * 0.22; // 0.28–0.50
      g.style.setProperty("--go", go);

      g.addEventListener("animationend", () => g.remove(), { once:true });
      game.appendChild(g);
    }, delayMs);
  }

  // 👻 2–3 ghosts: aparecen detrás del disparo (en tiempos distintos)
  // aparecen al 25%, 45%, 65% del recorrido aprox
  spawnGhost(0.25, 30);
  spawnGhost(0.45, 70);
  if(Math.random() < 0.55) spawnGhost(0.65, 110); // a veces 3

  // disparo principal
  const shot = document.createElement("div");
  shot.className = "shotNum";
  shot.textContent = text;

  shot.style.left = `${sx}px`;
  shot.style.top  = `${sy}px`;
  shot.style.setProperty("--dx", `${dx}px`);
  shot.style.setProperty("--dy", `${dy}px`);
  shot.style.setProperty("--t", `${t}ms`);

  shot.addEventListener("animationend", () => shot.remove(), { once:true });
  game.appendChild(shot);
}

function submitAnswer() {
  if (!state.running) return;

  const typedText = state.typed; // Capturamos lo que el jugador escribió
  if (typedText.trim() === "" || typedText === "-") return;

  const n = Number(typedText);
  if (!Number.isFinite(n)) {
    state.typed = "";
    setDisplay();
    return;
  }

  // Borra INMEDIATO el número del centro para que quede "libre"
  state.typed = "";
  setDisplay();

  const m = findMeteorByAnswer(n);

  // Si no hay meteoro con esa respuesta, penalizamos
  if (!m) {
    explodeTypedAtDisplay("hard", typedText); // 💥 ahora sí explota siempre
    state.score = Math.max(0, state.score - 4);
    state.streak = 0;
    updateHUD();
    return;
  }

  // Disparo visual (usa typedText, no state.typed)
  shootNumberToMeteor(m, typedText);

  // Destruye el meteoro
  killMeteor(m, "hit");
  playHit();
  
  // Aquí utilizamos `burstPixelFX` para las partículas (lluvia de pixels)
  burstPixelFX(m, { explode: m.isBonus ? 14 : 8, rain: 0, bounce: 0 });

  // Actualiza el puntaje y la racha
  if (m.isBonus && m.kind === "flyby") {
    state.lives = Math.min(9, state.lives + 1); // Añadir vida por bonus flyby
    state.score += 6;
    state.streak += 1;
    state.bestStreak = Math.max(state.bestStreak, state.streak);
    updateHUD();

  } else if (m.isBonus) {
    state.score += 8; // Puntaje extra por meteoro de bonus
    state.streak += 1;
    state.bestStreak = Math.max(state.bestStreak, state.streak);
    updateHUD(); 
    screenBomb(); // Efecto de bomba para meteoros de bonus
  } else {

    // 🔥 ORBITER (no cuenta para progreso normal)
    if (m.kind === "orbiter") {
      state.score += 10;
      state.streak += 1;
      state.bestStreak = Math.max(state.bestStreak, state.streak);
      updateHUD();
      return; // 🚫 importantísimo: salir aquí
    }

    // 🔥 METEORO NORMAL (sí cuenta para progreso)
    state.score += 10;
    state.streak += 1;
    state.bestStreak = Math.max(state.bestStreak, state.streak);

    state.solvedThisLevel += 1;

    updateHUD();

    if (state.solvedThisLevel >= state.target) {
      startBossPhase();
    }
  }

  saveBest();
  updateHUD(); // Actualiza la interfaz con el puntaje, vidas, y progreso
}

  // ---------- Events ----------
  btnQuickStart.addEventListener("click", () => {
    resetAll();  // ✅ reinicia todo (meteoros/score/level/vidas)
    start();     // ✅ arranca limpio
  });
      
  bgMusic.addEventListener("ended", () => {
    if(state.running){
      playRandomTrack();
    }
  });
  
  // keypad clicks
  keypadEl.addEventListener("click", (e) => {
    const btn = e.target.closest("button");
    if(!btn) return;

    const key = btn.dataset.key;
    const act = btn.dataset.act;

    if(key != null) pushDigit(key);
    else if(act === "neg") toggleSign();
    else if(act === "clear") clearAll();
    else if(act === "enter") submitAnswer();
  });

  // teclado físico (PC)
  window.addEventListener("keydown", (e) => {
    // 🔥 Si el overlay está visible → ENTER o SPACE inician
    const overlayVisible = overlay.style.display !== "none";
    if(overlayVisible && (e.key === "Enter" || e.key === " ")){
      e.preventDefault();
      start();
      return;
    }
    if(!state.running) return;

    if(e.key >= "0" && e.key <= "9"){
      pushDigit(e.key);
      return;
    }

    if(e.key === "Enter"){
      submitAnswer();
      return;
    }

    if(e.key.toLowerCase() === "c"){
      clearAll();
      return;
    }

    if(e.key === "-" || e.key === "Subtract"){
      toggleSign();
      return;
    }
  });

  // init
  loadBest();
  updateHUD();
  setDisplay();
})();
</script>
</body>
</html>
