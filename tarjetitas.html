<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palabra del día — Asallam Sensei</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
:root{
  --page-bg:#070A12;
  --panel:rgba(255,255,255,.075);
  --stroke:rgba(255,255,255,.18);
  --text:#fff;
  --muted:var(--text);

  --light-strength:.35;
  --light-wall: 244;
  
  --scale:1;
  --space-scale:1;
  --font-scale:1;
  
  --a:#22d3ee;
  --b:#fb7185;
  --c:#a3e635;

  /* 🔥 NUEVO: focos dinámicos */
  --glow-a:rgba(34,211,238,.24);
  --glow-b:rgba(251,113,133,.20);

  --card-bg:#050816;
  --card-text:var(--text);
  --card-w:1080;
  --card-h:1080;
}

body{
  --text:#fff;
}
  
*{box-sizing:border-box}

html,
body{
  margin:0;
  min-height:100%;
}

body{
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 15% 8%, var(--glow-a), transparent 34%),
    radial-gradient(circle at 88% 12%, var(--glow-b), transparent 32%),
    var(--page-bg);
  padding:18px;
}

.app{
  max-width:1320px;
  margin:0 auto;
  display:grid;
  gap:16px;
}

h1{
  font-size:clamp(2rem,5vw,4.8rem);
  line-height:.9;
  letter-spacing:-.075em;
  margin:0;
  text-shadow:0 6px 18px rgba(0,0,0,.35);
}

.subtitle{
  margin:8px 0 0;
  color:var(--muted);
  font-weight:600;
  text-shadow:0 2px 8px rgba(0,0,0,.25);
}

.layout{
  display:grid;
  grid-template-columns:minmax(380px,420px) minmax(0,1fr);
  gap:16px;
  align-items:start;
}

.controls{
  display:grid;
  gap:12px;
  align-self:start;
  position:sticky;
  top:14px;

  padding:14px;
  border:1px solid var(--stroke);
  border-radius:24px;
  background:linear-gradient(145deg,rgba(255,255,255,.11),rgba(255,255,255,.04));
  backdrop-filter:blur(18px);
  box-shadow:0 24px 80px rgba(0,0,0,.35);
}

.group{
  display:grid;
  gap:9px;
  padding:12px;
  border:1px solid var(--stroke);
  border-radius:20px;
  background:rgba(255,255,255,.05);
}

label,
.label{
  font-size:.78rem;
  text-transform:uppercase;
  letter-spacing:.12em;
  font-weight:700;
  color:var(--muted);
  text-shadow:0 2px 6px rgba(0,0,0,.25);
}

select,
input,
button{
  width:100%;
  min-width:0;
  font:inherit;
  color:var(--text);
  border:1px solid var(--stroke);
  border-radius:14px;
  padding:11px 12px;
  background:rgba(0,0,0,.25);
  outline:0;
}

select option{
  background:#101421;
  color:var(--text);
}

button{
  cursor:pointer;
  font-weight:700;
  text-shadow:0 2px 6px rgba(0,0,0,.25);
}

.btn{
  border:0;
  background:linear-gradient(135deg,var(--a),var(--b));
  box-shadow:0 14px 34px rgba(0,0,0,.25);
  white-space:normal;
  line-height:1.15;
  text-shadow:0 2px 6px rgba(0,0,0,.3);
}

.btn.secondary{
  background:rgba(255,255,255,.11);
  border:1px solid var(--stroke);
  box-shadow:none;
  text-shadow:0 2px 6px rgba(0,0,0,.25);
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
    
.chips{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.chip{
  width:100%;
  min-width:0;
  border-radius:999px;
  padding:10px 12px;
  font-size:.84rem;
  line-height:1.15;
  background:rgba(0,0,0,.25);
  white-space:normal;
  text-align:center;
  text-shadow:0 2px 6px rgba(0,0,0,.3);
}

.chip.active{
  background:linear-gradient(135deg,var(--a),var(--b));
  border-color:transparent;
  text-shadow:0 2px 8px rgba(0,0,0,.35);
}

/* EL PANEL DERECHO ES LA TARJETA */
.card-wrap{
  min-height:680px;
  display:grid;
  place-items:center;
  padding:16px;
  border:1px solid var(--stroke);
  border-radius:32px;
  background:linear-gradient(145deg,rgba(255,255,255,.10),rgba(255,255,255,.035));
  overflow:auto;
}

.card{
  width:min(100%, calc((100vh - 160px) * var(--card-w) / var(--card-h)));
  max-width:880px;
  aspect-ratio:calc(var(--card-w) / var(--card-h));
  position:relative;
  overflow:hidden;
  color:var(--text);
  border-radius:clamp(24px,5cqw,60px);
  box-shadow:0 40px 120px rgba(0,0,0,.45);

  background:
    radial-gradient(circle at 20% 20%, var(--glow-a), transparent 65%),
    radial-gradient(circle at 80% 80%, var(--glow-b), transparent 65%),
    linear-gradient(160deg, var(--card-bg), #020617);

  container-type:inline-size;
}

.card::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:linear-gradient(120deg,transparent 0 34%,rgba(255,255,255,.10),transparent 62% 100%);
  mix-blend-mode:screen;
  opacity:.32;
}

.card-content{
  position:absolute;
  inset:3.5%;
  z-index:1;

  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:calc(clamp(5px,1.1cqw,12px) * var(--space-scale));

  transform-origin:center;
  transform:scale(var(--fit,1));
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  width:100%;
  gap:6px;
  min-width:0;
  padding:0;
}

.signature{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  width:100%;
  gap:6px;
  min-width:0;
  padding:0;
}

.brand{
  margin-right:0;
  font-size:clamp(1rem,2.4cqw,1.6rem);
  font-weight:600;
  white-space:normal;
  text-align:right;
  text-shadow:0 2px 6px rgba(0,0,0,.25);
}

.site{
  display:block;
  font-size:clamp(1.3rem,3.2cqw,2.2rem);
  font-weight:900;
  color:var(--text);

  text-shadow:
    0 0 6px var(--glow-a),
    0 0 14px var(--glow-a),
    0 0 24px var(--glow-b);

  letter-spacing:.02em;
  margin-top:2px;
  text-align:right;
}

.tags{
  min-width:0;
  display:flex;
  flex-wrap:wrap;
  justify-content:flex-end;
  gap:6px;
  text-align:right;
  font-size:clamp(.8rem,2.2cqw,1.4rem);
  font-weight:900;
  color:var(--text);
  line-height:1.2;
  text-shadow:0 2px 6px rgba(0,0,0,.3);
}

.tag{
  white-space:nowrap;
}

.pill{
  border:1px solid rgba(255,255,255,.24);
  background:rgba(255,255,255,.12);
  border-radius:999px;
  padding:.36em .62em;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.06em;
  font-size:clamp(.7rem,2.15cqw,1.45rem);
  white-space:nowrap;
  backdrop-filter:blur(10px);
  text-shadow:0 2px 6px rgba(0,0,0,.3);
}
  
.center{
  min-height:100%;
  display:grid;
  align-content:center;
  justify-items:center;
  text-align:center;
  gap:calc(clamp(10px,2.2cqw,22px) * var(--space-scale));
}

.jp{
  font-family:"Noto Serif JP",serif;
  font-size:calc(clamp(3.2rem,14cqw,7.4rem) * var(--font-scale));
  line-height:1;
  font-weight:700;
  letter-spacing:-.03em;
  text-wrap:balance;
  text-shadow:0 10px 28px rgba(0,0,0,.28);
}

.kana{
  font-family:"Noto Sans JP",sans-serif;
  font-size:calc(clamp(1.2rem,5cqw,2.8rem) * var(--font-scale));
  line-height:1.1;
  font-weight:600;
  color:var(--text);
  text-shadow:0 4px 12px rgba(0,0,0,.25);
}
  
.romaji{
  font-size:calc(clamp(1.4rem,4.4cqw,2.8rem) * var(--font-scale));
  line-height:1.15;
  font-weight:600;
  color:var(--text);

  text-shadow:
    0 0 6px var(--glow-a),
    0 2px 8px rgba(0,0,0,.35);
}

.es{
  max-width:92%;
  font-size:calc(clamp(1.5rem,5.4cqw,3.4rem) * var(--font-scale));
  line-height:1.08;
  font-weight:600;
  letter-spacing:-.04em;
  text-wrap:balance;
  text-shadow:0 6px 18px rgba(0,0,0,.3);
}

.note{
  display:flex;
  flex-direction:column;
  justify-content:center;

  flex:0 0 auto;
  max-width:300px;

  border:1px solid rgba(255,255,255,.16);
  background:rgba(0,0,0,.22);
  border-radius:clamp(14px,2.5cqw,28px);

  padding:calc(.7em * var(--space-scale)) calc(1em * var(--space-scale));
  font-size:calc(clamp(.9rem,2.4cqw,1.6rem) * var(--font-scale));
  line-height:1.25;
  font-weight:600;
  text-align:center;
  text-shadow:0 4px 12px rgba(0,0,0,.25);
}

.bottom{
  width:100%;
  min-width:0;
}

.kanjis{
  display:flex;
  justify-content:center;
  gap:clamp(10px,2cqw,18px);
  flex-wrap:wrap;
}

.kanji{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  padding:.7em;
  border:1px solid rgba(255,255,255,.20);
  background:rgba(255,255,255,.10);
  border-radius:clamp(12px,2cqw,22px);
  text-align:center;
  backdrop-filter:blur(10px);
  min-width:0;
}

.kanji-char{
  font-family:"Noto Sans JP",sans-serif;
  font-size:calc(clamp(2.2rem,6cqw,4.2rem) * var(--font-scale));
  line-height:1;
  font-weight:700;
  text-shadow:0 6px 18px rgba(0,0,0,.3);
}

.kanji-es{
  margin-top:.3em;
  font-size:calc(clamp(.75rem,2cqw,1.15rem) * var(--font-scale));
  line-height:1.15;
  color:var(--text);

  white-space:normal;
  text-align:center;
  max-width:100px;
}

.kanji-panel{
  display:block;
  justify-self:center;
  width:max-content;
  max-width:100%;

  text-align:center;

  border:1px solid rgba(255,255,255,.18);
  background:rgba(0,0,0,.25);
  border-radius:clamp(18px,3cqw,32px);

  padding:clamp(10px,1.6cqw,16px);

  margin:0 auto;
}

.kanji-title{
  display:block;
  text-align:center;
  width:100%;

  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;

  font-size:calc(clamp(.75rem,1.7cqw,1.1rem) * var(--font-scale));
  color:var(--text);

  margin-bottom:12px;

  text-shadow:
    0 0 6px var(--glow-a),
    0 0 12px var(--glow-b),
    0 2px 8px rgba(0,0,0,.35);
}

.note.dual{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.notes{
  width:100%;
  max-width:260px;
  margin:0 auto;

  display:flex;
  flex-wrap:nowrap;
  justify-content:center; /* 👈 centradas */
  gap:clamp(10px,2cqw,20px);
}

.note.half{
  flex:0 1 calc(50% - 5px);
}

.note.half:only-child{
  flex-basis:100%;
}

body.light-mode{
  --muted:#000;
  --page-bg:#ffffff;
  --card-bg:rgb(var(--light-wall),var(--light-wall),var(--light-wall));
  --text:#000;
  --stroke:rgba(0,0,0,.15);

  background:
    radial-gradient(circle at 15% 8%, var(--glow-a), transparent 40%),
    radial-gradient(circle at 88% 12%, var(--glow-b), transparent 40%),
    var(--page-bg);
}

body.light-mode .card{
  background:
    radial-gradient(circle at 20% 20%, var(--glow-a), transparent 70%),
    radial-gradient(circle at 80% 80%, var(--glow-b), transparent 70%),
    linear-gradient(
      160deg,
      var(--card-bg),
      rgba(229,231,235,var(--light-strength))
    );
}

body.light-mode .note,
body.light-mode .kanji,
body.light-mode .kanji-panel{
  background:rgba(0,0,0,.05);
  border-color:rgba(0,0,0,.1);
}

.example-note{
  width:max-content;
  max-width:100%;
}

.card{
  font-size:calc(1rem * var(--scale));
}

.card-content > *{
  margin:0 !important;
}

.kanji-panel{
  margin:calc(6px * var(--space-scale)) auto;
}

.bottom{
  margin-top:calc(6px * var(--space-scale));
}

@media (max-width: 1400px){

  .card{
    border-radius:clamp(16px,3cqw,32px); /* antes era más grande */
  }

  .card-content{
    gap:calc(clamp(4px,0.8cqw,8px) * var(--space-scale));
  }

  .center{
    gap:calc(clamp(6px,1.4cqw,14px) * var(--space-scale));
  }

  .kanji-panel{
    border-radius:clamp(12px,2cqw,20px);
  }

  .note{
    border-radius:clamp(10px,2cqw,18px);
  }

}
  
</style>
</head>
<body>
  <div class="app theme-neon" id="app">
    <header>
      <h1>Generador de tarjetas japonesas</h1>
    </header>

    <main class="layout">
      <aside class="controls">
        <section class="group">
          <label for="wordSelect">Palabra</label>
          <select id="wordSelect"></select>
          <button class="btn secondary" id="randomWord">Palabra random</button>
        </section>

        <section class="group">
          <div class="label">Formato</div>
          <div class="chips" id="formatChips"></div>
          <div class="row">
            <input id="customW" type="number" value="1080" min="300" placeholder="Ancho">
            <input id="customH" type="number" value="1080" min="300" placeholder="Alto">
          </div>
          <button class="btn secondary" id="applyCustom">Aplicar personalizado</button>
        </section>
        
        <section class="group">
          <div class="label">Escala visual</div>
          <div class="row">
            <input id="fontScale" type="number" step="0.05" value="1" placeholder="Fuente">
            <input id="spaceScale" type="number" step="0.05" value="1" placeholder="Espacio">
          </div>
          <button class="btn secondary" id="applyScale">Aplicar escala</button>
        </section>
        
        <section class="group">
          <label for="themeSelect">Tema</label>
          <select id="themeSelect"></select>
          <button class="btn secondary" id="randomTheme">Random de familia</button>
          <button class="btn secondary" id="chaosTheme">Super random random</button>
        </section>

        <section class="group">
          <label for="lightWall">Pared blanca modo claro</label>
          <input id="lightWall" type="number" min="180" max="255" step="1" value="244">
        
          <label for="lightStrength">Brillo extra modo claro</label>
          <input id="lightStrength" type="number" min="0" max="1" step="0.05" value="0.35">
        </section>
        
        <button class="btn secondary" id="toggleMode">Modo claro / oscuro</button>
        
        <button class="btn" id="download">Descargar esta tarjeta</button>
      </aside>

      <section class="card-wrap">
        <article class="card" id="card">
          <div class="card-content" id="cardContent"></div>
        </article>
      </section>
    </main>
  </div>

  <script>
    const DATA_URL = 'data/tarjetas.json';

    const formats = [
      {id:'1-1', label:'Cuadrada 1:1', w:1080, h:1080},
      {id:'4-5', label:'Vertical 4:5', w:1080, h:1350},
      {id:'9-16', label:'Story 9:16', w:1080, h:1920},
      {id:'custom', label:'Personalizado', w:1080, h:1080}
    ];

    const themes = [
      {id:'theme-neon', label:'Neón', a:'#22d3ee', b:'#fb7185', c:'#a3e635', bg:'#050816'},
      {id:'theme-pastel', label:'Pastel', a:'#f9a8d4', b:'#a7f3d0', c:'#818cf8', bg:'#6d5dfc'},
      {id:'theme-sumi', label:'Sumi samurái', a:'#ef4444', b:'#7f1d1d', c:'#f97316', bg:'#050505'},
      {id:'theme-pop', label:'Anime pop', a:'#facc15', b:'#ec4899', c:'#06b6d4', bg:'#371062'},
      {id:'theme-forest', label:'Bosque', a:'#86efac', b:'#14b8a6', c:'#22c55e', bg:'#052e16'},
      {id:'theme-sakura', label:'Sakura', a:'#f1f5f9', b:'#fb7185', c:'#f9a8d4', bg:'#be185d'},
      {id:'theme-gold', label:'Oro oscuro', a:'#fde68a', b:'#f97316', c:'#facc15', bg:'#1c1917'},
      {id:'theme-minimal', label:'Minimal japonés', a:'#f8fafc', b:'#e2e8f0', c:'#cbd5e1', bg:'#f8fafc'}
    ];

    const state = {data:null, word:null, kanjiMap:new Map(), format:formats[0], theme:themes[0]};
    const $ = s => document.querySelector(s);
    const esc = v => String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    const pick = arr => arr[Math.floor(Math.random()*arr.length)];
    const randHex = () => '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');

function adjustLayout(scale=1, space=1){
  document.documentElement.style.setProperty('--font-scale', scale || 1);
  document.documentElement.style.setProperty('--space-scale', space || 1);
  requestAnimationFrame(autoFit);
}
    
    function applyFormat(format){
      state.format = format;
      document.documentElement.style.setProperty('--card-w', format.w);
      document.documentElement.style.setProperty('--card-h', format.h);
      renderFormatChips();
      requestAnimationFrame(() => {
      autoFit();
      microFit();
    });
    }

    function renderFormatChips(){
      $('#formatChips').innerHTML = formats.map(f => `<button class="chip ${state.format.id===f.id?'active':''}" data-format="${f.id}">${esc(f.label)}</button>`).join(' ');
      document.querySelectorAll('[data-format]').forEach(btn => btn.onclick = () => applyFormat(formats.find(f => f.id === btn.dataset.format)));
    }

    function applyTheme(theme){
      state.theme = theme;
      $('#app').className = 'app ' + theme.id;

      document.documentElement.style.setProperty('--a', theme.a);
      document.documentElement.style.setProperty('--b', theme.b);
      document.documentElement.style.setProperty('--c', theme.c);
      document.documentElement.style.setProperty('--card-bg', theme.bg);
      
      /* 🔥 IMPORTANTE: sincronizar focos */
      const toRGBA = (hex, alpha=0.25) => {
        const bigint = parseInt(hex.replace('#',''), 16);
        const r = (bigint >> 16) & 255;
        const g = (bigint >> 8) & 255;
        const b = bigint & 255;
        return `rgba(${r},${g},${b},${alpha})`;
      };
      
      document.documentElement.style.setProperty('--glow-a', toRGBA(theme.a));
      document.documentElement.style.setProperty('--glow-b', toRGBA(theme.b));
      
      $('#themeSelect').value = theme.id;
      requestAnimationFrame(autoFit);
    }

function chaosTheme(){
  const randColor = () => {
    const r = Math.floor(Math.random()*255);
    const g = Math.floor(Math.random()*255);
    const b = Math.floor(Math.random()*255);
    return `rgba(${r},${g},${b},0.25)`;
  };

  document.documentElement.style.setProperty('--glow-a', randColor());
  document.documentElement.style.setProperty('--glow-b', randColor());

  document.documentElement.style.setProperty('--card-bg', randHex());
}

function renderCard(){
  if(!state.word) return;
  const w = state.word;
  const kanjis = (w.kanjis || []).map(x => {
    const char = String(x).trim();
    return state.kanjiMap.get(char) || { jp: char, es: '' };
  });
  const notes = [
    w.extra && ['Extra', w.extra],
    w.ejemplo && ['Ejemplo', w.ejemplo]
  ].filter(Boolean);

  $('#cardContent').innerHTML = `
    <header class="top">
      <div class="pill">Palabra #${esc(w.id)}</div>
      <div class="tags">
        ${(w.tags || []).map(t => `<span class="tag">#${esc(String(t).replaceAll(' ','_'))}</span>`).join(' ')}
      </div>
    </header>

   <section class="center">
    <div class="jp">${esc(w.jp)}</div>
    <div class="romaji">${esc(w.romaji)}</div>
    <div class="es">${esc(w.es)}</div>

      <div class="kanji-panel">
        <div class="kanji-title">Kanjis en esta palabra</div>
        <div class="kanjis">
          ${kanjis.map(k => `
            <div class="kanji">
              <div class="kanji-char">${esc(k.jp)}</div>
              <div class="kanji-es">${esc(k.es)}</div>
            </div>
          `).join('')}
        </div>
      </div>
  
    <div class="notes">
      ${notes.map(n => `
        <div class="note ${n[0] === 'Ejemplo' ? 'example-note' : ''}">
          ${esc(n[1]).replace(/\n/g, '<br>')}
        </div>
      `).join('')}
    </div>

    </section>

    <footer class="bottom">
      <div class="signature">
        <div class="brand">
          Asallam Sensei
          <span class="site">asallamsensei.com</span>
        </div>
      </div>
    </footer>
  `;

  requestAnimationFrame(autoFit);
}

    function autoFit(){
      const card = $('#card');
      const content = $('#cardContent');
      if(!card || !content) return;
      content.style.setProperty('--fit', 1);

      let fit = 1;
      for(let i=0;i<35;i++){
        const tooTall = content.scrollHeight > content.clientHeight + 2;
        const tooWide = content.scrollWidth > content.clientWidth + 2;
        if(!tooTall && !tooWide) break;
        fit -= 0.015;
        content.style.setProperty('--fit', fit.toFixed(3));
      }
    }

function microFit(){
  const blocks = document.querySelectorAll('.note, .kanji');
  
  blocks.forEach(el => {
    let size = 1;
    while (el.scrollHeight > el.clientHeight && size > 0.85){
      size -= 0.03;
      el.style.transform = `scale(${size})`;
      el.style.transformOrigin = 'top center';
    }
  });
}
    
async function downloadCard(){
  const card = $('#card');

  try{
    await document.fonts?.ready;
    autoFit();

    card.classList.add('exporting');

    const scale = state.format.w / card.getBoundingClientRect().width;

    const canvas = await html2canvas(card, {
      backgroundColor:null,
      scale,
      useCORS:true
    });

    const a = document.createElement('a');
    a.download = `asallam-${state.word.id}-${state.format.id}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();

  }catch(err){
    alert('Error al descargar: ' + err.message);
  }finally{
    card.classList.remove('exporting');
  }
}

    async function init(){
      const res = await fetch(DATA_URL);
      const json = await res.json();
      state.data = json;
      state.kanjiMap = new Map((json.kanjis || []).map(k => [k.jp, k]));

      $('#wordSelect').innerHTML = json.palabras.map(p => `<option value="${esc(p.id)}">${esc(p.jp)} — ${esc(p.es)}</option>`).join('');
      $('#themeSelect').innerHTML = themes.map(t => `<option value="${t.id}">${esc(t.label)}</option>`).join('');
      $('#applyScale').onclick = () => adjustLayout(+$('#fontScale').value || 1, +$('#spaceScale').value || 1);
      
      state.word = json.palabras[0];
      renderFormatChips();
      applyFormat(formats[0]);
      applyTheme(themes[0]);
      renderCard();

      $('#wordSelect').onchange = e => { state.word = state.data.palabras.find(p => p.id === e.target.value); renderCard(); };
      $('#randomWord').onclick = () => { state.word = pick(state.data.palabras); $('#wordSelect').value = state.word.id; renderCard(); };
      $('#themeSelect').onchange = e => applyTheme(themes.find(t => t.id === e.target.value));
      $('#randomTheme').onclick = () => applyTheme(pick(themes));
      $('#chaosTheme').onclick = chaosTheme;
      $('#applyCustom').onclick = () => applyFormat({id:'custom', label:'Personalizado', w:+$('#customW').value || 1080, h:+$('#customH').value || 1080});
      $('#download').onclick = downloadCard;
      $('#toggleMode').onclick = () => {
        const strength = Math.min(1, Math.max(0, +$('#lightStrength').value || 0));
        const wall = Math.min(255, Math.max(180, +$('#lightWall').value || 244));
      
        document.documentElement.style.setProperty('--light-strength', strength);
        document.documentElement.style.setProperty('--light-wall', wall);
      
        document.body.classList.toggle('light-mode');
      };
      window.addEventListener('resize', autoFit);
      await document.fonts?.ready;
      renderCard();
    }

    init().catch(err => {
      document.body.innerHTML = `<pre style="white-space:pre-wrap;color:white;padding:24px">No se pudo cargar data/tarjetas.json\n\n${esc(err.message)}\n\nUsa GitHub Pages o un servidor local.</pre>`;
    });
  </script>
</body>
