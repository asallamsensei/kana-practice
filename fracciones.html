<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fracciones — Aplicativo Online</title>
<style>
  :root{
    --bg:#080b16;
    --bg2:#0d1224;
    --panel:#121935;
    --panel2:#171f42;
    --panel3:#1d2751;
    --border:rgba(255,255,255,.10);
    --text:#eef2ff;
    --muted:rgba(238,242,255,.68);

    --blue:#5ea2ff;
    --purple:#8b5cf6;
    --pink:#ec4899;
    --cyan:#22d3ee;
    --red:#ff4d6d;
    --green:#22c55e;
    --shadow:0 18px 45px rgba(0,0,0,.35);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
  }

  body{
    font-family:Arial, sans-serif;
    color:var(--text);
    background:
      radial-gradient(1000px 600px at 10% 0%, rgba(94,162,255,.18), transparent 60%),
      radial-gradient(900px 600px at 100% 0%, rgba(236,72,153,.16), transparent 60%),
      radial-gradient(700px 500px at 50% 100%, rgba(139,92,246,.18), transparent 60%),
      linear-gradient(180deg, #070a14 0%, #0b1020 100%);
    min-height:100vh;
  }

  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:24px 16px 48px;
  }

  .app-head{
    margin-bottom:18px;
    padding:18px 20px;
    border-radius:24px;
    background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    border:1px solid var(--border);
    box-shadow:var(--shadow);
    backdrop-filter:blur(12px);
  }

  .app-title{
    margin:0;
    font-size:1.28rem;
    font-weight:800;
    letter-spacing:.2px;
  }

  .app-sub{
    margin:6px 0 0;
    color:var(--muted);
    font-size:.94rem;
  }

  .section{
    margin-top:16px;
    padding:18px;
    border-radius:24px;
    background:linear-gradient(180deg, rgba(19,25,53,.94), rgba(12,16,34,.95));
    border:1px solid var(--border);
    box-shadow:var(--shadow);
  }

  .section-title{
    margin:0 0 14px;
    font-size:1rem;
    font-weight:800;
    color:#f7f8ff;
  }

  .controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:flex-end;
    margin-bottom:14px;
  }

  .fraction-input{
    display:flex;
    align-items:flex-end;
    gap:8px;
    padding:12px;
    border-radius:18px;
    background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
    border:1px solid rgba(255,255,255,.08);
  }

  .stack{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .tiny{
    font-size:.76rem;
    color:var(--muted);
  }

  input[type="number"]{
    width:88px;
    padding:10px 12px;
    border:none;
    outline:none;
    border-radius:14px;
    background:#0b1021;
    color:var(--text);
    font-size:1rem;
    border:1px solid rgba(255,255,255,.08);
  }

  input[type="number"]:focus{
    border-color:rgba(94,162,255,.75);
    box-shadow:0 0 0 3px rgba(94,162,255,.12);
  }

  .slash{
    font-size:1.2rem;
    color:var(--muted);
    padding:0 2px 10px;
    font-weight:700;
  }

  .segmented{
    display:inline-flex;
    gap:6px;
    padding:6px;
    border-radius:16px;
    background:#0b1021;
    border:1px solid rgba(255,255,255,.08);
  }

  .segmented button,
  .action-btn{
    border:none;
    cursor:pointer;
    color:var(--text);
    font-weight:700;
    border-radius:12px;
    transition:.18s transform, .18s opacity, .18s background;
  }

  .segmented button{
    min-width:48px;
    padding:10px 14px;
    background:transparent;
    font-size:1rem;
  }

  .segmented button.active{
    background:linear-gradient(135deg, rgba(94,162,255,.22), rgba(236,72,153,.22));
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
  }

  .action-btn{
    padding:12px 16px;
    background:linear-gradient(135deg, var(--blue), var(--purple), var(--pink));
    box-shadow:0 10px 24px rgba(93,85,255,.28);
  }

  .action-btn:hover,
  .segmented button:hover{
    transform:translateY(-1px);
  }

  .result-line{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
  }

  .frac{
    display:inline-flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-width:54px;
    font-weight:800;
    line-height:1.05;
  }

  .frac .bar{
    width:100%;
    min-width:42px;
    height:2px;
    background:#edf2ff;
    border-radius:999px;
    margin:4px 0;
  }

  .symbol{
    font-size:1.18rem;
    color:var(--muted);
    font-weight:800;
  }

  .hint{
    color:var(--muted);
    font-size:.86rem;
    margin-bottom:10px;
  }

  .neg{
    display:inline-block;
    font-size:.72rem;
    font-weight:800;
    color:#fff;
    background:linear-gradient(135deg, #ef4444, #ff4d6d);
    padding:6px 9px;
    border-radius:999px;
    letter-spacing:.3px;
  }

  .visual-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(230px, 1fr));
    gap:12px;
  }

  .visual-card{
    padding:14px;
    border-radius:20px;
    background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
    border:1px solid rgba(255,255,255,.08);
    min-height:235px;
  }

  .visual-card h3{
    margin:0 0 10px;
    font-size:.92rem;
    font-weight:800;
    color:#f2f4ff;
  }

  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    margin-bottom:8px;
  }

  .mini-frac{
    color:var(--muted);
    font-size:.86rem;
    font-weight:700;
  }

  .pizza-wrap{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:165px;
  }

  .pizza-wrap svg{
    width:160px;
    height:160px;
    overflow:visible;
    filter:drop-shadow(0 10px 18px rgba(0,0,0,.28));
  }

  .pizza-center{
    fill:#0d1224;
    stroke:rgba(255,255,255,.12);
    stroke-width:1.4;
  }

  .pizza-text{
    text-anchor:middle;
    dominant-baseline:middle;
    fill:#eef2ff;
    font-size:13px;
    font-weight:800;
  }

  .legend{
    margin-top:6px;
    color:var(--muted);
    font-size:.8rem;
    text-align:center;
  }

  .tiny-note{
    color:var(--muted);
    font-size:.8rem;
    margin-top:8px;
  }

  .error{
    color:#ffd6df;
    background:rgba(255,77,109,.10);
    border:1px solid rgba(255,77,109,.22);
    padding:12px 14px;
    border-radius:16px;
    font-size:.9rem;
  }

  .sub-row{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    align-items:center;
    margin-bottom:12px;
  }

#singleOutput .visual-grid{
  grid-template-columns:minmax(260px, 340px);
  justify-content:start;
}
  
  @media (max-width:720px){
    .controls{
      flex-direction:column;
      align-items:stretch;
    }

    .fraction-input{
      width:100%;
      justify-content:flex-start;
    }

    .action-btn{
      width:100%;
    }

    input[type="number"]{
      width:100%;
      min-width:0;
    }

    .stack{
      flex:1;
    }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="app-head">
      <h1 class="app-title">Fracciones</h1>
      <p class="app-sub">Visual, simple y dark.</p>
    </div>

    <!-- BLOQUE 1 -->
    <section class="section">
      <h2 class="section-title">Representación visual</h2>

      <div class="controls">
        <div class="fraction-input">
          <div class="stack">
            <span class="tiny">Numerador</span>
            <input type="number" id="repNum" value="3">
          </div>
          <div class="slash">/</div>
          <div class="stack">
            <span class="tiny">Denominador</span>
            <input type="number" id="repDen" value="4">
          </div>
        </div>

        <button class="action-btn" onclick="renderSingle()">Mostrar</button>
      </div>

      <div id="singleOutput"></div>
    </section>

    <!-- BLOQUE 2 -->
    <section class="section">
      <h2 class="section-title">Suma y resta</h2>

      <div class="controls">
        <div class="fraction-input">
          <div class="stack">
            <span class="tiny">Fracción 1</span>
            <input type="number" id="srNum1" value="1">
          </div>
          <div class="slash">/</div>
          <div class="stack">
            <span class="tiny">Denominador</span>
            <input type="number" id="srDen1" value="2">
          </div>
        </div>

        <div class="segmented" id="srOp">
          <button class="active" data-op="+">+</button>
          <button data-op="-">−</button>
        </div>

        <div class="fraction-input">
          <div class="stack">
            <span class="tiny">Fracción 2</span>
            <input type="number" id="srNum2" value="1">
          </div>
          <div class="slash">/</div>
          <div class="stack">
            <span class="tiny">Denominador</span>
            <input type="number" id="srDen2" value="3">
          </div>
        </div>

        <button class="action-btn" onclick="renderSumRest()">Mostrar</button>
      </div>

      <div id="sumRestOutput"></div>
    </section>

    <!-- BLOQUE 3 -->
    <section class="section">
      <h2 class="section-title">Multiplicación y división</h2>

      <div class="controls">
        <div class="fraction-input">
          <div class="stack">
            <span class="tiny">Fracción 1</span>
            <input type="number" id="mdNum1" value="2">
          </div>
          <div class="slash">/</div>
          <div class="stack">
            <span class="tiny">Denominador</span>
            <input type="number" id="mdDen1" value="3">
          </div>
        </div>

        <div class="segmented" id="mdOp">
          <button class="active" data-op="*">×</button>
          <button data-op="/">÷</button>
        </div>

        <div class="fraction-input">
          <div class="stack">
            <span class="tiny">Fracción 2</span>
            <input type="number" id="mdNum2" value="3">
          </div>
          <div class="slash">/</div>
          <div class="stack">
            <span class="tiny">Denominador</span>
            <input type="number" id="mdDen2" value="4">
          </div>
        </div>

        <button class="action-btn" onclick="renderMultDiv()">Mostrar</button>
      </div>

      <div id="multDivOutput"></div>
    </section>
  </div>

<script>
  let currentSrOp = "+";
  let currentMdOp = "*";

  setupSegmented("srOp", op => currentSrOp = op);
  setupSegmented("mdOp", op => currentMdOp = op);

  function setupSegmented(id, onChange){
    const wrap = document.getElementById(id);
    const buttons = wrap.querySelectorAll("button");

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        onChange(btn.dataset.op);
      });
    });
  }

  function gcd(a,b){
    a = Math.abs(a);
    b = Math.abs(b);
    while(b !== 0){
      const t = b;
      b = a % b;
      a = t;
    }
    return a || 1;
  }

  function simplify(n,d){
    if(d === 0) return {n, d};
    if(d < 0){
      n = -n;
      d = -d;
    }
    const g = gcd(n,d);
    return { n:n/g, d:d/g };
  }

  function fracHtml(n,d){
    return `
      <span class="frac">
        <span>${n}</span>
        <span class="bar"></span>
        <span>${d}</span>
      </span>
    `;
  }

  function val(id){
    return parseInt(document.getElementById(id).value, 10);
  }

  function validateBasic(n,d){
    if(!Number.isFinite(n) || !Number.isFinite(d)) return "Pon números válidos.";
    if(d === 0) return "El denominador no puede ser 0.";
    return "";
  }

  function toMixed(absN, d){
    const whole = Math.floor(absN / d);
    const rem = absN % d;
    return {whole, rem};
  }

  function pizzaSvg(n, d, palette = ["#5ea2ff", "#8b5cf6", "#ec4899"]){
    if(d <= 0) return "";
    if(d > 24){
      return `
        <div class="pizza-wrap">
          <div class="tiny-note">Demasiadas partes para pizza.</div>
        </div>
      `;
    }

    const absN = Math.abs(n);
    const cx = 80;
    const cy = 80;
    const r = 60;
    const angleStep = (Math.PI * 2) / d;
    const { whole, rem } = toMixed(absN, d);

    let paths = "";
    for(let i=0;i<d;i++){
      const start = -Math.PI/2 + i * angleStep;
      const end = start + angleStep;
      const x1 = cx + r * Math.cos(start);
      const y1 = cy + r * Math.sin(start);
      const x2 = cx + r * Math.cos(end);
      const y2 = cy + r * Math.sin(end);
      const fill = i < rem ? palette[i % palette.length] : "rgba(255,255,255,.06)";
      const stroke = "rgba(255,255,255,.14)";
      const largeArc = angleStep > Math.PI ? 1 : 0;

      paths += `
        <path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z"
          fill="${fill}" stroke="${stroke}" stroke-width="1.2"></path>
      `;
    }

    const extra = whole > 0
      ? `<div class="legend">${whole} entero${whole>1?"s":""} + ${rem}/${d}</div>`
      : `<div class="legend">${absN}/${d}</div>`;

    return `
      <div class="pizza-wrap">
        <div>
          <svg viewBox="0 0 160 160" aria-hidden="true">
            ${paths}
            <circle cx="${cx}" cy="${cy}" r="20" class="pizza-center"></circle>
            <text x="${cx}" y="${cy}" class="pizza-text">${rem}/${d}</text>
          </svg>
          ${extra}
        </div>
      </div>
    `;
  }

  function makeVisualCard(title, n, d, palette){
    const s = simplify(n,d);
    const negative = s.n < 0;
    return `
      <div class="visual-card">
        <div class="card-top">
          <h3>${title}</h3>
          ${negative ? `<span class="neg">NEGATIVA</span>` : ``}
        </div>
        <div class="mini-frac">${s.n}/${s.d}</div>
        ${pizzaSvg(s.n, s.d, palette)}
      </div>
    `;
  }

  function lcm(a,b){
    return Math.abs(a*b) / gcd(a,b);
  }

  function renderSingle(){
    const n = val("repNum");
    const d = val("repDen");
    const out = document.getElementById("singleOutput");

    const err = validateBasic(n,d);
    if(err){
      out.innerHTML = `<div class="error">${err}</div>`;
      return;
    }

    const s = simplify(n,d);

    out.innerHTML = `
      <div class="result-line">
        ${fracHtml(s.n, s.d)}
        ${s.n < 0 ? `<span class="neg">NEGATIVA</span>` : ``}
      </div>

      <div class="visual-grid">
        ${makeVisualCard("", s.n, s.d, ["#5ea2ff","#8b5cf6","#ec4899"])}
      </div>
    `;
  }

  function commonDenHint(n1,d1,n2,d2, op){
    const common = lcm(d1,d2);
    if(common > 30) return ``;

    const a = n1 * (common / d1);
    const b = n2 * (common / d2);
    const res = op === "+" ? a + b : a - b;
    const neg = res < 0 ? `<span class="neg">NEGATIVA</span>` : ``;

    return `
      <div class="tiny-note">
        ${a}/${common} ${op === "+" ? "+" : "−"} ${b}/${common} = ${res}/${common} ${neg}
      </div>
    `;
  }

  function renderSumRest(){
    const n1 = val("srNum1");
    const d1 = val("srDen1");
    const n2 = val("srNum2");
    const d2 = val("srDen2");
    const out = document.getElementById("sumRestOutput");

    const err = validateBasic(n1,d1) || validateBasic(n2,d2);
    if(err){
      out.innerHTML = `<div class="error">${err}</div>`;
      return;
    }

    const rawN = currentSrOp === "+" ? (n1*d2 + n2*d1) : (n1*d2 - n2*d1);
    const rawD = d1*d2;
    const res = simplify(rawN, rawD);

    out.innerHTML = `
      <div class="result-line">
        ${fracHtml(simplify(n1,d1).n, simplify(n1,d1).d)}
        <span class="symbol">${currentSrOp === "+" ? "+" : "−"}</span>
        ${fracHtml(simplify(n2,d2).n, simplify(n2,d2).d)}
        <span class="symbol">=</span>
        ${fracHtml(res.n, res.d)}
        ${res.n < 0 ? `<span class="neg">NEGATIVA</span>` : ``}
      </div>

      ${commonDenHint(n1,d1,n2,d2,currentSrOp)}

      <div class="visual-grid">
        ${makeVisualCard("Fracción 1", n1, d1, ["#5ea2ff","#22d3ee","#8b5cf6"])}
        ${makeVisualCard("Fracción 2", n2, d2, ["#ec4899","#8b5cf6","#5ea2ff"])}
        ${makeVisualCard("Resultado", res.n, res.d, ["#22d3ee","#5ea2ff","#ec4899"])}
      </div>
    `;
  }

  function renderMultDiv(){
    const n1 = val("mdNum1");
    const d1 = val("mdDen1");
    const n2 = val("mdNum2");
    const d2 = val("mdDen2");
    const out = document.getElementById("multDivOutput");

    const err = validateBasic(n1,d1) || validateBasic(n2,d2);
    if(err){
      out.innerHTML = `<div class="error">${err}</div>`;
      return;
    }

    if(currentMdOp === "/" && n2 === 0){
      out.innerHTML = `<div class="error">No se puede dividir entre 0.</div>`;
      return;
    }

    let rawN, rawD, shortHint = "";

    if(currentMdOp === "*"){
      rawN = n1 * n2;
      rawD = d1 * d2;
    }else{
      rawN = n1 * d2;
      rawD = d1 * n2;
      shortHint = `<div class="tiny-note">Dividir por una fracción = multiplicar por su recíproco.</div>`;
    }

    const res = simplify(rawN, rawD);

    out.innerHTML = `
      <div class="result-line">
        ${fracHtml(simplify(n1,d1).n, simplify(n1,d1).d)}
        <span class="symbol">${currentMdOp === "*" ? "×" : "÷"}</span>
        ${fracHtml(simplify(n2,d2).n, simplify(n2,d2).d)}
        <span class="symbol">=</span>
        ${fracHtml(res.n, res.d)}
        ${res.n < 0 ? `<span class="neg">NEGATIVA</span>` : ``}
      </div>

      ${shortHint}

      <div class="visual-grid">
        ${makeVisualCard("Fracción 1", n1, d1, ["#5ea2ff","#8b5cf6","#ec4899"])}
        ${makeVisualCard("Fracción 2", n2, d2, ["#ec4899","#5ea2ff","#22d3ee"])}
        ${makeVisualCard("Resultado", res.n, res.d, ["#22d3ee","#8b5cf6","#ec4899"])}
      </div>
    `;
  }

  renderSingle();
  renderSumRest();
  renderMultDiv();
</script>
</body>
</html>
