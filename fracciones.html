<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fracciones — Aplicativo Online</title>
<style>
  :root{
    --bg:#070b16;
    --bg2:#0d1224;
    --panel:#121935;
    --panel2:#171f42;
    --text:#eef2ff;
    --muted:rgba(238,242,255,.7);
    --border:rgba(255,255,255,.08);

    --blue:#5ea2ff;
    --purple:#8b5cf6;
    --pink:#ec4899;
    --red:#ff4d6d;

    --shadow:0 16px 40px rgba(0,0,0,.35);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
  }

  body{
    font-family:Arial, sans-serif;
    color:var(--text);
    background:
      radial-gradient(900px 550px at 10% 0%, rgba(94,162,255,.15), transparent 60%),
      radial-gradient(900px 550px at 100% 0%, rgba(236,72,153,.13), transparent 60%),
      radial-gradient(800px 500px at 50% 100%, rgba(139,92,246,.14), transparent 60%),
      linear-gradient(180deg, #060913 0%, #0b1020 100%);
    min-height:100vh;
  }

  .wrap{
    max-width:1120px;
    margin:0 auto;
    padding:22px 14px 42px;
  }

  .app-head{
    padding:18px 20px;
    border-radius:24px;
    background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
    border:1px solid var(--border);
    box-shadow:var(--shadow);
    margin-bottom:16px;
  }

  .app-title{
    margin:0;
    font-size:1.25rem;
    font-weight:800;
  }

  .section{
    margin-top:16px;
    padding:18px;
    border-radius:24px;
    background:linear-gradient(180deg, rgba(18,25,53,.95), rgba(11,16,32,.96));
    border:1px solid var(--border);
    box-shadow:var(--shadow);
  }

  .section-title{
    margin:0 0 14px;
    font-size:1rem;
    font-weight:800;
  }

  .controls{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    align-items:center;
    margin-bottom:14px;
  }

  .fraction-block{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }

  .fraction-label{
    font-size:.85rem;
    font-weight:700;
    color:var(--muted);
  }

  .fraction-input{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:12px 10px;
    border-radius:18px;
    background:#0a1020;
    border:1px solid rgba(255,255,255,.08);
    min-width:86px;
  }

  .fraction-input input{
    width:54px;
    height:40px;
    text-align:center;
    padding:0;
    border:none;
    outline:none;
    border-radius:10px;
    background:#060b17;
    color:var(--text);
    font-size:1rem;
    font-weight:700;
    border:1px solid rgba(255,255,255,.08);
  }

  .fraction-input input:focus{
    border-color:rgba(94,162,255,.75);
    box-shadow:0 0 0 3px rgba(94,162,255,.12);
  }

  .frac-line-input{
    width:46px;
    height:2px;
    border-radius:999px;
    background:#eef2ff;
  }

  .single-frac{
    display:inline-flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-width:54px;
    font-weight:800;
    line-height:1.05;
  }

  .single-frac .bar{
    width:100%;
    min-width:42px;
    height:2px;
    background:#eef2ff;
    border-radius:999px;
    margin:4px 0;
  }

  .segmented{
    display:inline-flex;
    gap:6px;
    padding:6px;
    border-radius:16px;
    background:#0a1020;
    border:1px solid rgba(255,255,255,.08);
  }

  .segmented button,
  .action-btn{
    border:none;
    cursor:pointer;
    color:var(--text);
    font-weight:800;
    border-radius:12px;
    transition:.18s transform, .18s background;
  }

  .segmented button{
    min-width:48px;
    padding:10px 14px;
    background:transparent;
    font-size:1rem;
  }

  .segmented button.active{
    background:linear-gradient(135deg, rgba(94,162,255,.22), rgba(236,72,153,.22));
  }

  .segmented button:hover,
  .action-btn:hover{
    transform:translateY(-1px);
  }

  .action-btn{
    padding:12px 16px;
    background:linear-gradient(135deg, var(--blue), var(--purple), var(--pink));
    box-shadow:0 10px 24px rgba(116,87,255,.28);
  }

  .result-top{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:14px;
  }

  .symbol{
    font-size:1.15rem;
    font-weight:800;
    color:var(--muted);
  }

  .neg{
    display:inline-block;
    font-size:.72rem;
    font-weight:800;
    color:#fff;
    background:linear-gradient(135deg, #ef4444, #ff4d6d);
    padding:6px 9px;
    border-radius:999px;
    letter-spacing:.3px;
  }

  .tiny-note{
    color:var(--muted);
    font-size:.82rem;
    margin-bottom:12px;
  }

  .visual-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
    gap:12px;
  }

  .visual-card{
    padding:14px;
    border-radius:20px;
    background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
    border:1px solid rgba(255,255,255,.08);
    min-height:230px;
  }

  .visual-card-title{
    margin:0 0 10px;
    font-size:.9rem;
    font-weight:800;
    color:var(--text);
    text-align:center;
  }

  .pizza-wrap{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:170px;
  }

  .pizza-wrap svg{
    width:160px;
    height:160px;
    overflow:visible;
    filter:drop-shadow(0 10px 18px rgba(0,0,0,.28));
  }

  .pizza-center{
    fill:#0d1224;
    stroke:rgba(255,255,255,.12);
    stroke-width:1.4;
  }

  .pizza-text{
    text-anchor:middle;
    dominant-baseline:middle;
    fill:#eef2ff;
    font-size:13px;
    font-weight:800;
  }

  .error{
    color:#ffd6df;
    background:rgba(255,77,109,.10);
    border:1px solid rgba(255,77,109,.22);
    padding:12px 14px;
    border-radius:16px;
    font-size:.9rem;
  }

  @media (max-width:760px){
    .controls{
      flex-direction:column;
      align-items:stretch;
    }

    .fraction-block{
      align-items:center;
    }

    .action-btn{
      width:100%;
    }

    .visual-grid{
      grid-template-columns:1fr;
    }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="app-head">
      <h1 class="app-title">Fracciones</h1>
    </div>

    <section class="section">
      <h2 class="section-title">Representación visual</h2>

      <div class="controls">
        <div class="fraction-block">
          <div class="fraction-input">
            <input type="number" id="repNum" value="3">
            <div class="frac-line-input"></div>
            <input type="number" id="repDen" value="4">
          </div>
        </div>

        <button class="action-btn" onclick="renderSingle()">Mostrar</button>
      </div>

      <div id="singleOutput"></div>
    </section>

    <section class="section">
      <h2 class="section-title">Suma y resta</h2>

      <div class="controls">
        <div class="fraction-block">
          <div class="fraction-label">Fracción 1</div>
          <div class="fraction-input">
            <input type="number" id="srNum1" value="1">
            <div class="frac-line-input"></div>
            <input type="number" id="srDen1" value="2">
          </div>
        </div>

        <div class="segmented" id="srOp">
          <button class="active" data-op="+">+</button>
          <button data-op="-">−</button>
        </div>

        <div class="fraction-block">
          <div class="fraction-label">Fracción 2</div>
          <div class="fraction-input">
            <input type="number" id="srNum2" value="1">
            <div class="frac-line-input"></div>
            <input type="number" id="srDen2" value="3">
          </div>
        </div>

        <button class="action-btn" onclick="renderSumRest()">Mostrar</button>
      </div>

      <div id="sumRestOutput"></div>
    </section>

    <section class="section">
      <h2 class="section-title">Multiplicación y división</h2>

      <div class="controls">
        <div class="fraction-block">
          <div class="fraction-label">Fracción 1</div>
          <div class="fraction-input">
            <input type="number" id="mdNum1" value="2">
            <div class="frac-line-input"></div>
            <input type="number" id="mdDen1" value="3">
          </div>
        </div>

        <div class="segmented" id="mdOp">
          <button class="active" data-op="*">×</button>
          <button data-op="/">÷</button>
        </div>

        <div class="fraction-block">
          <div class="fraction-label">Fracción 2</div>
          <div class="fraction-input">
            <input type="number" id="mdNum2" value="3">
            <div class="frac-line-input"></div>
            <input type="number" id="mdDen2" value="4">
          </div>
        </div>

        <button class="action-btn" onclick="renderMultDiv()">Mostrar</button>
      </div>

      <div id="multDivOutput"></div>
    </section>
  </div>

<script>
  let currentSrOp = "+";
  let currentMdOp = "*";

  setupSegmented("srOp", op => currentSrOp = op);
  setupSegmented("mdOp", op => currentMdOp = op);

  function setupSegmented(id, onChange){
    const wrap = document.getElementById(id);
    const buttons = wrap.querySelectorAll("button");

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        onChange(btn.dataset.op);
      });
    });
  }

  function gcd(a,b){
    a = Math.abs(a);
    b = Math.abs(b);
    while(b !== 0){
      const t = b;
      b = a % b;
      a = t;
    }
    return a || 1;
  }

  function simplify(n,d){
    if(d === 0) return {n, d};
    if(d < 0){
      n = -n;
      d = -d;
    }
    const g = gcd(n,d);
    return { n:n/g, d:d/g };
  }

  function fracHtml(n,d){
    return `
      <span class="single-frac">
        <span>${n}</span>
        <span class="bar"></span>
        <span>${d}</span>
      </span>
    `;
  }

  function val(id){
    return parseInt(document.getElementById(id).value, 10);
  }

  function validateBasic(n,d){
    if(!Number.isFinite(n) || !Number.isFinite(d)) return "Pon números válidos.";
    if(d === 0) return "El denominador no puede ser 0.";
    return "";
  }

  function toMixed(absN, d){
    const whole = Math.floor(absN / d);
    const rem = absN % d;
    return { whole, rem };
  }

  function pizzaSvg(n, d, palette = ["#5ea2ff", "#8b5cf6", "#ec4899"]){
    if(d <= 0) return "";
    if(d > 24){
      return `<div class="pizza-wrap"><div class="tiny-note">Demasiadas partes.</div></div>`;
    }

    const absN = Math.abs(n);
    const cx = 80;
    const cy = 80;
    const r = 60;
    const angleStep = (Math.PI * 2) / d;
    const { whole, rem } = toMixed(absN, d);

    let paths = "";
    for(let i=0;i<d;i++){
      const start = -Math.PI/2 + i * angleStep;
      const end = start + angleStep;
      const x1 = cx + r * Math.cos(start);
      const y1 = cy + r * Math.sin(start);
      const x2 = cx + r * Math.cos(end);
      const y2 = cy + r * Math.sin(end);
      const largeArc = angleStep > Math.PI ? 1 : 0;
      const fill = i < rem ? palette[i % palette.length] : "rgba(255,255,255,.06)";
      const stroke = "rgba(255,255,255,.14)";

      paths += `
        <path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z"
          fill="${fill}" stroke="${stroke}" stroke-width="1.2"></path>
      `;
    }

    const centerText = whole > 0 ? `${whole}+${rem}/${d}` : `${rem}/${d}`;

    return `
      <div class="pizza-wrap">
        <svg viewBox="0 0 160 160" aria-hidden="true">
          ${paths}
          <circle cx="${cx}" cy="${cy}" r="20" class="pizza-center"></circle>
          <text x="${cx}" y="${cy}" class="pizza-text">${centerText}</text>
        </svg>
      </div>
    `;
  }

  function visualCard(title, n, d, palette){
    const s = simplify(n,d);
    return `
      <div class="visual-card">
        <div class="visual-card-title">${title}</div>
        ${pizzaSvg(s.n, s.d, palette)}
      </div>
    `;
  }

  function renderSingle(){
    const n = val("repNum");
    const d = val("repDen");
    const out = document.getElementById("singleOutput");

    const err = validateBasic(n,d);
    if(err){
      out.innerHTML = `<div class="error">${err}</div>`;
      return;
    }

    const s = simplify(n,d);

    out.innerHTML = `
      <div class="result-top">
        ${fracHtml(s.n, s.d)}
        ${s.n < 0 ? `<span class="neg">NEGATIVA</span>` : ``}
      </div>

      <div class="visual-grid" style="grid-template-columns:minmax(240px,320px);">
        ${visualCard("", s.n, s.d, ["#5ea2ff","#8b5cf6","#ec4899"])}
      </div>
    `;
  }

  function renderSumRest(){
    const n1 = val("srNum1");
    const d1 = val("srDen1");
    const n2 = val("srNum2");
    const d2 = val("srDen2");
    const out = document.getElementById("sumRestOutput");

    const err = validateBasic(n1,d1) || validateBasic(n2,d2);
    if(err){
      out.innerHTML = `<div class="error">${err}</div>`;
      return;
    }

    const rN = currentSrOp === "+" ? (n1*d2 + n2*d1) : (n1*d2 - n2*d1);
    const rD = d1*d2;
    const r = simplify(rN,rD);

    out.innerHTML = `
      <div class="result-top">
        ${fracHtml(r.n, r.d)}
        ${r.n < 0 ? `<span class="neg">NEGATIVA</span>` : ``}
      </div>

      <div class="visual-grid">
        ${visualCard("Fracción 1", n1, d1, ["#5ea2ff","#22d3ee","#8b5cf6"])}
        ${visualCard("Fracción 2", n2, d2, ["#ec4899","#8b5cf6","#5ea2ff"])}
        ${visualCard("Resultado", r.n, r.d, ["#22d3ee","#5ea2ff","#ec4899"])}
      </div>
    `;
  }

  function renderMultDiv(){
    const n1 = val("mdNum1");
    const d1 = val("mdDen1");
    const n2 = val("mdNum2");
    const d2 = val("mdDen2");
    const out = document.getElementById("multDivOutput");

    const err = validateBasic(n1,d1) || validateBasic(n2,d2);
    if(err){
      out.innerHTML = `<div class="error">${err}</div>`;
      return;
    }

    if(currentMdOp === "/" && n2 === 0){
      out.innerHTML = `<div class="error">No se puede dividir entre 0.</div>`;
      return;
    }

    let rN, rD, note = "";
    if(currentMdOp === "*"){
      rN = n1 * n2;
      rD = d1 * d2;
    }else{
      rN = n1 * d2;
      rD = d1 * n2;
      note = `<div class="tiny-note">Dividir por una fracción = multiplicar por su recíproco.</div>`;
    }

    const r = simplify(rN,rD);

    out.innerHTML = `
      <div class="result-top">
        ${fracHtml(r.n, r.d)}
        ${r.n < 0 ? `<span class="neg">NEGATIVA</span>` : ``}
      </div>

      ${note}

      <div class="visual-grid">
        ${visualCard("Fracción 1", n1, d1, ["#5ea2ff","#8b5cf6","#ec4899"])}
        ${visualCard("Fracción 2", n2, d2, ["#ec4899","#5ea2ff","#22d3ee"])}
        ${visualCard("Resultado", r.n, r.d, ["#22d3ee","#8b5cf6","#ec4899"])}
      </div>
    `;
  }

  renderSingle();
  renderSumRest();
  renderMultDiv();
</script>
</body>
</html>
