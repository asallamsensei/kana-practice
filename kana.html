<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Repaso de Kana — Asallam Sensei</title>

<style>
  :root{
    --bg: #0b1020;
    --card: rgba(255,255,255,.08);
    --card2: rgba(255,255,255,.10);
    --text: #eef2ff;
    --muted: rgba(238,242,255,.75);
    --accent: #7d5cff;
    --accent2:#22c55e;
    --danger:#ef4444;
    --border: rgba(255,255,255,.14);
    --soft: rgba(255,255,255,.06);
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    font-family: Arial, sans-serif;
    background:
      radial-gradient(1200px 700px at 20% 10%, rgba(125,92,255,.35), transparent 60%),
      radial-gradient(900px 600px at 90% 20%, rgba(34,197,94,.18), transparent 60%),
      radial-gradient(900px 600px at 30% 90%, rgba(239,68,68,.14), transparent 55%),
      var(--bg);
    color: var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding: 16px 12px 42px;
  }

  .wrap{
    width:min(920px, 100%);
  }

  h1{
    margin: 8px 0 14px;
    text-align:center;
    font-size: clamp(22px, 4.4vw, 30px);
    line-height: 1.15;
    letter-spacing: .2px;
  }

  .card{
    background: linear-gradient(180deg, var(--card2), var(--card));
    border: 1px solid var(--border);
    border-radius: 22px;
    box-shadow: 0 20px 50px rgba(0,0,0,.35);
    padding: 16px;
  }

.top-grid{
  display:grid;
  grid-template-columns: minmax(0, 1fr) 280px;
  gap: 14px;
  align-items: start;
}


  .panel{
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 18px;
    padding: 14px;
  }

  .row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
  }

  .row-left{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:flex-start;
  }

  .chips{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
  }

  button{
    border:none;
    border-radius: 12px;
    padding: 11px 14px;
    cursor:pointer;
    color:white;
    background: var(--accent);
    font-weight: 700;
    font-size: 15px;
  }

  button:hover{
    transform: translateY(-1px);
    filter: brightness(1.06);
  }

  .modo-btn,
  .orden-btn,
  .reset-btn,
  .ghost-btn{
    background: rgba(255,255,255,.08);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .modo-btn.activo{
    background: var(--accent);
    border-color: transparent;
    color: white;
  }

  .orden-btn{
    opacity: .62;
  }

  .orden-btn.activo{
    opacity: 1;
    background: rgba(125,92,255,.22);
    border-color: rgba(125,92,255,.55);
    color: #efe9ff;
  }

  #btn-principiante{
    opacity: .55;
  }

  #btn-principiante.activo{
    opacity: 1;
    background: rgba(239,68,68,.18);
    border-color: rgba(239,68,68,.5);
    color: #fecaca;
  }

  .reset-btn:hover,
  .ghost-btn:hover,
  .modo-btn:hover,
  .orden-btn:hover{
    background: rgba(255,255,255,.12);
  }

  .main-play{
    text-align:center;
    padding: 14px 10px 10px;
  }

#kanaBox{
  min-height: 140px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,.10);
  background: rgba(0,0,0,.16);
  padding: 14px 10px;
}


#kana{
  font-size: clamp(50px, 10vw, 60px);
  line-height: 1.05;
  font-weight: 300;
  user-select: none;
  margin: 0;
  text-align:center;
  letter-spacing: .5px;
  cursor: pointer;
}


  #kana.dictado{
    font-size: clamp(48px, 12vw, 68px);
  }

  .audio-row{
    margin-top: 12px;
  }

  #btnReplay{
    display:none;
  }

  #btnReplay.visible{
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  #btnReplay.big-sound{
    font-size: 28px;
    padding: 16px 20px;
    border-radius: 16px;
    background: rgba(255,255,255,.08);
    border: 1px solid var(--border);
    color: var(--text);
  }

  #respuesta{
    margin-top: 14px;
    font-size: clamp(20px, 4.2vw, 30px);
    min-height: 40px;
    text-align:center;
    font-weight: 500;
    white-space: pre-line;
    line-height: 1.28;
  }

  .correcto{ color: var(--accent2); }
  .incorrecto{ color: var(--danger); }

  .input-wrap{
    margin-top: 14px;
    display:flex;
    justify-content:center;
  }

  #kana:empty{
    display: none;
  }

  #nota-teclado{
    display:none;
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
    text-align:center;
    line-height: 1.35;
  }

  #acciones{
    margin-top: 14px;
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
  }

  .accion-btn{
    min-width: 150px;
  }

  .opcion-btn:disabled{
    opacity: 1;
    cursor: default;
  }
  
  .opcion-btn:disabled:hover{
    transform: none;
    filter: none;
  }
  
  #estadisticas{
    margin-top: 14px;
    text-align:center;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.5;
  }

  .sep{
    height:1px;
    background: rgba(255,255,255,.10);
    margin: 14px 0;
  }

  .hint{
    color: rgba(238,242,255,.72);
    font-size: 13px;
    line-height: 1.35;
    text-align:center;
  }

  code.kbd{
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.14);
    padding: 2px 7px;
    border-radius: 8px;
    font-weight: 700;
    color: var(--text);
  }

  @media (max-width: 900px){
    body{
      padding: 10px 10px 28px;
    }

    .card{
      padding: 12px;
      border-radius: 18px;
    }

    .panel{
      padding: 12px;
      border-radius: 16px;
    }

    h1{
      margin-top: 4px;
      margin-bottom: 10px;
      font-size: 20px;
    }

    #kanaBox{
      min-height: 180px;
      padding: 16px 10px;
    }

    #respuesta{
      font-size: 22px;
      min-height: 34px;
    }

    #estadisticas{
      font-size: 14px;
    }

    .accion-btn{
      min-width: 132px;
      flex: 1 1 140px;
    }

    .modo-btn,
    .orden-btn,
    .reset-btn,
    button{
      font-size: 14px;
      padding: 10px 12px;
    }
  }

.opciones-wrap{
  margin-top: 16px;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 145px));
  justify-content: center;
  gap: 10px;
}



.opcion-btn{
  width:100%;
  min-height: 62px;
  padding:12px 14px;
  border-radius:16px;

  background: rgba(125,92,255,.12);
  border:1px solid rgba(125,92,255,.55);
  color:#efe9ff;

  font-size:22px;
  font-weight:700;
  text-align:center;

  box-shadow:
    0 0 6px rgba(125,92,255,.6),
    0 0 14px rgba(125,92,255,.35),
    inset 0 0 8px rgba(125,92,255,.15);
}


.opcion-btn:hover{
  background: rgba(125,92,255,.22);
  box-shadow:
    0 0 10px rgba(125,92,255,.9),
    0 0 24px rgba(125,92,255,.6);
}


.opcion-btn.correcta{
  background: rgba(34,197,94,.18);
  border-color: rgba(34,197,94,.45);
}

.opcion-btn.incorrecta{
  background: rgba(239,68,68,.18);
  border-color: rgba(239,68,68,.45);
}

.btn-mostrar{
  background: rgba(239,68,68,.15);
  border: 1px solid rgba(239,68,68,.4);
  color: var(--danger);
}

.btn-mostrar:hover{
  background: rgba(239,68,68,.26);
}

.side-panel{
  position: sticky;
  top: 16px;
}

.side-panel .chips{
  justify-content: stretch;
  flex-direction: column;
  align-items: stretch;
}

.side-panel button{
  width: 100%;
}

.panel-title{
  font-size: 18px;
  font-weight: 800;
  text-align: center;
  margin-bottom: 12px;
  color: #efe9ff;
  letter-spacing: .3px;
}

.toggle-row{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}

.sub-title{
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 8px;
  text-align: center;
  letter-spacing: .3px;
  text-transform: uppercase;
}

.modo-btn.dual-activo{
  background: rgba(214,40,40,.18);
  border-color: rgba(214,40,40,.48);
  color: #fecaca;
  box-shadow:
    0 0 8px rgba(214,40,40,.18),
    inset 0 0 8px rgba(214,40,40,.08);
}

.orden-btn.activo,
.modo-btn.activo{
  opacity: 1;
  background: rgba(125,92,255,.22);
  border-color: rgba(125,92,255,.55);
  color: #efe9ff;
}

#btn-extra.activo{
  background: rgba(34,197,94,.18);
  border-color: rgba(34,197,94,.45);
  color: #dcfce7;
}

#btn-mix.activo{
  opacity: 1;
  background: rgba(214,40,40,.18);
  border-color: rgba(214,40,40,.55);
  color: #fecaca;
  box-shadow:
    0 0 8px rgba(214,40,40,.38),
    0 0 18px rgba(214,40,40,.18),
    inset 0 0 8px rgba(214,40,40,.08);
}
  
@media (max-width: 900px){
  .top-grid{
    grid-template-columns: 1fr;
  }

  .side-panel{
    position: static;
  }

  .side-panel .chips{
    flex-direction: row;
    justify-content: center;
    align-items: center;
  }

  .side-panel button{
    width: auto;
  }

  .opciones-wrap{
    grid-template-columns: 1fr;
  }

  .opcion-btn{
    font-size: 18px;
    min-height: 56px;
  }

  #kana{
    font-size: clamp(52px, 16vw, 74px);
  }

  #kana.dictado{
    font-size: clamp(30px, 8vw, 42px);
  }
}

@media (max-width: 900px){
  .toggle-row{
    grid-template-columns: 1fr 1fr;
  }
}


  
</style>
</head>
<body>

<div class="wrap">
  <h1>Repaso de Kana — Asallam Sensei</h1>

  <div class="card">

    <div class="top-grid">

      <div class="panel main-play">
        <div id="kanaBox">
          <div id="kana" onclick="if(esDictadoTipo(tipoPreguntaActual)) reproducirAudioKana(kanaLista[actual][1])">あ</div>

          <div class="audio-row">
            <button id="btnReplay" class="ghost-btn" type="button" onclick="replayAudio()">🔊</button>
          </div>
        </div>

        <div id="respuesta"></div>

        <div id="opciones" class="opciones-wrap">
        
        <button id="btn-opcion-a" class="opcion-btn" onclick="responderOpcion(0)">
          <span id="texto-opcion-a">...</span>
        </button>
        
        <button id="btn-opcion-b" class="opcion-btn" onclick="responderOpcion(1)">
          <span id="texto-opcion-b">...</span>
        </button>
        
        <button id="btn-opcion-c" class="opcion-btn" onclick="responderOpcion(2)">
          <span id="texto-opcion-c">...</span>
        </button>
        
        </div>

        <div id="acciones">
          <button class="accion-btn" onclick="siguienteDesdeBoton()">Siguiente</button>
        </div>

        <div id="estadisticas">
          <div>
            Aciertos: <span id="aciertos">0</span> —
            Errores: <span id="errores">0</span>
          </div>
          <div>
            Racha: <span id="racha">0</span> —
            Mejor racha: <span id="mejorRacha">0</span> —
            Precisión: <span id="precision">0%</span>
          </div>
        </div>

        <div style="margin-top:14px;" class="row">
          <button class="reset-btn" onclick="resetStatsModo()">Reset stats</button>
        </div>
      </div>
      
      <div class="panel side-panel">
      
        <div class="panel-title">Modos</div>
      
        <div class="sub-title">Escritura</div>
        <div class="toggle-row">
          <button id="btn-hiragana" class="modo-btn" onclick="toggleScript('hiragana')">Hiragana</button>
          <button id="btn-katakana" class="modo-btn" onclick="toggleScript('katakana')">Katakana</button>
        </div>
      
        <div class="toggle-row" style="margin-top:10px;">
          <button id="btn-extra" class="modo-btn" onclick="toggleExtra()">Extra</button>
          <button id="btn-principiante" class="modo-btn" onclick="togglePrincipiante()">Principiante</button>
        </div>
      
        <div class="sep"></div>
      
        <div class="sub-title">Tipo de pregunta</div>
        <div class="toggle-row">
          <button id="btn-jp-es" class="orden-btn" onclick="toggleDireccion('jp_es')">Kana → Romaji</button>
          <button id="btn-es-jp" class="orden-btn" onclick="toggleDireccion('es_jp')">Romaji → Kana</button>
        </div>
      
        <div class="toggle-row" style="margin-top:10px;">
          <button id="btn-dictado" class="orden-btn" onclick="toggleDictado()">Dictado 🔊</button>
          <button id="btn-mix" class="orden-btn" onclick="toggleMix()">MIX</button>
        </div>
      
      </div>


    </div>
  </div>
</div>

<script>
/* ===============================
   DATA
=============================== */
let hiragana = [];
let katakana = [];
let extra = [];
let hiraganaBase = [];
let katakanaBase = [];

let filtroPrincipiante = false;

const GOJUON = [
  "a","i","u","e","o",
  "ka","ki","ku","ke","ko",
  "sa","shi","su","se","so",
  "ta","chi","tsu","te","to",
  "na","ni","nu","ne","no",
  "ha","hi","fu","he","ho",
  "ma","mi","mu","me","mo",
  "ya","yu","yo",
  "ra","ri","ru","re","ro",
  "wa","wo","n"
];

// Cargar JSON
fetch("data/kana.json")
  .then(res => res.json())
  .then(data => {
    hiraganaBase = data.hiragana;
    katakanaBase = data.katakana;
    extra = data.Extra;

    hiragana = hiraganaBase;
    katakana = katakanaBase;

    aplicarFiltroPrincipiante();
    construirPoolActual();
    aplicarVisualScripts();
    aplicarVisualDirecciones();
    cargarStatsActual();
    siguienteKana();

  });

/* ===============================
   ESTADO
=============================== */
let actual = 0;
let kanaLista = [];

let yaValidado = false;
let aciertos = 0;
let errores = 0;
let racha = 0;
let mejorRacha = 0;

let usarHiragana = true;
let usarKatakana = true;
let usarExtra = false;

let usarJPES = true;
let usarESJP = true;
let usarDictado = true;
let usarMix = true;

let opcionesActuales = [];
let indiceCorrecto = 0;

let tipoPreguntaActual = "jp_es";

/* ===============================
   STATS (localStorage)
=============================== */
const STATS_KEY = "kanaStats_v2";

function cargarStats(){
  try { return JSON.parse(localStorage.getItem(STATS_KEY)) || {}; }
  catch { return {}; }
}

function guardarStats(stats){
  localStorage.setItem(STATS_KEY, JSON.stringify(stats));
}

function statsKeyActual(){
  const scripts =
    (usarHiragana ? "H" : "") +
    (usarKatakana ? "K" : "") +
    (usarExtra ? "X" : "");

  const tipos =
    (usarJPES ? "J" : "") +
    (usarESJP ? "R" : "") +
    (usarDictado ? "D" : "") +
    (usarMix ? "M" : "");

  return scripts + "__" + tipos;
}


function cargarStatsActual(){
  const key = statsKeyActual();
  const stats = cargarStats();

  if (!stats[key]) {
    stats[key] = {
      aciertos: 0,
      errores: 0,
      racha: 0,
      mejorRacha: 0
    };
    guardarStats(stats);
  }

  aciertos = stats[key].aciertos || 0;
  errores = stats[key].errores || 0;
  racha = stats[key].racha || 0;
  mejorRacha = stats[key].mejorRacha || 0;

  actualizarEstadisticas();
}

function setBotonesOpcionesHabilitados(estado){
  document.querySelectorAll(".opcion-btn").forEach(btn => {
    btn.disabled = !estado;
  });
}
  
function limpiarEstadoBotones(){
  document.querySelectorAll(".opcion-btn").forEach(btn => {
    btn.classList.remove("correcta", "incorrecta");
  });
}
  
function generarOpciones(){
  if (!kanaLista.length) return;

  const correcta = kanaLista[actual];
  const correctaValor = valorRespuesta(correcta, tipoPreguntaActual);

  const pool = kanaLista.filter(item => {
    return valorRespuesta(item, tipoPreguntaActual) !== correctaValor;
  });

  const distractores = mezclarArray(pool).slice(0, 2);

  opcionesActuales = mezclarArray([correcta, ...distractores]);
  indiceCorrecto = opcionesActuales.findIndex(item => item === correcta);

  const textos = opcionesActuales.map(item => valorRespuesta(item, tipoPreguntaActual));

  document.getElementById("texto-opcion-a").innerText = textos[0] || "";
  document.getElementById("texto-opcion-b").innerText = textos[1] || "";
  document.getElementById("texto-opcion-c").innerText = textos[2] || "";

  limpiarEstadoBotones();
}

  
function valorOpcion(item){
  return valorRespuesta(item, tipoPreguntaActual);
}

  
function mezclarArray(arr){
  const copia = [...arr];
  for (let i = copia.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copia[i], copia[j]] = [copia[j], copia[i]];
  }
  return copia;
}
  
function guardarStatsActual(){
  const key = statsKeyActual();
  const stats = cargarStats();

  if (!stats[key]) {
    stats[key] = {
      aciertos: 0,
      errores: 0,
      racha: 0,
      mejorRacha: 0
    };
  }

  stats[key].aciertos = aciertos;
  stats[key].errores = errores;
  stats[key].racha = racha;
  stats[key].mejorRacha = mejorRacha;

  guardarStats(stats);
}

function precisionPct(){
  const total = aciertos + errores;
  if (total <= 0) return "0%";
  return Math.round((aciertos / total) * 100) + "%";
}

/* ===============================
   UI HELPERS
=============================== */
function limpiarUI(){
  document.getElementById("respuesta").innerText = "";
  document.getElementById("respuesta").className = "";
  yaValidado = false;
  limpiarEstadoBotones();
  setBotonesOpcionesHabilitados(true);
}

function actualizarBotonAudio(){
  const btn = document.getElementById("btnReplay");
  const kanaEl = document.getElementById("kana");
  const box = document.getElementById("kanaBox");

  if (!btn || !kanaEl || !box) return;

  btn.classList.remove("visible", "big-sound");
  kanaEl.classList.remove("dictado");
  box.classList.remove("dictado-only");

  if (esDictadoTipo(tipoPreguntaActual)) {
    btn.classList.add("visible", "big-sound");
    kanaEl.classList.add("dictado");
    box.classList.add("dictado-only");
  }
}


/* ===============================
   FILTRO PRINCIPIANTE
=============================== */
function aplicarFiltroPrincipiante(){
  if (!filtroPrincipiante) {
    hiragana = hiraganaBase;
    katakana = katakanaBase;
    return;
  }

  hiragana = hiraganaBase.filter(k => GOJUON.includes(k[1]));
  katakana = katakanaBase.filter(k => GOJUON.includes(k[1]));
}

function togglePrincipiante(){
  filtroPrincipiante = !filtroPrincipiante;
  const btn = document.getElementById("btn-principiante");

  if (filtroPrincipiante) {
    usarExtra = false;
    btn.classList.add("activo");
  } else {
    btn.classList.remove("activo");
  }

  aplicarFiltroPrincipiante();
  asegurarAlMenosUnScript();
  construirPoolActual();
  aplicarVisualScripts();
  cargarStatsActual();
  limpiarUI();
  siguienteKana();
}

function construirPoolActual(){
  let pool = [];

  if (usarHiragana) pool = pool.concat(hiragana);
  if (usarKatakana) pool = pool.concat(katakana);
  if (usarExtra) pool = pool.concat(extra);

  kanaLista = pool;
}

function aplicarVisualScripts(){
  const btnH = document.getElementById("btn-hiragana");
  const btnK = document.getElementById("btn-katakana");
  const btnE = document.getElementById("btn-extra");

  [btnH, btnK, btnE].forEach(btn => {
    btn.classList.remove("activo", "dual-activo");
  });

  if (usarHiragana && usarKatakana) {
    btnH.classList.add("dual-activo");
    btnK.classList.add("dual-activo");
  } else {
    if (usarHiragana) btnH.classList.add("activo");
    if (usarKatakana) btnK.classList.add("activo");
  }

  if (usarExtra) btnE.classList.add("activo");
}

function aplicarVisualDirecciones(){
  const btnJPES = document.getElementById("btn-jp-es");
  const btnESJP = document.getElementById("btn-es-jp");
  const btnDictado = document.getElementById("btn-dictado");
  const btnMix = document.getElementById("btn-mix");

  [btnJPES, btnESJP, btnDictado, btnMix].forEach(btn => {
    btn.classList.remove("activo");
  });

  if (usarJPES) btnJPES.classList.add("activo");
  if (usarESJP) btnESJP.classList.add("activo");
  if (usarDictado) btnDictado.classList.add("activo");
  if (usarMix) btnMix.classList.add("activo");
}

function syncMixDesdeToggles(){
  usarMix = usarJPES && usarESJP && usarDictado;
}

function asegurarAlMenosUnScript(){
  if (!usarHiragana && !usarKatakana && !usarExtra) {
    usarHiragana = true;
  }
}
  
function toggleScript(script){
  if (script === "hiragana") {
    usarHiragana = !usarHiragana;
  }

  if (script === "katakana") {
    usarKatakana = !usarKatakana;
  }

  asegurarAlMenosUnScript();

  construirPoolActual();
  aplicarVisualScripts();
  cargarStatsActual();
  limpiarUI();
  siguienteKana();
}

function toggleExtra(){
  usarExtra = !usarExtra;

  if (usarExtra) {
    filtroPrincipiante = false;
    document.getElementById("btn-principiante").classList.remove("activo");
    aplicarFiltroPrincipiante();
  }

  asegurarAlMenosUnScript();

  construirPoolActual();
  aplicarVisualScripts();
  cargarStatsActual();
  limpiarUI();
  siguienteKana();
}

function toggleDireccion(dir){
  if (dir === "jp_es") {
    if (usarJPES && !usarESJP && !usarDictado) return;
    usarJPES = !usarJPES;
  }

  if (dir === "es_jp") {
    if (usarESJP && !usarJPES && !usarDictado) return;
    usarESJP = !usarESJP;
  }

  syncMixDesdeToggles();

  aplicarVisualDirecciones();
  cargarStatsActual();
  limpiarUI();
  siguienteKana();
}

function toggleDictado(){
  if (usarDictado && !usarJPES && !usarESJP) return;

  usarDictado = !usarDictado;

  syncMixDesdeToggles();

  aplicarVisualDirecciones();
  cargarStatsActual();
  limpiarUI();
  siguienteKana();
}

  
function toggleMix(){
  usarMix = !usarMix;

  if (usarMix) {
    usarJPES = true;
    usarESJP = true;
    usarDictado = true;
  }

  aplicarVisualDirecciones();
  cargarStatsActual();
  limpiarUI();
  siguienteKana();
}

function tiposDisponibles(){
  const tipos = [];

  if (usarJPES) tipos.push("jp_es");
  if (usarESJP) tipos.push("es_jp");

  if (usarDictado && usarJPES) tipos.push("dictado_jp_es");
  if (usarDictado && usarESJP) tipos.push("dictado_es_jp");

  return tipos.length ? tipos : ["jp_es"];
}

function elegirTipoPregunta(){
  const tipos = tiposDisponibles();
  return tipos[Math.floor(Math.random() * tipos.length)];
}

function esDictadoTipo(tipo){
  return tipo === "dictado_jp_es" || tipo === "dictado_es_jp";
}

function valorPregunta(item, tipo){
  const kana = item[0];
  const romaji = item[1];

  if (tipo === "jp_es") return kana;
  if (tipo === "es_jp") return romaji;
  if (tipo === "dictado_jp_es") return "";
  if (tipo === "dictado_es_jp") return "";

  return kana;
}

function valorRespuesta(item, tipo){
  const kana = item[0];
  const romaji = item[1];

  if (tipo === "jp_es") return romaji;
  if (tipo === "es_jp") return kana;
  if (tipo === "dictado_jp_es") return romaji;
  if (tipo === "dictado_es_jp") return kana;

  return romaji;
}

  
/* ===============================
   AUDIO (por ROMAJI)
=============================== */
function romajiParaArchivo(romaji){
  let r = (romaji || "").trim().toLowerCase();

  r = r
    .replace(/ā/g,"aa")
    .replace(/ī/g,"ii")
    .replace(/ū/g,"uu")
    .replace(/ē/g,"ee")
    .replace(/ō/g,"ou");

  r = r.replace(/\s+/g,"").replace(/[’']/g,"").replace(/-/g,"");
  return r;
}

function romajiAlternativasAudio(romaji){
  const base = romajiParaArchivo(romaji);
  const set = new Set([base]);

  if (base.includes("ou")) set.add(base.replace(/ou/g,"oo"));
  if (base.includes("fu")) set.add(base.replace(/fu/g,"hu"));
  if (base.includes("shi")) set.add(base.replace(/shi/g,"si"));
  if (base.includes("chi")) set.add(base.replace(/chi/g,"ti"));
  if (base.includes("tsu")) set.add(base.replace(/tsu/g,"tu"));
  if (base === "wo") set.add("o");

  return Array.from(set);
}

let audioKana = new Audio();
audioKana.preload = "auto";

function reproducirAudioKana(romaji){
  const opciones = romajiAlternativasAudio(romaji);
  if (!opciones.length) return;

  audioKana.pause();
  audioKana.currentTime = 0;

  const baseDir = "data/audios/";

  let i = 0;
  const intentar = () => {
    if (i >= opciones.length) return;
    const nombre = opciones[i++];

    audioKana.src = baseDir + encodeURIComponent(nombre) + ".mp3";
    audioKana.play().catch(() => intentar());
  };

  intentar();
}

function replayAudio(){
  if (!kanaLista.length) return;
  const r = kanaLista[actual]?.[1];
  if (r) reproducirAudioKana(r);
}

/* ===============================
   JUEGO
=============================== */
function siguienteKana(){
  if (!kanaLista.length) return;

  actual = Math.floor(Math.random() * kanaLista.length);
  tipoPreguntaActual = elegirTipoPregunta();

  const item = kanaLista[actual];
  const kanaEl = document.getElementById("kana");

  const textoPregunta = valorPregunta(item, tipoPreguntaActual);

  if (esDictadoTipo(tipoPreguntaActual)) {
    kanaEl.innerText = "";
  } else {
    kanaEl.innerText = textoPregunta;
  }

  document.getElementById("respuesta").innerText = "";
  document.getElementById("respuesta").className = "";
  yaValidado = false;

  generarOpciones();
  setBotonesOpcionesHabilitados(true);
  actualizarBotonAudio();

  if (esDictadoTipo(tipoPreguntaActual)) {
    reproducirAudioKana(item[1]);
  }
}


function responderOpcion(indice){
  if (yaValidado) return;

  const correcta = kanaLista[actual];
  const correctaTexto = valorRespuesta(correcta, tipoPreguntaActual);

  const btns = document.querySelectorAll(".opcion-btn");
  const btnElegido = btns[indice];
  const btnCorrecto = btns[indiceCorrecto];

  reproducirAudioKana(correcta[1]);

  if (indice === indiceCorrecto) {
    document.getElementById("respuesta").innerText = "Correcto ✔ (" + correctaTexto + ")";
    document.getElementById("respuesta").className = "correcto";

    btnElegido.classList.add("correcta");

    aciertos++;
    racha++;
    if (racha > mejorRacha) mejorRacha = racha;
  } else {
    document.getElementById("respuesta").innerText = "Incorrecto ✘ (era: " + correctaTexto + ")";
    document.getElementById("respuesta").className = "incorrecto";

    btnElegido.classList.add("incorrecta");
    btnCorrecto.classList.add("correcta");

    errores++;
    racha = 0;
  }

  actualizarEstadisticas();
  guardarStatsActual();

  yaValidado = true;
  setBotonesOpcionesHabilitados(false);
}


function aplicarNotaTeclado(){
  return;
}

function actualizarEstadisticas(){
  document.getElementById("aciertos").innerText = aciertos;
  document.getElementById("errores").innerText = errores;
  document.getElementById("racha").innerText = racha;
  document.getElementById("mejorRacha").innerText = mejorRacha;
  document.getElementById("precision").innerText = precisionPct();
}

/* ===============================
   BOTONES ACCIONES
=============================== */
function siguienteDesdeBoton(){
  if (!yaValidado) {
    errores++;
    racha = 0;

    const correcta = kanaLista[actual];
    const correcto = valorRespuesta(correcta, tipoPreguntaActual);

    document.getElementById("respuesta").innerText = "Incorrecto ✘ (era: " + correcto + ")";
    document.getElementById("respuesta").className = "incorrecto";

    const btns = document.querySelectorAll(".opcion-btn");
    if (btns[indiceCorrecto]) {
      btns[indiceCorrecto].classList.add("correcta");
    }

    actualizarEstadisticas();
    guardarStatsActual();

    yaValidado = true;
    setBotonesOpcionesHabilitados(false);
    return;
  }

  siguienteKana();
}



function resetStatsModo(){
  const key = statsKeyActual();
  const stats = cargarStats();

  stats[key] = {
    aciertos: 0,
    errores: 0,
    racha: 0,
    mejorRacha: 0
  };

  guardarStats(stats);

  aciertos = 0;
  errores = 0;
  racha = 0;
  mejorRacha = 0;

  actualizarEstadisticas();
}

/* ===============================
   ATAJOS DE TECLADO
=============================== */
document.addEventListener("keydown", (event) => {
  const tag = (document.activeElement?.tagName || "").toLowerCase();
  const enCampo = tag === "input" || tag === "textarea";

  if (enCampo) return;

  const key = event.key.toLowerCase();

  if (key === "a") {
    event.preventDefault();
    if (!yaValidado) responderOpcion(0);
    else siguienteKana();
    return;
  }

  if (key === "b") {
    event.preventDefault();
    if (!yaValidado) responderOpcion(1);
    else siguienteKana();
    return;
  }

  if (key === "c") {
    event.preventDefault();
    if (!yaValidado) responderOpcion(2);
    else siguienteKana();
    return;
  }

  if (key === "enter") {
    event.preventDefault();
    if (yaValidado) siguienteKana();
  }
});
  
</script>
