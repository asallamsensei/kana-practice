<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Repaso de Kana — Asallam Sensei</title>

<style>
  :root{
    --bg: #0b1020;
    --card: rgba(255,255,255,.08);
    --card2: rgba(255,255,255,.10);
    --text: #eef2ff;
    --muted: rgba(238,242,255,.75);
    --accent: #7d5cff;
    --accent2:#22c55e;
    --danger:#ef4444;
    --border: rgba(255,255,255,.14);
    --soft: rgba(255,255,255,.06);
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    font-family: Arial, sans-serif;
    background:
      radial-gradient(1200px 700px at 20% 10%, rgba(125,92,255,.35), transparent 60%),
      radial-gradient(900px 600px at 90% 20%, rgba(34,197,94,.18), transparent 60%),
      radial-gradient(900px 600px at 30% 90%, rgba(239,68,68,.14), transparent 55%),
      var(--bg);
    color: var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding: 16px 12px 42px;
  }

  .wrap{
    width:min(920px, 100%);
  }

  h1{
    margin: 8px 0 14px;
    text-align:center;
    font-size: clamp(24px, 4.8vw, 34px);
    line-height: 1.15;
    letter-spacing: .2px;
  }

  .card{
    background: linear-gradient(180deg, var(--card2), var(--card));
    border: 1px solid var(--border);
    border-radius: 22px;
    box-shadow: 0 20px 50px rgba(0,0,0,.35);
    padding: 16px;
  }

  .top-grid{
    display:grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .panel{
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 18px;
    padding: 14px;
  }

  .row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
  }

  .row-left{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:flex-start;
  }

  .chips{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
  }

  button{
    border:none;
    border-radius: 12px;
    padding: 11px 14px;
    cursor:pointer;
    color:white;
    background: var(--accent);
    font-weight: 700;
    font-size: 15px;
  }

  button:hover{
    transform: translateY(-1px);
    filter: brightness(1.06);
  }

  .modo-btn,
  .orden-btn,
  .reset-btn,
  .ghost-btn{
    background: rgba(255,255,255,.08);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .modo-btn.activo{
    background: var(--accent);
    border-color: transparent;
    color: white;
  }

  .orden-btn{
    opacity: .62;
  }

  .orden-btn.activo{
    opacity: 1;
    background: rgba(125,92,255,.22);
    border-color: rgba(125,92,255,.55);
    color: #efe9ff;
  }

  #btn-principiante{
    opacity: .55;
  }

  #btn-principiante.activo{
    opacity: 1;
    background: rgba(239,68,68,.18);
    border-color: rgba(239,68,68,.5);
    color: #fecaca;
  }

  .reset-btn:hover,
  .ghost-btn:hover,
  .modo-btn:hover,
  .orden-btn:hover{
    background: rgba(255,255,255,.12);
  }

  .main-play{
    text-align:center;
    padding: 14px 10px 10px;
  }

  #kanaBox{
    min-height: 210px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.16);
    padding: 18px 12px;
  }

  #kana{
    font-size: clamp(92px, 20vw, 150px);
    line-height: 1;
    font-weight: 600;
    user-select: none;
    margin: 0;
    text-align:center;
    letter-spacing: .5px;
    cursor: pointer;
  }

  #kana.dictado{
    font-size: clamp(48px, 12vw, 68px);
  }

  .audio-row{
    margin-top: 12px;
  }

  #btnReplay{
    display:none;
  }

  #btnReplay.visible{
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  #btnReplay.big-sound{
    font-size: 28px;
    padding: 16px 20px;
    border-radius: 16px;
    background: rgba(255,255,255,.08);
    border: 1px solid var(--border);
    color: var(--text);
  }

  #respuesta{
    margin-top: 14px;
    font-size: clamp(20px, 4.2vw, 30px);
    min-height: 40px;
    text-align:center;
    font-weight: 500;
    white-space: pre-line;
    line-height: 1.28;
  }

  .correcto{ color: var(--accent2); }
  .incorrecto{ color: var(--danger); }

  .input-wrap{
    margin-top: 14px;
    display:flex;
    justify-content:center;
  }

  #kana:empty{
    display: none;
  }

  #nota-teclado{
    display:none;
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
    text-align:center;
    line-height: 1.35;
  }

  #acciones{
    margin-top: 14px;
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
  }

  .accion-btn{
    min-width: 150px;
  }

  .opcion-btn:disabled{
    opacity: 1;
    cursor: default;
  }
  
  .opcion-btn:disabled:hover{
    transform: none;
    filter: none;
  }
  
  #estadisticas{
    margin-top: 14px;
    text-align:center;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.5;
  }

  .sep{
    height:1px;
    background: rgba(255,255,255,.10);
    margin: 14px 0;
  }

  .hint{
    color: rgba(238,242,255,.72);
    font-size: 13px;
    line-height: 1.35;
    text-align:center;
  }

  code.kbd{
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.14);
    padding: 2px 7px;
    border-radius: 8px;
    font-weight: 700;
    color: var(--text);
  }

  @media (max-width: 700px){
    body{
      padding: 10px 10px 28px;
    }

    .card{
      padding: 12px;
      border-radius: 18px;
    }

    .panel{
      padding: 12px;
      border-radius: 16px;
    }

    h1{
      margin-top: 4px;
      margin-bottom: 10px;
      font-size: 24px;
    }

    #kanaBox{
      min-height: 180px;
      padding: 16px 10px;
    }

    #respuesta{
      font-size: 22px;
      min-height: 34px;
    }

    #estadisticas{
      font-size: 14px;
    }

    .accion-btn{
      min-width: 132px;
      flex: 1 1 140px;
    }

    .modo-btn,
    .orden-btn,
    .reset-btn,
    button{
      font-size: 14px;
      padding: 10px 12px;
    }
  }

  @media (max-width: 420px){
    #kana{
      font-size: clamp(88px, 24vw, 128px);
    }

    #kana.dictado{
      font-size: 46px;
    }

    .chips{
      gap:8px;
    }

    .modo-btn,
    .orden-btn,
    .reset-btn,
    button{
      font-size: 13px;
      padding: 10px 11px;
      border-radius: 11px;
    }

    .pill{
      font-size: 12px;
      padding: 7px 10px;
    }
  }

.opciones-wrap{
  margin-top: 16px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.opcion-btn{
  width:100%;
  padding:14px 16px;
  border-radius:16px;
  background:rgba(255,255,255,.08);
  border:1px solid var(--border);
  color:var(--text);
  font-size:30px;
  font-weight:700;
  text-align:center;
}

.opcion-btn:hover{
  background: rgba(255,255,255,.12);
}

.opcion-btn.correcta{
  background: rgba(34,197,94,.18);
  border-color: rgba(34,197,94,.45);
}

.opcion-btn.incorrecta{
  background: rgba(239,68,68,.18);
  border-color: rgba(239,68,68,.45);
}

.btn-mostrar{
  background: rgba(239,68,68,.15);
  border: 1px solid rgba(239,68,68,.4);
  color: var(--danger);
}

.btn-mostrar:hover{
  background: rgba(239,68,68,.26);
}
  
@media (max-width: 420px){
  .opcion-btn{
    font-size: 16px;
    padding: 12px 13px;
  }

  .opcion-letra{
    min-width: 34px;
    height: 34px;
  }
}
  
</style>
</head>
<body>

<div class="wrap">
  <h1>Repaso de Kana — Asallam Sensei</h1>

  <div class="card">

    <div class="top-grid">

      <div class="panel">

        <div id="modo-container" class="chips">
          <button id="btn-hiragana" class="modo-btn" onclick="setModo('hiragana')">Hiragana</button>
          <button id="btn-katakana" class="modo-btn" onclick="setModo('katakana')">Katakana</button>
          <button id="btn-mezcla" class="modo-btn" onclick="setModo('mezcla')">Mezcla</button>
          <button id="btn-extra" class="modo-btn" onclick="setModo('extra')">Extra</button>
        </div>

        <div class="sep"></div>

        <div id="orden-container" class="chips">
          <button id="btn-principiante" class="modo-btn" onclick="togglePrincipiante()">Principiante</button>
          <button id="btn-jp-es" class="orden-btn" onclick="setQuizModo('jp_es')">Kana → Romaji</button>
          <button id="btn-es-jp" class="orden-btn" onclick="setQuizModo('es_jp')">Romaji → Kana</button>
          <button id="btn-dictado" class="orden-btn" onclick="toggleDictado()">Dictado 🔊</button>
        </div>
      </div>

      <div class="panel main-play">
        <div id="kanaBox">
          <div id="kana" onclick="if(quizModo==='dictado') reproducirAudioKana(kanaLista[actual][1])">あ</div>

          <div class="audio-row">
            <button id="btnReplay" class="ghost-btn" type="button" onclick="replayAudio()">🔊</button>
          </div>
        </div>

        <div id="respuesta"></div>

        <div id="opciones" class="opciones-wrap">
        
        <button id="btn-opcion-a" class="opcion-btn" onclick="responderOpcion(0)">
          <span id="texto-opcion-a">...</span>
        </button>
        
        <button id="btn-opcion-b" class="opcion-btn" onclick="responderOpcion(1)">
          <span id="texto-opcion-b">...</span>
        </button>
        
        <button id="btn-opcion-c" class="opcion-btn" onclick="responderOpcion(2)">
          <span id="texto-opcion-c">...</span>
        </button>
        
        </div>

        <div id="acciones">
          <button class="accion-btn" onclick="siguienteDesdeBoton()">Siguiente</button>
          <button class="accion-btn btn-mostrar" onclick="mostrarRespuesta()">Mostrar respuesta</button>
        </div>

        <div id="estadisticas">
          <div>
            Aciertos: <span id="aciertos">0</span> —
            Errores: <span id="errores">0</span>
          </div>
          <div>
            Racha: <span id="racha">0</span> —
            Mejor racha: <span id="mejorRacha">0</span> —
            Precisión: <span id="precision">0%</span>
          </div>
        </div>

        <div style="margin-top:14px;" class="row">
          <button class="reset-btn" onclick="resetStatsModo()">Reset stats</button>
        </div>

        <div class="sep"></div>
      </div>

    </div>
  </div>
</div>

<script>
/* ===============================
   DATA
=============================== */
let hiragana = [];
let katakana = [];
let extra = [];
let hiraganaBase = [];
let katakanaBase = [];

let filtroPrincipiante = false;

const GOJUON = [
  "a","i","u","e","o",
  "ka","ki","ku","ke","ko",
  "sa","shi","su","se","so",
  "ta","chi","tsu","te","to",
  "na","ni","nu","ne","no",
  "ha","hi","fu","he","ho",
  "ma","mi","mu","me","mo",
  "ya","yu","yo",
  "ra","ri","ru","re","ro",
  "wa","wo","n"
];

// Cargar JSON
fetch("data/kana.json")
  .then(res => res.json())
  .then(data => {
    hiraganaBase = data.hiragana;
    katakanaBase = data.katakana;
    extra = data.Extra;

    hiragana = hiraganaBase;
    katakana = katakanaBase;

    aplicarFiltroPrincipiante();

    setModo("hiragana");
  });

/* ===============================
   ESTADO
=============================== */
let modoActual = "hiragana"; // hiragana|katakana|mezcla|extra
let kanaLista = hiragana;
let actual = 0;

let yaValidado = false;
let aciertos = 0;
let errores = 0;
let racha = 0;
let mejorRacha = 0;

let quizModo = "jp_es";        // jp_es | es_jp | dictado
let quizModoPrevio = "jp_es";  // recuerda el último no-dictado
let opcionesActuales = [];
let indiceCorrecto = 0;
/* ===============================
   STATS (localStorage)
=============================== */
const STATS_KEY = "kanaStats_v2";

function cargarStats(){
  try { return JSON.parse(localStorage.getItem(STATS_KEY)) || {}; }
  catch { return {}; }
}

function guardarStats(stats){
  localStorage.setItem(STATS_KEY, JSON.stringify(stats));
}

function statsKeyActual(){
  return modoActual + "__" + quizModo;
}

function cargarStatsActual(){
  const key = statsKeyActual();
  const stats = cargarStats();

  if (!stats[key]) {
    stats[key] = {
      aciertos: 0,
      errores: 0,
      racha: 0,
      mejorRacha: 0
    };
    guardarStats(stats);
  }

  aciertos = stats[key].aciertos || 0;
  errores = stats[key].errores || 0;
  racha = stats[key].racha || 0;
  mejorRacha = stats[key].mejorRacha || 0;

  actualizarEstadisticas();
}

function setBotonesOpcionesHabilitados(estado){
  document.querySelectorAll(".opcion-btn").forEach(btn => {
    btn.disabled = !estado;
  });
}
  
function limpiarEstadoBotones(){
  document.querySelectorAll(".opcion-btn").forEach(btn => {
    btn.classList.remove("correcta", "incorrecta");
  });
}
  
function generarOpciones(){
  if (!kanaLista.length) return;

  const correcta = kanaLista[actual];
  const correctaValor = valorOpcion(correcta);

  const pool = kanaLista.filter(item => {
    const v = valorOpcion(item);
    return v !== correctaValor;
  });

  const distractores = mezclarArray(pool).slice(0, 2);

  opcionesActuales = mezclarArray([correcta, ...distractores]);
  indiceCorrecto = opcionesActuales.findIndex(item => item === correcta);

  const textos = opcionesActuales.map(item => valorOpcion(item));

  document.getElementById("texto-opcion-a").innerText = textos[0] || "";
  document.getElementById("texto-opcion-b").innerText = textos[1] || "";
  document.getElementById("texto-opcion-c").innerText = textos[2] || "";

  limpiarEstadoBotones();
}
  
function valorOpcion(item){
  const kana = item[0];
  const romaji = item[1];

  if (quizModo === "jp_es") {
    return romaji;
  }

  if (quizModo === "es_jp") {
    return kana;
  }

  if (quizModo === "dictado") {
    return kana + " / " + romaji;
  }

  return romaji;
}
  
function mezclarArray(arr){
  const copia = [...arr];
  for (let i = copia.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copia[i], copia[j]] = [copia[j], copia[i]];
  }
  return copia;
}
  
function guardarStatsActual(){
  const key = statsKeyActual();
  const stats = cargarStats();

  if (!stats[key]) {
    stats[key] = {
      aciertos: 0,
      errores: 0,
      racha: 0,
      mejorRacha: 0
    };
  }

  stats[key].aciertos = aciertos;
  stats[key].errores = errores;
  stats[key].racha = racha;
  stats[key].mejorRacha = mejorRacha;

  guardarStats(stats);
}

function precisionPct(){
  const total = aciertos + errores;
  if (total <= 0) return "0%";
  return Math.round((aciertos / total) * 100) + "%";
}

/* ===============================
   UI HELPERS
=============================== */
function aplicarVisualQuizModo(){
  document.querySelectorAll(".orden-btn").forEach(b => b.classList.remove("activo"));
  const btnId =
    (quizModo === "jp_es") ? "btn-jp-es" :
    (quizModo === "es_jp") ? "btn-es-jp" :
    "btn-dictado";
  const btn = document.getElementById(btnId);
  if (btn) btn.classList.add("activo");
}

function aplicarPlaceholderQuizModo(){
  return;
}

function limpiarUI(){
  document.getElementById("respuesta").innerText = "";
  document.getElementById("respuesta").className = "";
  yaValidado = false;
  limpiarEstadoBotones();
  setBotonesOpcionesHabilitados(true);
}

function actualizarBotonAudio(){
  const btn = document.getElementById("btnReplay");
  const kanaEl = document.getElementById("kana");
  const box = document.getElementById("kanaBox");

  if (!btn || !kanaEl || !box) return;

  btn.classList.remove("visible", "big-sound");
  kanaEl.classList.remove("dictado");
  box.classList.remove("dictado-only");

  if (quizModo === "dictado") {
    btn.classList.add("visible", "big-sound");
    kanaEl.classList.add("dictado");
    box.classList.add("dictado-only");
  }
}

/* ===============================
   MODOS
=============================== */
function setModo(modo){
  modoActual = modo;

  if (modo === "hiragana") kanaLista = hiragana;
  else if (modo === "katakana") kanaLista = katakana;
  else if (modo === "extra") kanaLista = extra;
  else kanaLista = [...hiragana, ...katakana];

  const botonesModo = document.querySelectorAll(".modo-btn");
  botonesModo.forEach(b => {
    if (b.id !== "btn-principiante") b.classList.remove("activo");
  });

  const btnModo = document.getElementById("btn-" + modo);
  if (btnModo) btnModo.classList.add("activo");

  aplicarVisualQuizModo();
  aplicarPlaceholderQuizModo();
  aplicarNotaTeclado();
  actualizarBotonAudio();
  cargarStatsActual();

  limpiarUI();
  siguienteKana();
}

function setQuizModo(modo){
  if (modo === "jp_es" || modo === "es_jp") quizModoPrevio = modo;
  quizModo = modo;

  aplicarVisualQuizModo();
  aplicarPlaceholderQuizModo();
  aplicarNotaTeclado();
  actualizarBotonAudio();
  cargarStatsActual();
  limpiarUI();
  siguienteKana();
}

function toggleDictado(){
  if (quizModo !== "dictado") {
    quizModoPrevio = quizModo;
    quizModo = "dictado";
  } else {
    quizModo = quizModoPrevio || "jp_es";
  }

  aplicarVisualQuizModo();
  aplicarPlaceholderQuizModo();
  aplicarNotaTeclado();
  actualizarBotonAudio();
  cargarStatsActual();
  limpiarUI();
  siguienteKana();
}

/* ===============================
   FILTRO PRINCIPIANTE
=============================== */
function aplicarFiltroPrincipiante(){
  if (!filtroPrincipiante) {
    hiragana = hiraganaBase;
    katakana = katakanaBase;
    return;
  }

  hiragana = hiraganaBase.filter(k => GOJUON.includes(k[1]));
  katakana = katakanaBase.filter(k => GOJUON.includes(k[1]));
}

function togglePrincipiante(){
  filtroPrincipiante = !filtroPrincipiante;
  const btn = document.getElementById("btn-principiante");

  if (filtroPrincipiante) btn.classList.add("activo");
  else btn.classList.remove("activo");

  aplicarFiltroPrincipiante();

  if (modoActual === "extra") return;
  setModo(modoActual);
}

/* ===============================
   AUDIO (por ROMAJI)
=============================== */
function romajiParaArchivo(romaji){
  let r = (romaji || "").trim().toLowerCase();

  r = r
    .replace(/ā/g,"aa")
    .replace(/ī/g,"ii")
    .replace(/ū/g,"uu")
    .replace(/ē/g,"ee")
    .replace(/ō/g,"ou");

  r = r.replace(/\s+/g,"").replace(/[’']/g,"").replace(/-/g,"");
  return r;
}

function romajiAlternativasAudio(romaji){
  const base = romajiParaArchivo(romaji);
  const set = new Set([base]);

  if (base.includes("ou")) set.add(base.replace(/ou/g,"oo"));
  if (base.includes("fu")) set.add(base.replace(/fu/g,"hu"));
  if (base.includes("shi")) set.add(base.replace(/shi/g,"si"));
  if (base.includes("chi")) set.add(base.replace(/chi/g,"ti"));
  if (base.includes("tsu")) set.add(base.replace(/tsu/g,"tu"));
  if (base === "wo") set.add("o");

  return Array.from(set);
}

let audioKana = new Audio();
audioKana.preload = "auto";

function reproducirAudioKana(romaji){
  const opciones = romajiAlternativasAudio(romaji);
  if (!opciones.length) return;

  audioKana.pause();
  audioKana.currentTime = 0;

  const baseDir =
    (modoActual === "extra")
      ? "data/audios/kana/extra/"
      : "data/audios/";

  let i = 0;
  const intentar = () => {
    if (i >= opciones.length) return;
    const nombre = opciones[i++];

    audioKana.src = baseDir + encodeURIComponent(nombre) + ".mp3";
    audioKana.play().catch(() => intentar());
  };

  intentar();
}

function replayAudio(){
  if (!kanaLista.length) return;
  const r = kanaLista[actual]?.[1];
  if (r) reproducirAudioKana(r);
}

/* ===============================
   JUEGO
=============================== */
function siguienteKana(){
  actual = Math.floor(Math.random() * kanaLista.length);

  const k = kanaLista[actual][0];
  const r = kanaLista[actual][1];
  const kanaEl = document.getElementById("kana");

  if (quizModo === "dictado") {
    kanaEl.innerText = "";
  } else {
    kanaEl.innerText = (quizModo === "jp_es") ? k : r;
  }

  document.getElementById("respuesta").innerText = "";
  document.getElementById("respuesta").className = "";
  yaValidado = false;

  generarOpciones();
  setBotonesOpcionesHabilitados(true);

  if (quizModo === "dictado") {
    reproducirAudioKana(r);
  }
}

function responderOpcion(indice){
  if (yaValidado) return;

  const correcta = kanaLista[actual];
  const correctaTexto = valorOpcion(correcta);

  const btns = document.querySelectorAll(".opcion-btn");
  const btnElegido = btns[indice];
  const btnCorrecto = btns[indiceCorrecto];

  reproducirAudioKana(correcta[1]);

  if (indice === indiceCorrecto) {
    document.getElementById("respuesta").innerText = "Correcto ✔ (" + correctaTexto + ")";
    document.getElementById("respuesta").className = "correcto";

    btnElegido.classList.add("correcta");

    aciertos++;
    racha++;
    if (racha > mejorRacha) mejorRacha = racha;
  } else {
    document.getElementById("respuesta").innerText = "Incorrecto ✘ (era: " + correctaTexto + ")";
    document.getElementById("respuesta").className = "incorrecto";

    btnElegido.classList.add("incorrecta");
    btnCorrecto.classList.add("correcta");

    errores++;
    racha = 0;
  }

  actualizarEstadisticas();
  guardarStatsActual();

  yaValidado = true;
  setBotonesOpcionesHabilitados(false);
}

function aplicarNotaTeclado(){
  return;
}

function actualizarEstadisticas(){
  document.getElementById("aciertos").innerText = aciertos;
  document.getElementById("errores").innerText = errores;
  document.getElementById("racha").innerText = racha;
  document.getElementById("mejorRacha").innerText = mejorRacha;
  document.getElementById("precision").innerText = precisionPct();
}

/* ===============================
   BOTONES ACCIONES
=============================== */
function siguienteDesdeBoton(){
  if (!yaValidado) {
    mostrarRespuesta();
    return;
  }
  siguienteKana();
}

function mostrarRespuesta(){
  if (yaValidado) return;

  const correcta = kanaLista[actual];
  const correcto = valorOpcion(correcta);

  reproducirAudioKana(correcta[1]);

  document.getElementById("respuesta").innerText = "Mostrada ✘ (era: " + correcto + ")";
  document.getElementById("respuesta").className = "incorrecto";

  const btns = document.querySelectorAll(".opcion-btn");
  if (btns[indiceCorrecto]) {
    btns[indiceCorrecto].classList.add("correcta");
  }

  errores++;
  racha = 0;
  actualizarEstadisticas();
  guardarStatsActual();

  yaValidado = true;
  setBotonesOpcionesHabilitados(false);
}

function resetStatsModo(){
  const key = statsKeyActual();
  const stats = cargarStats();

  stats[key] = {
    aciertos: 0,
    errores: 0,
    racha: 0,
    mejorRacha: 0
  };

  guardarStats(stats);

  aciertos = 0;
  errores = 0;
  racha = 0;
  mejorRacha = 0;

  actualizarEstadisticas();
}

/* ===============================
   ATAJOS DE TECLADO
=============================== */
document.addEventListener("keydown", (event) => {
  const tag = (document.activeElement?.tagName || "").toLowerCase();
  const enCampo = tag === "input" || tag === "textarea";

  if (enCampo) return;

  const key = event.key.toLowerCase();

  if (key === "a") {
    event.preventDefault();
    if (!yaValidado) responderOpcion(0);
    else siguienteKana();
    return;
  }

  if (key === "b") {
    event.preventDefault();
    if (!yaValidado) responderOpcion(1);
    else siguienteKana();
    return;
  }

  if (key === "c") {
    event.preventDefault();
    if (!yaValidado) responderOpcion(2);
    else siguienteKana();
    return;
  }

  if (key === "enter") {
    event.preventDefault();
    if (yaValidado) siguienteKana();
  }
});
  
</script>
